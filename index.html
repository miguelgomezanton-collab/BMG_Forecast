*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;background:#f0f2f5;color:#1a1a1a}
.app{max-width:1500px;margin:0 auto;padding:16px}
.header{background:#1a2b4a;color:#fff;padding:14px 20px;border-radius:8px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.header h1{font-size:15px;font-weight:700;letter-spacing:.3px}
.header p{font-size:11px;color:#a0b4d0;margin-top:2px}
.nav{display:flex;gap:2px;background:#fff;border-radius:8px;padding:4px;margin-bottom:14px;border:1px solid #e0e0e0;flex-wrap:wrap}
.nav button{padding:7px 14px;border:none;background:transparent;border-radius:5px;cursor:pointer;font-size:12px;color:#555;font-weight:500;transition:.12s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.nav button.active{background:#1a2b4a;color:#fff}
.nav button:hover:not(.active){background:#f0f2f5}
.card{background:#fff;border-radius:8px;border:1px solid #e0e0e0;margin-bottom:14px;overflow:hidden}
.card-header{padding:11px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:#fafafa}
.card-header h2{font-size:12px;font-weight:700;color:#1a2b4a;text-transform:uppercase;letter-spacing:.04em}
.card-body{padding:14px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;margin-bottom:14px}
.metric{background:#fff;border-radius:7px;padding:12px 14px;border:1px solid #e0e0e0}
.metric-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.metric-val{font-size:19px;font-weight:700;line-height:1.1}
.metric-sub{font-size:10px;color:#888;margin-top:3px}
.green{color:#1a7a45}.red{color:#b83232}.blue{color:#1a2b4a}.orange{color:#b06000}.gray{color:#888}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f4f6f9;padding:7px 9px;text-align:left;font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid #e4e8ee;white-space:nowrap}
td{padding:5px 9px;border-bottom:1px solid #f2f2f2;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.num{text-align:right;font-variant-numeric:tabular-nums;font-family:monospace;font-size:11px}
.section-row td{background:#eef2f7;font-weight:700;font-size:10px;color:#1a2b4a;padding:5px 9px;text-transform:uppercase;letter-spacing:.04em}
.total-row td{background:#e4ecf4;font-weight:700;border-top:2px solid #1a2b4a}
.saldo-row td{background:#1a2b4a;color:#fff;font-weight:700;font-size:12px}
.saldo-row td.sticky-col{background:#1a2b4a;color:#fff}
.flujo-row td{background:#f0f4f8;font-weight:700}
.pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
.pill-ok{background:#e4f4ec;color:#1a7a45}
.pill-warn{background:#fff4e0;color:#b06000}
.pill-err{background:#fdecea;color:#b83232}
.pill-neu{background:#f0f0f0;color:#555}
.pill-dis{background:#fde8f0;color:#9b2060}
.pill-blue{background:#e4eef8;color:#1a2b4a}
.btn{padding:5px 11px;border-radius:5px;border:1px solid #dde0e6;background:#fff;cursor:pointer;font-size:11px;font-weight:500;color:#333;transition:.1s;display:inline-flex;align-items:center;gap:4px}
.btn:hover{background:#f4f6f9}
.btn-primary{background:#1a2b4a;color:#fff;border-color:#1a2b4a}
.btn-primary:hover{background:#243d6a}
.btn-sm{padding:3px 8px;font-size:10px}
.btn-danger{color:#b83232;border-color:#e4c0c0}
.btn-danger:hover{background:#fdecea}
.btn-ghost{border-color:transparent;background:transparent;color:#888}
.btn-ghost:hover{background:#f0f0f0;color:#333}
input,select,textarea{font-size:12px;padding:5px 8px;border:1px solid #dde0e6;border-radius:5px;background:#fff;color:#1a1a1a;font-family:Arial,sans-serif}
input:focus,select:focus{outline:none;border-color:#1a2b4a;box-shadow:0 0 0 2px rgba(26,43,74,.08)}
.form-row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:3px}
.form-group label{font-size:10px;color:#666;font-weight:700;text-transform:uppercase;letter-spacing:.03em}
.overflow-x{overflow-x:auto}
.alert{padding:9px 13px;border-radius:6px;font-size:11px;margin-bottom:12px;display:flex;align-items:flex-start;gap:6px}
.alert-info{background:#e8f0fb;color:#1a2b4a;border:1px solid #c0d0e8}
.alert-warn{background:#fff8e6;color:#b06000;border:1px solid #f0d070}
.alert-ok{background:#e4f4ec;color:#1a7a45;border:1px solid #a0d8b8}
.month-col-header{font-size:9px;text-align:center;white-space:nowrap}
.sticky-col{position:sticky;left:0;background:#fff;z-index:2}
th.sticky-col{background:#f4f6f9;z-index:3}
.inline-edit{background:transparent;border:none;border-bottom:1px dashed #ccc;width:80px;text-align:right;font-size:11px;padding:2px 3px;font-family:monospace;color:#1a1a1a}
.inline-edit:focus{outline:none;border-bottom-color:#1a2b4a;background:#f0f4ff}
.chart-container{width:100%;position:relative;margin:10px 0}
.sep{height:1px;background:#f0f0f0;margin:12px 0}
.tag{display:inline-block;font-size:9px;padding:1px 5px;border-radius:3px;margin-left:4px;font-weight:600}
.tag-real{background:#d4edda;color:#1a7a45}
.tag-prev{background:#dde8f8;color:#1a2b4a}
.tag-frozen{background:#ffe8b8;color:#8b5000}
.desv-pos{color:#1a7a45;font-weight:600}
.desv-neg{color:#b83232;font-weight:600}
.desv-zero{color:#888}

.col-presup{background:#f8fbff}
.col-real{background:#f4fbf6}
.col-desv{background:#fdf8f0}
.frozen-badge{font-size:9px;background:#1a2b4a;color:#fff;padding:2px 6px;border-radius:3px;font-weight:600;letter-spacing:.03em}
.upload-area{border:2px dashed #ccd0d8;border-radius:7px;padding:16px;text-align:center;color:#888;cursor:pointer;font-size:11px;transition:.15s}

.month-header-presup{background:#e8f0fb;color:#1a2b4a}

.month-header-desv{background:#fff4e0;color:#b06000}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

  {id:'M00691/25',cliente:'ALDA INVESTMENTS',concepto:'Honorarios',fecha:'2025-11-03',baseImponible:1239.67,iva:0.21,totalFra:1500.00,mesCobro:4,estado:'Pendiente',fechaCobro:''},
];

// ── Categorías para mapear extracto bancario ──
// CATS_EXTRACTO se construye dinámicamente desde gastos+impuestos en TabExtracto

const fmt=(n,dec=0)=>{
  if(n===null||n===undefined||isNaN(n)||n==='')return'—';
  const abs=Math.abs(n);
  const s=abs.toLocaleString('es-ES',{minimumFractionDigits:dec,maximumFractionDigits:dec});
  return(n<0?'-':'')+'€'+s;
};
const cx=(...cs)=>cs.filter(Boolean).join(' ');
const sign=(n,invert=false)=>{
  if(Math.abs(n)<0.5)return'desv-zero';
  const pos=invert?(n<0):(n>0);
  return pos?'desv-pos':'desv-neg';
};

// APP ROOT
// ══════════════════════════════════════════════
const STORAGE_KEY='bmg_plan_caja_v2';

function loadFromStorage(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(!raw)return null;
    return JSON.parse(raw);
  }catch(e){return null;}
}

function App(){
  const [tab,setTab]=useState('control');

  // Inicializar desde localStorage si existe, si no usar defaults
  const saved=loadFromStorage();

  const [facturacion,setFacturacion]=useState(()=>saved?.facturacion||JSON.parse(JSON.stringify(FACT_INIT)));
  const [clientes,setClientes]=useState(()=>saved?.clientes||JSON.parse(JSON.stringify(CLIENTES_INIT)));
  const [gastos,setGastos]=useState(()=>saved?.gastos||JSON.parse(JSON.stringify(GASTOS_INIT)));
  const [impuestos,setImpuestos]=useState(()=>saved?.impuestos||JSON.parse(JSON.stringify(IMPTOS_INIT)));
  const [facturas,setFacturas]=useState(()=>saved?.facturas||JSON.parse(JSON.stringify(FACTURAS_INIT)));
  const [saldoInicial,setSaldoInicial]=useState(()=>saved?.saldoInicial??45000);
  const [movimientosReal,setMovimientosReal]=useState(()=>saved?.movimientosReal||[]);
  const [presupuestoFrozen,setPresupuestoFrozen]=useState(()=>saved?.presupuestoFrozen||null);
  const [frozenAt,setFrozenAt]=useState(()=>saved?.frozenAt||null);
  const [mesesCerrados,setMesesCerrados]=useState(()=>saved?.mesesCerrados||{});
  const [savedAt,setSavedAt]=useState(()=>saved?.savedAt||null);
  const MES_ACTUAL=4; // Mayo

  // ── AUTO-SAVE a localStorage cada vez que cambia cualquier dato ──
  useEffect(()=>{
    const data={
      facturacion,clientes,gastos,impuestos,facturas,
      saldoInicial,movimientosReal,presupuestoFrozen,frozenAt,mesesCerrados,
      savedAt:new Date().toISOString(),
    };
    try{
      localStorage.setItem(STORAGE_KEY,JSON.stringify(data));
      setSavedAt(data.savedAt);
    }catch(e){
      console.warn('localStorage lleno o no disponible',e);
    }
  },[facturacion,clientes,gastos,impuestos,facturas,saldoInicial,movimientosReal,presupuestoFrozen,frozenAt,mesesCerrados]);

  // ── EXPORTAR JSON (backup) ──
  const exportarDatos=()=>{
    const data={facturacion,clientes,gastos,impuestos,facturas,saldoInicial,movimientosReal,presupuestoFrozen,frozenAt,mesesCerrados};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
    const a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download=`bmg_plan_caja_${new Date().toISOString().split('T')[0]}.json`;
    a.click();
  };

  // ── IMPORTAR JSON (restaurar backup) ──
  const importarDatos=e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(data.facturacion)setFacturacion(data.facturacion);
        if(data.clientes)setClientes(data.clientes);
        if(data.gastos)setGastos(data.gastos);
        if(data.impuestos)setImpuestos(data.impuestos);
        if(data.facturas)setFacturas(data.facturas);
        if(data.saldoInicial!=null)setSaldoInicial(data.saldoInicial);
        if(data.movimientosReal)setMovimientosReal(data.movimientosReal);
        if(data.presupuestoFrozen)setPresupuestoFrozen(data.presupuestoFrozen);
        if(data.frozenAt)setFrozenAt(data.frozenAt);
        if(data.mesesCerrados)setMesesCerrados(data.mesesCerrados);
        alert('✓ Datos restaurados correctamente');
      }catch(err){
        alert('Error al importar: '+err.message);
      }
    };
    r.readAsText(file);
    e.target.value='';
  };

  // ── RESETEAR A VALORES INICIALES ──
  const resetearDatos=()=>{
    if(!confirm('¿Borrar TODOS los datos y volver a los valores iniciales?'))return;
    localStorage.removeItem(STORAGE_KEY);
    setFacturacion(JSON.parse(JSON.stringify(FACT_INIT)));
    setClientes(JSON.parse(JSON.stringify(CLIENTES_INIT)));
    setGastos(JSON.parse(JSON.stringify(GASTOS_INIT)));
    setImpuestos(JSON.parse(JSON.stringify(IMPTOS_INIT)));
    setFacturas(JSON.parse(JSON.stringify(FACTURAS_INIT)));
    setSaldoInicial(45000);
    setMovimientosReal([]);
    setPresupuestoFrozen(null);
    setFrozenAt(null);
    setMesesCerrados({});
  };

  // ── HELPERS DE CÁLCULO ──
  const ingPresupMes=m=>clientes.reduce((s,c)=>(facturacion[c.id]?.[m]||0)+s,0);
  // Ingresos con IVA por cliente (para proyección de caja)
  const ingConIVAMes=m=>clientes.reduce((s,c)=>{
    const base=facturacion[c.id]?.[m]||0;
    const iva=c.iva!=null?c.iva:0.21;
    return s+base*(1+iva);
  },0);
  const cvGastos=['nominas','ss','rosalia','legalpigeon'];
  const mbMes=m=>ingPresupMes(m)+cvGastos.reduce((s,id)=>{const g=gastos.find(x=>x.id===id);return s+(g?g.importes[m]||0:0);},0);
  const gastosFijosMes=m=>gastos.reduce((s,g)=>s+(g.importes[m]||0),0);
  const imptosMes=m=>impuestos.reduce((s,i)=>s+(i.importes[m]||0),0);
  const resultadoMes=m=>ingPresupMes(m)+gastosFijosMes(m)+imptosMes(m);

  // ── CÁLCULOS DE CAJA ──

  // ¿Hay extracto bancario subido para este mes?
  const hayExtractoMes=m=>movimientosReal.some(mv=>mv.mes===m);

  // Con extracto: cobros = TODOS los positivos del banco (clientes + traspasos + deuda = todo entra)
  const cobrosExtractoMes=m=>movimientosReal
    .filter(mv=>mv.mes===m&&mv.importe>0)
    .reduce((s,mv)=>s+mv.importe,0);

  // Con extracto: pagos = TODOS los negativos del banco
  const pagosExtractoMes=m=>movimientosReal
    .filter(mv=>mv.mes===m&&mv.importe<0)
    .reduce((s,mv)=>s+mv.importe,0);

  // entradasExtractoMes = 0 siempre (ya incluido en cobrosExtractoMes)
  // Se mantiene el nombre para no romper referencias en sharedProps
  const entradasExtractoMes=m=>0;

  // Cobros reales de facturas marcadas Cobradas (para meses sin extracto que tengan facturas)
  const cobrosRealesMes=m=>facturas
    .filter(f=>{
      if(f.estado!=='Cobrada'||!f.fechaCobro)return false;
      const fecha=new Date(f.fechaCobro);
      return !isNaN(fecha.getTime())&&fecha.getMonth()===m&&fecha.getFullYear()===2026;
    }).reduce((s,f)=>s+(f.importe||f.totalFra||0),0);

  // Facturas pendientes asignadas a un mes futuro
  const cobrosFacturasMes=m=>facturas
    .filter(f=>f.mesCobro===m&&!['Cancelada','Incobrable','Cobrada'].includes(f.estado))
    .reduce((s,f)=>s+(f.importe||f.totalFra||0),0);
  const hayFacturasPendientesMes=m=>facturas
    .some(f=>f.mesCobro===m&&!['Cancelada','Incobrable','Cobrada'].includes(f.estado));
  const hayFacturasMes=hayFacturasPendientesMes;

  // Previsión para clientes sin factura asignada (meses futuros)
  const previsionSinFacturasMes=m=>{
    const clientesConFactura=new Set(
      facturas
        .filter(f=>f.mesCobro===m&&!['Cancelada','Incobrable','Cobrada'].includes(f.estado))
        .map(f=>f.cliente)
    );
    return clientes.reduce((s,c)=>{
      if(clientesConFactura.has(c.nombre)||clientesConFactura.has(c.id))return s;
      const base=facturacion[c.id]?.[m]||0;
      const iva=c.iva!=null?c.iva:0.21;
      return s+base*(1+iva);
    },0);
  };
  const cobrosEsperadosMes=m=>cobrosFacturasMes(m)+previsionSinFacturasMes(m);

  // Pagos presupuestados neto de caja: base × (1 + IVA − IRPF) + impuestos
  const gastoCajaMes=m=>gastos.reduce((s,g)=>{
    const base=g.importes[m]||0;
    const iva=g.iva||0;const irpf=g.irpf||0;
    return s+base*(1+iva-irpf);
  },0);
  const pagosPresupCajaMes=m=>gastoCajaMes(m)+imptosMes(m);

  const mesCerrado=m=>!!(mesesCerrados[m]);

  // ── FUENTE DE VERDAD POR MES ──
  // extracto subido           → 100% del banco (cobros + pagos = todo del extracto)
  // cerrado sin extracto      → presupuesto en ámbar (pendiente de subir extracto)
  // futuro sin extracto       → facturas pendientes + previsión / presupuesto
  const fuenteMes=m=>{
    if(hayExtractoMes(m))  return 'extracto';
    if(mesCerrado(m))      return 'presupuesto_pendiente';
    return 'prevision';
  };

  const cobrosPresupCajaMes=m=>{
    const f=fuenteMes(m);
    if(f==='extracto')              return cobrosExtractoMes(m);
    if(f==='presupuesto_pendiente') return ingConIVAMes(m); // best estimate hasta subir extracto
    return cobrosEsperadosMes(m);
  };

  const pagosPresupCajaMes2=m=>{
    const f=fuenteMes(m);
    if(f==='extracto') return pagosExtractoMes(m);
    return pagosPresupCajaMes(m);
  };

  const flujoPresupMes=m=>cobrosPresupCajaMes(m)+pagosPresupCajaMes2(m);
  const flujoRealMes=m=>hayExtractoMes(m)?cobrosExtractoMes(m)+pagosExtractoMes(m):null;

  const saldoPresupAcum=m=>{
    let s=saldoInicial;
    for(let i=0;i<=m;i++) s+=flujoPresupMes(i);
    return s;
  };
  const saldoRealAcum=m=>{
    let s=saldoInicial;
    for(let i=0;i<=m;i++){
      const fr=flujoRealMes(i);
      s+=fr!==null?fr:flujoPresupMes(i);
    }
    return s;
  };

  const pagosRealesMes=pagosPresupCajaMes2;

  // ── CONGELAR PRESUPUESTO ──
  const congelarPresupuesto=()=>{
    if(presupuestoFrozen&&!confirm('Ya hay un presupuesto congelado. ¿Reemplazarlo?'))return;
    const snapshot={
      facturacion:JSON.parse(JSON.stringify(facturacion)),
      clientes:JSON.parse(JSON.stringify(clientes)),
      gastos:JSON.parse(JSON.stringify(gastos)),
      impuestos:JSON.parse(JSON.stringify(impuestos)),
      saldoInicial,
    };
    setPresupuestoFrozen(snapshot);
    setFrozenAt(new Date().toLocaleDateString('es-ES'));
    alert('✓ Presupuesto base congelado. A partir de ahora puedes actualizar el plan y ver la desviación vs este punto de partida.');
  };

  // Cálculos frozen
  const frozenIngMes=m=>{if(!presupuestoFrozen)return null;return presupuestoFrozen.clientes.reduce((s,c)=>(presupuestoFrozen.facturacion[c.id]?.[m]||0)+s,0);};
  const frozenGastosMes=m=>{if(!presupuestoFrozen)return null;return presupuestoFrozen.gastos.reduce((s,g)=>s+(g.importes[m]||0),0)+presupuestoFrozen.impuestos.reduce((s,i)=>s+(i.importes[m]||0),0);};
  const frozenFlujoCajaMes=m=>{if(!presupuestoFrozen)return null;return (frozenIngMes(m)||0)+(frozenGastosMes(m)||0);};
  const frozenSaldoAcum=m=>{if(!presupuestoFrozen)return null;let s=presupuestoFrozen.saldoInicial;for(let i=0;i<=m;i++)s+=frozenFlujoCajaMes(i);return s;};

  const addCliente=(nombre)=>{
    if(!nombre||!nombre.trim())return;
    const id='c_'+Date.now();
    setClientes(p=>[...p,{id,nombre:nombre.trim(),grupo:'varios',iva:0.21}]);
    setFacturacion(p=>({...p,[id]:Array(12).fill(0)}));
  };

  const addGasto=(concepto,grupo,importe,iva=0.21,irpf=0)=>{
    if(!concepto||!concepto.trim())return;
    const imp=parseFloat(importe)||0;
    setGastos(p=>[...p,{id:'g_'+Date.now(),concepto:concepto.trim(),grupo,iva,irpf,importes:Array(12).fill(imp<=0?imp:-imp),dia:1}]);
  };

  const tabs=[
    {id:'control',label:'Panel de control',icon:'ti-dashboard'},
    {id:'facturacion',label:'Previsión facturación',icon:'ti-chart-bar'},
    {id:'pyg',label:'Cuenta PyG',icon:'ti-report-money'},
    {id:'caja',label:'Plan de caja',icon:'ti-building-bank'},
    {id:'facturas',label:'Facturas pendientes',icon:'ti-file-invoice'},
    {id:'extracto',label:'Extracto real',icon:'ti-credit-card'},
    {id:'gastos_tab',label:'Gastos fijos',icon:'ti-adjustments'},
  ];

  const sharedProps={facturacion,setFacturacion,clientes,setClientes,addCliente,gastos,setGastos,addGasto,impuestos,setImpuestos,facturas,setFacturas,saldoInicial,setSaldoInicial,movimientosReal,setMovimientosReal,mesesCerrados,setMesesCerrados,MES_ACTUAL,ingPresupMes,ingConIVAMes,mbMes,gastosFijosMes,gastoCajaMes,imptosMes,resultadoMes,cobrosRealesMes,cobrosExtractoMes,pagosExtractoMes,cobrosFacturasMes,previsionSinFacturasMes,cobrosEsperadosMes,entradasExtractoMes,pagosRealesMes,cobrosPresupCajaMes,pagosPresupCajaMes:pagosPresupCajaMes2,flujoPresupMes,flujoRealMes,saldoPresupAcum,saldoRealAcum,presupuestoFrozen,frozenAt,frozenIngMes,frozenGastosMes,frozenFlujoCajaMes,frozenSaldoAcum,hayFacturasMes,hayFacturasPendientesMes,mesCerrado,hayExtractoMes,fuenteMes};

  return(
    <div className="app">
      <div className="header">
        <div>
          <h1><i className="ti ti-building-skyscraper" style={{marginRight:7}}></i>BMG Law Services · Plan de Caja 2026</h1>
          <p>PyG presupuestada · Proyección de caja · Seguimiento real</p>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          {/* Estado del guardado */}
          <span style={{fontSize:10,color:'#a0c4a0'}}>
            <i className="ti ti-device-floppy" style={{marginRight:3}}></i>
            {savedAt
              ? `Guardado ${new Date(savedAt).toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}`
              : 'Guardando...'}
          </span>
          {/* Foto base */}
          {presupuestoFrozen
            ?<span style={{fontSize:10,color:'#a0c4a0'}}><i className="ti ti-snowflake" style={{marginRight:3}}></i>Foto base: {frozenAt}</span>
            :<span style={{fontSize:10,color:'#f0c060'}}><i className="ti ti-alert-triangle" style={{marginRight:3}}></i>Sin foto base</span>
          }
          <button className="btn btn-sm" style={{background:'rgba(255,255,255,.15)',color:'#fff',borderColor:'rgba(255,255,255,.25)',fontSize:10}} onClick={congelarPresupuesto}>
            <i className="ti ti-snowflake"></i>{presupuestoFrozen?'Recongelar':'Congelar base'}
          </button>
          {/* Exportar */}
          <button className="btn btn-sm" style={{background:'rgba(255,255,255,.1)',color:'#fff',borderColor:'rgba(255,255,255,.2)',fontSize:10}} onClick={exportarDatos}>
            <i className="ti ti-download"></i> Backup
          </button>
          {/* Importar */}
          <label className="btn btn-sm" style={{background:'rgba(255,255,255,.1)',color:'#fff',borderColor:'rgba(255,255,255,.2)',fontSize:10,cursor:'pointer'}}>
            <i className="ti ti-upload"></i> Restaurar
            <input type="file" accept=".json" style={{display:'none'}} onChange={importarDatos}/>
          </label>
          {/* Reset */}
          <button className="btn btn-sm" style={{background:'rgba(255,0,0,.15)',color:'#ffaaaa',borderColor:'rgba(255,100,100,.3)',fontSize:10}} onClick={resetearDatos}>
            <i className="ti ti-trash"></i>
          </button>
        </div>
      </div>

      <div className="nav">
        {tabs.map(t=>(
          <button key={t.id} className={tab===t.id?'active':''} onClick={()=>setTab(t.id)}>
            <i className={`ti ${t.icon}`}></i>{t.label}
          </button>
        ))}
      </div>

      {tab==='control'    &&<TabControl {...sharedProps}/>}
      {tab==='facturacion'&&<TabFacturacion {...sharedProps}/>}
      {tab==='pyg'        &&<TabPyG {...sharedProps}/>}
      {tab==='caja'       &&<TabCaja {...sharedProps}/>}
      {tab==='facturas'   &&<TabFacturas {...sharedProps}/>}
      {tab==='extracto'   &&<TabExtracto {...sharedProps}/>}
      {tab==='gastos_tab' &&<TabGastos {...sharedProps}/>}
    </div>
  );
}

// PANEL DE CONTROL
// ══════════════════════════════════════════════
function TabControl({facturacion,clientes,gastos,impuestos,facturas,movimientosReal,saldoInicial,MES_ACTUAL,ingPresupMes,resultadoMes,cobrosPresupCajaMes,pagosPresupCajaMes,flujoPresupMes,flujoRealMes,saldoPresupAcum,saldoRealAcum,presupuestoFrozen,frozenAt,frozenIngMes,frozenFlujoCajaMes,frozenSaldoAcum}){
  const chartRef=useRef(null);const chartInst=useRef(null);
  const chartRef2=useRef(null);const chartInst2=useRef(null);

  const totIngAnual=MESES.reduce((_,__,m)=>_+ingPresupMes(m),0);
  const totResAnual=MESES.reduce((_,__,m)=>_+resultadoMes(m),0);
  const saldoFin=saldoPresupAcum(11);
  const saldoReal=saldoRealAcum(MES_ACTUAL);
  const saldoFrozenFin=presupuestoFrozen?frozenSaldoAcum(11):null;
  const totPend=facturas.filter(f=>f.estado==='Pendiente').reduce((s,f)=>s+(f.importe||f.totalFra||0),0);

  // Desviación vs frozen
  const desvIngAcum=presupuestoFrozen
    ?MESES.slice(0,MES_ACTUAL+1).reduce((_,__,m)=>_+ingPresupMes(m)-frozenIngMes(m),0):null;

  useEffect(()=>{
    if(!chartRef.current)return;
    if(chartInst.current)chartInst.current.destroy();
    const saldosP=MESES.map((_,m)=>Math.round(saldoPresupAcum(m)));
    const saldosR=MESES.map((_,m)=>{const fr=flujoRealMes(m);if(fr===null&&m>MES_ACTUAL)return null;return Math.round(saldoRealAcum(m));});
    const saldosF=presupuestoFrozen?MESES.map((_,m)=>Math.round(frozenSaldoAcum(m))):null;
    const ctx=chartRef.current.getContext('2d');
    const datasets=[
      {label:'Plan actual',data:saldosP,borderColor:'#1a2b4a',backgroundColor:'rgba(26,43,74,.07)',tension:.3,pointRadius:3,borderWidth:2,borderDash:[]},
      {label:'Real / mixto',data:saldosR,borderColor:'#1a7a45',backgroundColor:'rgba(26,122,69,.07)',tension:.3,pointRadius:4,borderWidth:2.5,spanGaps:false},
    ];
    if(saldosF) datasets.push({label:'Foto base',data:saldosF,borderColor:'#b06000',backgroundColor:'transparent',tension:.3,pointRadius:2,borderWidth:1.5,borderDash:[5,3]});
    chartInst.current=new Chart(ctx,{
      type:'line',data:{labels:MESES,datasets},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{grid:{display:false},ticks:{font:{size:10}}},
          y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:10},callback:v=>'€'+Math.round(v/1000)+'k'}}}}
    });
  },[facturacion,gastos,impuestos,saldoInicial,movimientosReal,facturas,presupuestoFrozen]);

  useEffect(()=>{
    if(!chartRef2.current)return;
    if(chartInst2.current)chartInst2.current.destroy();
    const ingP=MESES.map((_,m)=>Math.round(ingPresupMes(m)));
    const ingF=presupuestoFrozen?MESES.map((_,m)=>Math.round(frozenIngMes(m))):null;
    const ctx=chartRef2.current.getContext('2d');
    const datasets=[{label:'Plan actual',data:ingP,backgroundColor:'rgba(26,43,74,.65)',borderRadius:3}];
    if(ingF) datasets.push({label:'Foto base',data:ingF,backgroundColor:'rgba(176,96,0,.45)',borderRadius:3});
    chartInst2.current=new Chart(ctx,{
      type:'bar',data:{labels:MESES,datasets},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
        scales:{x:{grid:{display:false},ticks:{font:{size:10}}},
          y:{grid:{color:'rgba(0,0,0,.04)'},ticks:{font:{size:10},callback:v=>'€'+Math.round(v/1000)+'k'}}}}
    });
  },[facturacion,presupuestoFrozen]);

  return(
    <div>
      {!presupuestoFrozen&&(
        <div className="alert alert-warn">
          <i className="ti ti-snowflake"></i>
          <span>Sin presupuesto base congelado. Usa el botón <strong>"Congelar presupuesto base"</strong> en el header para guardar una foto inicial. A partir de ahí podrás ver las desviaciones respecto al plan original.</span>
        </div>
      )}

      <div className="metrics">
        <div className="metric">
          <div className="metric-label">Ingresos presup. año</div>
          <div className="metric-val green">{fmt(totIngAnual)}</div>

        <div className="metric">

        {presupuestoFrozen&&desvIngAcum!==null&&(

            <div className={`metric-val ${desvIngAcum>=0?'green':'red'}`}>{desvIngAcum>=0?'+':''}{fmt(desvIngAcum)}</div>
            <div className="metric-sub">vs foto base</div>
          </div>
        )}
      </div>

      <div className="grid2">
        <div className="card">
          <div className="card-header">
            <h2>Saldo de caja acumulado</h2>
            <div style={{display:'flex',gap:10,fontSize:10,color:'#666'}}>
              <span><span style={{display:'inline-block',width:12,height:2,background:'#1a2b4a',verticalAlign:'middle',marginRight:3}}></span>Plan actual</span>
              <span><span style={{display:'inline-block',width:12,height:2,background:'#1a7a45',verticalAlign:'middle',marginRight:3}}></span>Real/mixto</span>
              {presupuestoFrozen&&<span><span style={{display:'inline-block',width:12,height:2,background:'#b06000',verticalAlign:'middle',marginRight:3,borderTop:'1px dashed #b06000'}}></span>Foto base</span>}
            </div>
          </div>
          <div className="card-body">
            <div className="chart-container" style={{height:200}}><canvas ref={chartRef} role="img" aria-label="Saldo de caja acumulado"></canvas></div>
          </div>
        </div>
        <div className="card">
          <div className="card-header">
            <h2>Ingresos mensuales</h2>
            <div style={{display:'flex',gap:10,fontSize:10,color:'#666'}}>
              <span><span style={{display:'inline-block',width:10,height:10,background:'rgba(26,43,74,.65)',marginRight:3,verticalAlign:'middle'}}></span>Plan actual</span>
              {presupuestoFrozen&&<span><span style={{display:'inline-block',width:10,height:10,background:'rgba(176,96,0,.45)',marginRight:3,verticalAlign:'middle'}}></span>Foto base</span>}
            </div>
          </div>
          <div className="card-body">
            <div className="chart-container" style={{height:200}}><canvas ref={chartRef2} role="img" aria-label="Ingresos mensuales plan vs foto base"></canvas></div>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-header">
          <h2>Seguimiento mensual — Plan vs Real vs Foto base</h2>
          {presupuestoFrozen&&<span className="frozen-badge"><i className="ti ti-snowflake" style={{marginRight:3}}></i>Foto base: {frozenAt}</span>}
        </div>
        <div style={{overflowX:'auto'}}>
        <table>
          <thead>
            <tr>
              <th className="sticky-col" rowSpan={2}>Mes</th>
              <th colSpan={3} style={{textAlign:'center',background:'#e8f0fb',color:'#1a2b4a',borderBottom:'1px solid #c0d0e8'}}>COBROS CAJA</th>
              <th colSpan={2} style={{textAlign:'center',background:'#fdecea',color:'#b83232',borderBottom:'1px solid #e4c0c0'}}>PAGOS CAJA</th>
              <th colSpan={3} style={{textAlign:'center',background:'#f0f4f8',color:'#1a2b4a',borderBottom:'1px solid #c0d0e0'}}>FLUJO NETO</th>
              <th colSpan={3} style={{textAlign:'center',background:'#f4f6f9',color:'#1a2b4a',borderBottom:'1px solid #d8dce8'}}>SALDO ACUM.</th>
            </tr>
            <tr>
              <th className="num month-header-presup">Plan</th>
              <th className="num month-header-real">Real</th>
              <th className="num month-header-desv">Desv.</th>
              <th className="num month-header-presup">Plan</th>
              <th className="num month-header-real">Real</th>
              <th className="num month-header-presup">Plan</th>
              <th className="num month-header-real">Real</th>
              <th className="num month-header-desv">Desv.</th>
              <th className="num month-header-presup">Plan</th>
              <th className="num month-header-real">Real/mix</th>
              {presupuestoFrozen&&<th className="num" style={{background:'#fff4e0',color:'#b06000',fontSize:9}}>Foto base</th>}
            </tr>
          </thead>
          <tbody>
          {MESES.map((mes,m)=>{
            const cP=cobrosPresupCajaMes(m);
            const cR=flujoRealMes(m)!==null?movimientosReal.filter(mv=>mv.mes===m&&(mv.categoria==='Cobros de clientes'||mv.categoria==='Otros ingresos')).reduce((s,mv)=>s+mv.importe,0)+facturas.filter(f=>f.estado==='Cobrada'&&f.fechaCobro&&new Date(f.fechaCobro).getMonth()===m&&new Date(f.fechaCobro).getFullYear()===2026).reduce((s,f)=>s+(f.importe||f.totalFra||0),0):null;
            const pP=pagosPresupCajaMes(m);
            const pR=flujoRealMes(m)!==null?movimientosReal.filter(mv=>mv.mes===m&&mv.importe<0&&mv.categoria!=='Traspasos internos'&&mv.categoria!=='Cobros de clientes').reduce((s,mv)=>s+mv.importe,0):null;
            const fP=flujoPresupMes(m);
            const fR=flujoRealMes(m);
            const fDesv=fR!==null?fR-fP:null;
            const sP=saldoPresupAcum(m);
            const sR=saldoRealAcum(m);
            const sF=presupuestoFrozen?frozenSaldoAcum(m):null;
            const cDesv=cR!==null?cR-cP:null;
            const isCurr=m===MES_ACTUAL;const isPast=m<MES_ACTUAL;const hasReal=flujoRealMes(m)!==null;
            return(
              <tr key={m} style={isCurr?{outline:'2px solid #1a2b4a',outlineOffset:'-1px'}:{}}>
                <td className="sticky-col" style={{fontWeight:isCurr?700:400,whiteSpace:'nowrap'}}>
                  {mes}{isCurr&&<span className="pill pill-blue" style={{marginLeft:5}}>Hoy</span>}
                </td>
                <td className="num col-presup">{fmt(cP)}</td>
                <td className="num col-real">{cR!==null?<span className="green">{fmt(cR)}</span>:'—'}</td>
                <td className={cx('num col-desv',cDesv!==null?sign(cDesv):'desv-zero')}>{cDesv!==null?(cDesv>=0?'+':'')+fmt(cDesv):'—'}</td>
                <td className="num col-presup red">{fmt(pP)}</td>
                <td className="num col-real">{pR!==null?<span className="red">{fmt(pR)}</span>:'—'}</td>
                <td className={cx('num',fP>=0?'green':'red')}>{fmt(fP)}</td>
                <td className={cx('num',fR!==null?(fR>=0?'green':'red'):'gray')}>{fR!==null?fmt(fR):'—'}</td>
                <td className={cx('num',fDesv!==null?sign(fDesv):'desv-zero')}>{fDesv!==null?(fDesv>=0?'+':'')+fmt(fDesv):'—'}</td>
                <td className={cx('num',sP>=20000?'green':sP>=0?'orange':'red')}>{fmt(sP)}</td>
                <td className={cx('num',sR>=20000?'green':sR>=0?'orange':'red')}><strong>{fmt(sR)}</strong></td>
                {presupuestoFrozen&&<td className={cx('num','orange')} style={{fontStyle:'italic'}}>{fmt(sF)}</td>}
              </tr>
            );
          })}
          </tbody>
        </table>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════
// TAB FACTURACIÓN
// ══════════════════════════════════════════════
function TabFacturacion({facturacion,setFacturacion,clientes,setClientes,addCliente,ingPresupMes,mesesCerrados,setMesesCerrados}){
  const [nuevo,setNuevo]=useState('');

  const handleAdd=()=>{
    if(!nuevo.trim())return;
    addCliente(nuevo);
    setNuevo('');
  };
  const upd=(cid,m,v)=>setFacturacion(p=>{
    const n={...p,[cid]:[...(p[cid]||Array(12).fill(0))]};
    n[cid][m]=parseFloat(v)||0;
    return n;
  });
  const delC=id=>{if(!confirm('¿Eliminar?'))return;setClientes(p=>p.filter(c=>c.id!==id));setFacturacion(p=>{const n={...p};delete n[id];return n;});};
  const updIVA=(id,iva)=>setClientes(p=>p.map(c=>c.id===id?{...c,iva:parseFloat(iva)}:c));
  const toggleCerrado=m=>setMesesCerrados(p=>({...p,[m]:!p[m]}));

  const totAnual=MESES.reduce((_,__,m)=>_+ingPresupMes(m),0);

  return(
    <div>
      <div className="alert alert-info">
        <i className="ti ti-info-circle"></i>
        Previsión de facturación por cliente y mes (base imponible, sin IVA). Haz clic en el encabezado de mes para marcarlo como <strong>cerrado</strong> (real confirmado). El plan de caja aplica IVA por cliente para proyectar los cobros.
      </div>

      {/* Leyenda meses */}
      <div style={{display:'flex',gap:16,marginBottom:10,fontSize:11,flexWrap:'wrap',alignItems:'center'}}>
        <span style={{display:'flex',alignItems:'center',gap:5}}>
          <span style={{width:14,height:14,background:'#f4f8ff',border:'1px solid #c0d0e8',borderRadius:2,display:'inline-block'}}></span>
          Previsión
        </span>
        <span style={{display:'flex',alignItems:'center',gap:5}}>
          <span style={{width:14,height:14,background:'#eaf7ee',border:'1px solid #7dc89a',borderRadius:2,display:'inline-block'}}></span>
          <i className="ti ti-lock" style={{fontSize:11,color:'#1a7a45'}}></i> Mes cerrado (real)
        </span>
        <span style={{color:'#888'}}>Haz clic en el nombre del mes para abrirlo/cerrarlo</span>
      </div>

      <div className="card">
        <div className="card-header">
          <h2>Previsión facturación 2026</h2>
          <div className="form-row" style={{margin:0}}>
            <input
              value={nuevo}
              onChange={e=>setNuevo(e.target.value)}
              onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();handleAdd();}}}
              placeholder="Nuevo cliente..."
              style={{width:160}}
            />
            <button className="btn btn-primary btn-sm" type="button"
              onClick={handleAdd}>
              <i className="ti ti-plus"></i> Añadir
            </button>
          </div>
        </div>
        <div style={{overflowX:'auto'}}>
        <table style={{minWidth:1200}}>
          <thead>
            <tr>
              <th className="sticky-col" style={{minWidth:160}}>Cliente</th>
              <th className="num" style={{minWidth:55}}>IVA</th>
              {MESES.map((m,i)=>{
                const cerrado=mesesCerrados[i];
                return(
                  <th key={i} className="num"
                    style={{cursor:'pointer',background:cerrado?'#c8ecd4':'#f4f6f9',
                      color:cerrado?'#1a7a45':'#555',minWidth:72,userSelect:'none'}}
                    onClick={()=>toggleCerrado(i)}
                    title={cerrado?`${m}: cerrado — clic para reabrir`:`${m}: previsión — clic para cerrar`}>
                    {cerrado?<i className="ti ti-lock" style={{fontSize:9,marginRight:2}}></i>
                            :<i className="ti ti-pencil" style={{fontSize:9,marginRight:2,opacity:.4}}></i>}
                    {m}
                  </th>
                );
              })}
              <th className="num">Total año</th>
              <th className="num" style={{color:'#1a2b4a'}}>Con IVA</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
          {clientes.map(c=>{
            const fila=facturacion[c.id]||Array(12).fill(0);
            const iva=c.iva!=null?c.iva:0.21;
            const totalBase=fila.reduce((s,v)=>s+v,0);
            const totalConIVA=totalBase*(1+iva);
            return(
              <tr key={c.id}>
                <td className="sticky-col">
                  <input
                    style={{background:'transparent',border:'none',borderBottom:'1px dashed transparent',
                      fontWeight:500,fontSize:12,width:'100%',minWidth:140,padding:'1px 2px'}}
                    value={c.nombre}
                    onChange={e=>setClientes(p=>p.map(x=>x.id===c.id?{...x,nombre:e.target.value}:x))}
                    onFocus={e=>e.target.style.borderBottomColor='#1a2b4a'}
                    onBlur={e=>e.target.style.borderBottomColor='transparent'}
                    title="Clic para editar nombre"
                  />
                </td>
                <td className="num">
                  <select value={iva}
                    onChange={e=>updIVA(c.id,e.target.value)}
                    style={{fontSize:10,padding:'2px 3px',border:'1px solid #ddd',borderRadius:3,
                      width:52,background:iva===0?'#fff8e6':'#fff',
                      color:iva===0?'#b06000':'#333',fontWeight:iva===0?700:400}}>
                    <option value={0.21}>21%</option>
                    <option value={0.1}>10%</option>
                    <option value={0}>0%</option>
                  </select>
                </td>
                {fila.map((v,m)=>{
                  const cerrado=mesesCerrados[m];
                  return(
                    <td key={m} className="num"
                      style={{background:cerrado?'#eaf7ee':'',
                        borderLeft:cerrado?'1px solid #b8dfc4':''}}>
                      <input className="inline-edit" type="number" value={v||''} placeholder="—"
                        onChange={e=>upd(c.id,m,e.target.value)}
                        style={{color:cerrado?'#1a7a45':'#1a1a1a',
                          borderBottomColor:cerrado?'#7dc89a':'#ccc'}}/>
                    </td>
                  );
                })}
                <td className="num green" style={{fontWeight:600}}>{fmt(totalBase)}</td>
                <td className="num" style={{fontWeight:600,color:'#1a2b4a',fontSize:11}}>
                  {iva===0
                    ?<span style={{color:'#b06000',fontSize:10}}>sin IVA</span>
                    :fmt(totalConIVA)}
                </td>
                <td><button className="btn btn-sm btn-danger" onClick={()=>delC(c.id)}><i className="ti ti-trash"></i></button></td>
              </tr>
            );
          })}
          <tr className="total-row">
            <td className="sticky-col">TOTAL BASE</td>
            <td></td>
            {MESES.map((_,m)=>{
              const cerrado=mesesCerrados[m];
              return(
                <td key={m} className="num"
                  style={{background:cerrado?'#d4f0dc':'',fontWeight:700}}>
                  {fmt(ingPresupMes(m))}
                </td>
              );
            })}
            <td className="num">{fmt(totAnual)}</td>
            <td className="num" style={{color:'#1a2b4a',fontWeight:700}}>
              {fmt(clientes.reduce((s,c)=>{
                const iva=c.iva!=null?c.iva:0.21;
                return s+(facturacion[c.id]||[]).reduce((a,v)=>a+v,0)*(1+iva);
              },0))}
            </td>
            <td></td>
          </tr>
          <tr style={{background:'#f0f7f4'}}>
            <td className="sticky-col" style={{fontWeight:600,fontSize:11,color:'#1a7a45'}}>
              <i className="ti ti-building-bank" style={{marginRight:4}}></i>COBROS CAJA (base+IVA)
            </td>
            <td></td>
            {MESES.map((_,m)=>{
              const cerrado=mesesCerrados[m];
              const cobro=clientes.reduce((s,c)=>{
                const base=facturacion[c.id]?.[m]||0;
                const iva=c.iva!=null?c.iva:0.21;
                return s+base*(1+iva);
              },0);
              return(
                <td key={m} className="num"
                  style={{color:'#1a7a45',fontWeight:600,background:cerrado?'#d4f0dc':'#f0f7f4'}}>
                  {fmt(cobro)}
                </td>
              );
            })}
            <td className="num" style={{color:'#1a7a45',fontWeight:700}}>
              {fmt(clientes.reduce((s,c)=>{
                const iva=c.iva!=null?c.iva:0.21;
                return s+(facturacion[c.id]||[]).reduce((a,v)=>a+v*(1+iva),0);
              },0))}
            </td>
            <td></td><td></td>
          </tr>
          </tbody>
        </table>
        </div>
      </div>
    </div>
  );
}

// TAB PyG
// ══════════════════════════════════════════════
function TabPyG({clientes,facturacion,gastos,impuestos,ingPresupMes,mbMes,gastosFijosMes,imptosMes,resultadoMes,mesesCerrados,presupuestoFrozen,frozenIngMes}){
  const [vista,setVista]=useState('presupuesto'); // 'presupuesto' | 'comparativa'

  const cv=['nominas','ss','rosalia','legalpigeon'];
  const cvG=gastos.filter(g=>cv.includes(g.id));
  const struct=gastos.filter(g=>!cv.includes(g.id));

  // Margen bruto %
  const mbPct=m=>{const ing=ingPresupMes(m);return ing!==0?Math.round(mbMes(m)/ing*100):0;};
  // Resultado %
  const resPct=m=>{const ing=ingPresupMes(m);return ing!==0?Math.round(resultadoMes(m)/ing*100):0;};

  // Totales anuales
  const totIng=MESES.reduce((_,__,m)=>_+ingPresupMes(m),0);
  const totMB=MESES.reduce((_,__,m)=>_+mbMes(m),0);
  const totRes=MESES.reduce((_,__,m)=>_+resultadoMes(m),0);
  const totIngFrozen=presupuestoFrozen?MESES.reduce((_,__,m)=>_+(frozenIngMes(m)||0),0):null;

  // Fila genérica
  const Row=({label,vals,bold,sec,indent,green,red,pct,pctVals})=>(
    <tr className={sec?'section-row':bold?'':''}
      style={bold&&!sec?{background:'#f0f4f8'}:{}}>
      <td className="sticky-col" style={{fontWeight:bold?700:400,paddingLeft:indent?22:9,fontSize:sec?10:12}}>
        {label}
      </td>
      {vals.map((v,i)=>{
        const cerrado=mesesCerrados[i];
        const cls=v>0&&green?'green':v<0&&red?'red':v<0&&green?'red':v>0&&red?'green':'';
        return(
          <td key={i} className={`num ${cls}`}
            style={{background:cerrado?'#f0f7f4':'',fontSize:11,
              borderLeft:cerrado&&i===0?'':cerrado?'':''}}>
            {bold?<strong>{v===0?'—':fmt(v)}</strong>:(v===0?'—':fmt(v))}
            {pct&&pctVals&&pctVals[i]!==0&&<div style={{fontSize:8,color:'#888',textAlign:'right'}}>{pctVals[i]}%</div>}
          </td>
        );
      })}
      <td className={`num ${vals.reduce((s,v)=>s+v,0)>0&&green?'green':vals.reduce((s,v)=>s+v,0)<0&&red?'red':''}`}
        style={{fontWeight:bold?700:500,borderLeft:'1px solid #e0e0e0',fontSize:11}}>
        {bold?<strong>{fmt(vals.reduce((s,v)=>s+v,0))}</strong>:fmt(vals.reduce((s,v)=>s+v,0))}
      </td>
    </tr>
  );

  return(
    <div>
      <div className="metrics">
        <div className="metric">
          <div className="metric-label">Ingresos presup. año</div>
          <div className="metric-val green">{fmt(totIng)}</div>
          {presupuestoFrozen&&totIngFrozen!==null&&<div className="metric-sub">Foto base: {fmt(totIngFrozen)}</div>}
        </div>
        <div className="metric">
          <div className="metric-label">Margen bruto año</div>
          <div className={`metric-val ${totMB>=0?'green':'red'}`}>{fmt(totMB)}</div>
          <div className="metric-sub">{totIng?Math.round(totMB/totIng*100):0}% sobre ventas</div>
        </div>
        <div className="metric">
          <div className="metric-label">Resultado ejercicio</div>
          <div className={`metric-val ${totRes>=0?'green':'red'}`}>{fmt(totRes)}</div>
          <div className="metric-sub">{totIng?Math.round(totRes/totIng*100):0}% sobre ventas</div>
        </div>
        {presupuestoFrozen&&(
          <div className="metric">
            <div className="metric-label">Desv. ingresos vs base</div>
            <div className={`metric-val ${totIng-totIngFrozen>=0?'green':'red'}`}>
              {totIng-totIngFrozen>=0?'+':''}{fmt(totIng-totIngFrozen)}
            </div>
            <div className="metric-sub">vs foto base {fmt(totIngFrozen)}</div>
          </div>
        )}
      </div>

      <div className="card">
        <div className="card-header">
          <h2>Cuenta de explotación · BMG Law Services 2026</h2>
          <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
            <button className={`btn btn-sm ${vista==='presupuesto'?'btn-primary':''}`}
              onClick={()=>setVista('presupuesto')}>Plan</button>
            {presupuestoFrozen&&(
              <button className={`btn btn-sm ${vista==='comparativa'?'btn-primary':''}`}
                onClick={()=>setVista('comparativa')}>Plan vs Foto base</button>
            )}
            <span style={{fontSize:10,color:'#888',marginLeft:4}}>
              <i className="ti ti-info-circle" style={{marginRight:3}}></i>
              Vista calculada — edita datos en <strong>Previsión facturación</strong> y <strong>Gastos fijos</strong>. Cierra los meses ahí.
            </span>
          </div>
        </div>
        <div style={{overflowX:'auto'}}>

        {vista==='presupuesto'&&(
        <table style={{minWidth:1050}}>
          <thead><tr>
            <th className="sticky-col" style={{minWidth:220}}>Concepto</th>
            {MESES.map((m,i)=>{
              const cerrado=mesesCerrados[i];
              return(
                <th key={i} className="num month-col-header"
                  title={cerrado?`${MESES_FULL[i]}: mes cerrado — edita en "Previsión facturación" o "Gastos fijos"`:`${MESES_FULL[i]}: previsión — cierra el mes en "Previsión facturación" o "Gastos fijos"`}
                  style={{background:cerrado?'#e0f0e8':'#f4f6f9',
                    color:cerrado?'#1a7a45':'#555',minWidth:68,cursor:'help'}}>

                <th key={`b${i}`} className="num" style={{fontSize:9,background:'#fff4e0',color:'#b06000'}}>Base</th>

              return ingF+cvF;
            },bold:true,green:true},
            {label:'RESULTADO',planFn:m=>resultadoMes(m),frozenFn:m=>{
              const ingF=frozenIngMes(m)||0;

              const impF=presupuestoFrozen.impuestos.reduce((s,i)=>s+(i.importes[m]||0),0);
              return ingF+gastF+impF;
            },bold:true,green:true},
          ].map(({label,planFn,frozenFn,bold,green})=>{
            const totPlan=MESES.reduce((_,__,m)=>_+planFn(m),0);
            const totFrozen=MESES.reduce((_,__,m)=>_+frozenFn(m),0);
            return(
              <tr key={label} style={{background:bold?'#f0f4f8':''}}>
                <td className="sticky-col" style={{fontWeight:bold?700:400}}>{label}</td>
                {MESES.map((_,m)=>{
                  const plan=planFn(m);const frozen=frozenFn(m);const desv=plan-frozen;
                  return[
                    <td key={`p${m}`} className={`num ${green&&plan>0?'green':plan<0?'red':''}`}
                      style={{background:'#f4f8ff',fontSize:11,borderLeft:'1px solid #e8e8e8'}}>
                      {bold?<strong>{fmt(plan)}</strong>:fmt(plan)}
                    </td>,
                    <td key={`b${m}`} className="num"
                      style={{background:'#fffaf0',fontSize:11,color:'#888'}}>
                      {fmt(frozen)}
                    </td>
                  ];
                })}
                <td className={`num ${totPlan-totFrozen>=0?'green':'red'}`}
                  style={{fontWeight:700,borderLeft:'1px solid #ddd',fontSize:11}}>
                  {totPlan-totFrozen>=0?'+':''}{fmt(totPlan-totFrozen)}
                </td>
              </tr>
            );
          })}
          </tbody>
        </table>
        )}

        </div>
      </div>
    </div>
  );
}

// TAB PLAN DE CAJA
// ══════════════════════════════════════════════
function TabCaja({gastos,impuestos,facturas,saldoInicial,setSaldoInicial,MES_ACTUAL,
  cobrosExtractoMes,pagosExtractoMes,cobrosFacturasMes,previsionSinFacturasMes,
  cobrosEsperadosMes,entradasExtractoMes,cobrosPresupCajaMes,
  pagosPresupCajaMes,flujoPresupMes,saldoPresupAcum,
  hayFacturasPendientesMes,mesCerrado,hayExtractoMes,fuenteMes,mesesCerrados}){

  const estiloMes=m=>{
    const f=fuenteMes(m);
    if(f==='extracto')              return{label:'Real',      lc:'#1a7a45',bg:'#e8f7ee',bd:'#7dc89a'};
    if(f==='presupuesto_pendiente') return{label:'Sin extr.', lc:'#b06000',bg:'#fff8e6',bd:'#e0c060'};
    if(m===MES_ACTUAL)              return{label:'Actual',    lc:'#1a2b4a',bg:'#e8f0fb',bd:'#90b0d8'};
    return                                {label:'Prev.',     lc:'#888',   bg:'',       bd:'transparent'};
  };

  const saldoFin=saldoPresupAcum(11);
  const totCobros=MESES.reduce((_,__,m)=>_+cobrosPresupCajaMes(m),0);
  const totPagos=MESES.reduce((_,__,m)=>_+pagosPresupCajaMes(m),0);

  return(
    <div>
      <div style={{display:'flex',gap:12,marginBottom:12,flexWrap:'wrap',fontSize:11,alignItems:'center'}}>
        {[
          {l:'Real',       bg:'#e8f7ee',c:'#1a7a45',d:'Extracto bancario subido'},
          {l:'Sin extr.',  bg:'#fff8e6',c:'#b06000',d:'Mes cerrado, pendiente de subir extracto'},
          {l:'Prev.',      bg:'#f4f6f9',c:'#888',   d:'Mes futuro — facturas + previsión'},
        ].map(({l,bg,c,d})=>(
          <span key={l} style={{display:'flex',alignItems:'center',gap:5}}>
            <span style={{padding:'1px 7px',background:bg,color:c,borderRadius:3,fontSize:10,fontWeight:700}}>{l}</span>
            <span style={{color:'#888'}}>{d}</span>
          </span>
        ))}
      </div>

      <div className="metrics">
        <div className="metric"><div className="metric-label">Saldo inicial</div><div className="metric-val blue">{fmt(saldoInicial)}</div></div>
        <div className="metric"><div className="metric-label">Total cobros año</div><div className="metric-val green">{fmt(totCobros)}</div></div>
        <div className="metric"><div className="metric-label">Total pagos año</div><div className="metric-val red">{fmt(totPagos)}</div></div>
        <div className="metric"><div className="metric-label">Saldo fin de año</div>
          <div className={`metric-val ${saldoFin>=20000?'green':saldoFin>=0?'orange':'red'}`}>{fmt(saldoFin)}</div></div>
      </div>

      <div className="card">
        <div className="card-header">
          <h2>Plan de caja · BMG Law Services 2026</h2>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <span style={{fontSize:11,color:'#666'}}>Saldo inicial (€):</span>
            <input type="number" value={saldoInicial} onChange={e=>setSaldoInicial(parseFloat(e.target.value)||0)} style={{width:100}}/>
          </div>
        </div>
        <div style={{overflowX:'auto'}}>
        <table style={{minWidth:1050}}>
          <thead><tr>
            <th className="sticky-col" style={{minWidth:230}}>Concepto</th>
            {MESES.map((_,m)=>{const e=estiloMes(m);return(
              <th key={m} className="num" style={{minWidth:72,fontSize:9,background:e.bg||'#f4f6f9',borderBottom:`2px solid ${e.bd}`}}>
                <div style={{color:'#444'}}>{MESES[m]}</div>
                <div style={{color:e.lc,fontWeight:700,marginTop:1}}>{e.label}</div>
              </th>
            );})}
            <th className="num" style={{borderLeft:'1px solid #ddd',minWidth:80}}>Total año</th>
          </tr></thead>
          <tbody>

          <tr className="section-row"><td colSpan={14}>COBROS (ENTRADAS)</td></tr>

          {/* Cobros banco — meses con extracto */}
          <tr>
            <td className="sticky-col" style={{paddingLeft:20,fontSize:11}}>Cobros banco <span className="tag tag-real">extracto</span></td>
            {MESES.map((_,m)=>{const v=cobrosExtractoMes(m);const h=hayExtractoMes(m);return(
              <td key={m} className="num" style={{background:h?'#f0fbf4':'',fontSize:11,color:h&&v>0?'#1a7a45':'#ccc'}}>
                {h?fmt(v):'—'}
              </td>
            );})}
            <td className="num green" style={{borderLeft:'1px solid #ddd'}}>{fmt(MESES.reduce((_,__,m)=>_+(hayExtractoMes(m)?cobrosExtractoMes(m):0),0))}</td>
          </tr>

          {/* Facturas pendientes — meses futuros sin extracto */}
          <tr>
            <td className="sticky-col" style={{paddingLeft:20,fontSize:11}}>Facturas pendientes <span className="tag tag-prev">prev.</span></td>
            {MESES.map((_,m)=>{const v=cobrosFacturasMes(m);const show=!hayExtractoMes(m)&&hayFacturasPendientesMes(m);return(
              <td key={m} className="num" style={{fontSize:11,color:show?'#1a2b4a':'#ccc'}}>{show?fmt(v):'—'}</td>
            );})}
            <td className="num" style={{borderLeft:'1px solid #ddd',color:'#1a2b4a'}}>{fmt(MESES.reduce((_,__,m)=>_+(!hayExtractoMes(m)&&hayFacturasPendientesMes(m)?cobrosFacturasMes(m):0),0))}</td>
          </tr>

          {/* Previsión sin factura — meses futuros sin extracto */}
          <tr>
            <td className="sticky-col" style={{paddingLeft:20,fontSize:11}}>Previsión s/factura <span className="tag tag-prev">prev.</span></td>
            {MESES.map((_,m)=>{const v=previsionSinFacturasMes(m);const show=!hayExtractoMes(m)&&v>0;return(
              <td key={m} className="num" style={{fontSize:11,color:show?'#888':'#ccc',fontStyle:'italic'}}>{show?fmt(v):'—'}</td>
            );})}
            <td className="num" style={{borderLeft:'1px solid #ddd',color:'#888',fontStyle:'italic'}}>{fmt(MESES.reduce((_,__,m)=>_+(!hayExtractoMes(m)?previsionSinFacturasMes(m):0),0))}</td>
          </tr>

          {/* Traspasos/deuda ya incluidos en "Cobros banco" cuando hay extracto */}

          <tr className="total-row">
            <td className="sticky-col">TOTAL COBROS</td>
            {MESES.map((_,m)=><td key={m} className="num green"><strong>{fmt(cobrosPresupCajaMes(m))}</strong></td>)}
            <td className="num green" style={{borderLeft:'1px solid #ddd'}}><strong>{fmt(totCobros)}</strong></td>
          </tr>

          <tr className="section-row"><td colSpan={14}>PAGOS (SALIDAS) — extracto donde disponible · presupuesto neto (base+IVA−IRPF) en resto</td></tr>

          {/* Pagos banco — meses con extracto */}
          <tr>
            <td className="sticky-col" style={{paddingLeft:20,fontSize:11}}>Pagos banco <span className="tag tag-real">extracto</span></td>
            {MESES.map((_,m)=>{const v=pagosExtractoMes(m);const h=hayExtractoMes(m);return(
              <td key={m} className="num" style={{background:h?'#fef4f4':'',fontSize:11,color:h&&v<0?'#b83232':'#ccc'}}>
                {h?fmt(v):'—'}
              </td>
            );})}
            <td className="num red" style={{borderLeft:'1px solid #ddd'}}>{fmt(MESES.reduce((_,__,m)=>_+(hayExtractoMes(m)?pagosExtractoMes(m):0),0))}</td>
          </tr>

          {/* Pagos presupuestados — meses sin extracto, por partida */}
          {gastos.map(g=>{
            const iva=g.iva||0;const irpf=g.irpf||0;const tieneImp=iva!==0||irpf!==0;
            return(
              <tr key={g.id}>
                <td className="sticky-col" style={{paddingLeft:20,fontSize:11}}>
                  {g.concepto}

                </td>
                {g.importes.map((base,m)=>{
                  if(hayExtractoMes(m))return<td key={m} className="num" style={{color:'#ccc',fontSize:11}}>—</td>;
                  const neto=base*(1+iva-irpf);const cerrado=mesCerrado(m);
                  return<td key={m} className="num red" style={{background:cerrado?'#fff8e6':'',fontSize:11,color:cerrado?'#b06000':''}}>{neto===0?'—':fmt(neto)}</td>;
                })}
                <td className="num red" style={{borderLeft:'1px solid #ddd',fontSize:11}}>
                  {fmt(MESES.reduce((_,__,m)=>hayExtractoMes(m)?_:_+g.importes[m]*(1+iva-irpf),0))}
                </td>
              </tr>

          })}

          <tr className="section-row" style={{fontSize:10}}><td colSpan={14}>Impuestos y pagos variables (presupuesto)</td></tr>
          {impuestos.map(i=>(

                <td key={m} className="num red" style={{fontSize:11,color:hayExtractoMes(m)?'#ccc':''}}>
                  {hayExtractoMes(m)||v===0?'—':fmt(v)}

              ))}
              <td className="num red" style={{borderLeft:'1px solid #ddd',fontSize:11}}>{fmt(MESES.reduce((_,__,m)=>hayExtractoMes(m)?_:_+(i.importes[m]||0),0))}</td>
            </tr>
          ))}

          <tr className="total-row">
            <td className="sticky-col">TOTAL PAGOS</td>
            {MESES.map((_,m)=><td key={m} className="num red"><strong>{fmt(pagosPresupCajaMes(m))}</strong></td>)}
            <td className="num red" style={{borderLeft:'1px solid #ddd'}}><strong>{fmt(totPagos)}</strong></td>
          </tr>

          <tr style={{background:'#f0f4f8'}}>
            <td className="sticky-col" style={{fontWeight:700,fontSize:12}}>FLUJO NETO DEL MES</td>
            {MESES.map((_,m)=>{const f=flujoPresupMes(m);return(
              <td key={m} className={`num ${f>=0?'green':'red'}`} style={{fontWeight:700}}>{fmt(f)}</td>
            );})}
            <td className="num" style={{borderLeft:'1px solid #ddd',fontWeight:700}}>{fmt(MESES.reduce((_,__,m)=>_+flujoPresupMes(m),0))}</td>
          </tr>

          <tr className="saldo-row">
            <td className="sticky-col" style={{fontWeight:700,color:'#fff'}}>SALDO ACUMULADO</td>
            {MESES.map((_,m)=>{
              const s=saldoPresupAcum(m);const f=fuenteMes(m);
              return(
                <td key={m} className="num" style={{color:'#fff',fontWeight:700,
                  background:f==='extracto'?'#162340':f==='presupuesto_pendiente'?'#3d2800':'#1a2b4a',
                  borderBottom:f==='extracto'?'3px solid #7dc89a':f==='presupuesto_pendiente'?'3px solid #e0c060':''}}>
                  <strong>{fmt(s)}</strong>
                  {s<0&&<div style={{fontSize:8,color:'#ffaaaa'}}>⚠</div>}

              );
            })}
            <td style={{borderLeft:'1px solid rgba(255,255,255,.2)'}}></td>
          </tr>

          </tbody>
        </table>
        </div>
      </div>
    </div>
  );
