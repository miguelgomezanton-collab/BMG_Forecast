// TAB FACTURAS PENDIENTES
// ══════════════════════════════════════════════
function TabFacturas({facturas,setFacturas,MES_ACTUAL}){
  const blank={id:'',cliente:'',clienteNm:'',exp:'',concepto:'',fecha:'',importe:'',diasRetraso:'',reclamacion:'',ultimaRecl:'',respuestaCliente:'',mesCobro:MES_ACTUAL,estado:'Pendiente',fechaCobro:''};
  const [form,setForm]=useState(blank);
  const [editId,setEditId]=useState(null);
  const [filtroMes,setFiltroMes]=useState('todos');
  const [filtroEstado,setFiltroEstado]=useState('todos');
  const [filtroCliente,setFiltroCliente]=useState('todos');
  const [importLog,setImportLog]=useState(null);
  const ESTADOS=['Pendiente','No vencida','Cobrada','En disputa','Controlado','PDT Resolución Jud.','Nuevo Vencimiento','Sin Respuesta','Incobrable','Cancelada'];

  // Convierte número serial de Excel a fecha YYYY-MM-DD
  const excelSerialToDate=serial=>{
    if(!serial||isNaN(serial))return'';
    const d=new Date((serial-25569)*86400*1000);
    return d.toISOString().split('T')[0];
  };

  // Estima mes de cobro basado en estado y días de retraso
  const estimarMesCobro=(estado,diasRetraso)=>{
    const e=(estado||'').toUpperCase();
    if(e.includes('RESOLUCIÓN')||e.includes('JUDICIAL'))return 11; // fin de año por defecto
    if(e.includes('CONTROLADO'))return MES_ACTUAL+1<=11?MES_ACTUAL+1:11;
    if(e.includes('NUEVO VENCIMIENTO'))return MES_ACTUAL+1<=11?MES_ACTUAL+1:11;
    if(e.includes('SIN RESPUESTA'))return MES_ACTUAL+2<=11?MES_ACTUAL+2:11;
    const dias=parseInt(diasRetraso)||0;
    if(dias>500)return 11;
    if(dias>200)return Math.min(MES_ACTUAL+3,11);
    if(dias>60)return Math.min(MES_ACTUAL+2,11);
    return Math.min(MES_ACTUAL+1,11);
  };

  const guardar=()=>{
    if(!form.id||!form.cliente||!form.importe){alert('Completa Nº Factura, Cliente e Importe');return;}
    const f={...form,importe:parseFloat(form.importe)||0,mesCobro:parseInt(form.mesCobro)};
    if(editId){setFacturas(p=>p.map(x=>x.id===editId?f:x));setEditId(null);}
    else setFacturas(p=>[...p,f]);
    setForm(blank);
  };

  const cambiarEstado=(id,estado,fechaCobro='')=>{
    setFacturas(p=>p.map(f=>{
      if(f.id!==id)return f;
      const fc=(estado==='Cobrada'&&!f.fechaCobro)?fechaCobro||new Date().toISOString().split('T')[0]:f.fechaCobro;
      return{...f,estado,fechaCobro:fc};
    }));
  };

  // ── IMPORTADOR EXCEL BMG (.xlsx) con SheetJS ──
  // Lee el archivo .xlsx directamente (sin necesidad de exportar a CSV).
  // Lee AMBAS pestañas en una sola subida:
  //   "FACTURAS PENDIENTES"        → filas con estado, días retraso, observaciones
  //   "FACTURAS EMITIDAS NO VENCIDAS" → filas sin estado (se asigna "No vencida")
  //
  // REGLA DE FUSIÓN:
  //   - Cobradas en la app → SIEMPRE se preservan (nunca se tocan)
  //   - En el Excel + ya cobradas en la app → se ignoran (ya cobradas)
  //   - En el Excel + ya existían no-cobradas → se ACTUALIZAN
  //   - En el Excel + nuevas → se AÑADEN
  //   - No están en el Excel + no cobradas + en disputa/judicial/controlado → se CONSERVAN
  //   - No están en el Excel + no cobradas + estado normal → se ELIMINAN

  const parsearHojaXLSX=(rows, estadoDefault)=>{
    if(!rows||rows.length<2)return[];
    // Primera fila = cabeceras
    const headers=rows[0].map(h=>String(h||'').trim().toUpperCase());
    const ci={};
    const COLMAP={
      exp:['EXP','EXP.'],cliente:['CLIENTE'],clienteNm:['CLIENTE NM'],
      factura:['FACTURA'],fecha:['FECHA FACTURA','FECHA FRA'],
      mesFra:['MES FACTURA'],importe:['IMPORTE FACTURA','IMPORTE'],
      diasRetraso:['DÍAS RETRASO','DIAS RETRASO'],reclamacion:['RECLAMACIÓN','RECLAMACION'],
      ultimaRecl:['ÚLTIMA RECL.','ULTIMA RECL'],respuestaCliente:['RESPUESTA CLIENTE'],
      estado:['ESTADO'],
    };
    Object.entries(COLMAP).forEach(([key,aliases])=>{
      const idx=headers.findIndex(h=>aliases.some(a=>h.includes(a)));
      if(idx>=0)ci[key]=idx;
    });
    if(ci.factura===undefined||ci.importe===undefined)return[];

    const resultado=[];
    rows.slice(1).forEach(row=>{
      const g=i=>(i!==undefined&&row[i]!==undefined&&row[i]!==null)?String(row[i]).trim():'';
      const factura=g(ci.factura);
      const importe=parseFloat(String(g(ci.importe)).replace(',','.'))||0;
      if(!factura||!importe)return;

      // Fechas: SheetJS puede dar número serial o string
      const fechaRaw=ci.fecha!==undefined?row[ci.fecha]:'';
      let fechaISO='';
      if(typeof fechaRaw==='number'){
        fechaISO=excelSerialToDate(fechaRaw);
      } else if(fechaRaw){
        const s=String(fechaRaw).trim();
        if(/^\d{5}$/.test(s)) fechaISO=excelSerialToDate(parseInt(s));
        else fechaISO=s;
      }

      const estadoRaw=g(ci.estado)||estadoDefault;
      const diasRetraso=parseInt(g(ci.diasRetraso))||0;

      let mesCobro;
      if(estadoDefault==='No vencida'){
        const d=new Date(fechaISO);
        const v=new Date(d.getTime()+45*86400000);
        mesCobro=isNaN(v.getTime())?Math.min(MES_ACTUAL+1,11):Math.min(v.getMonth(),11);
      } else {
        mesCobro=estimarMesCobro(estadoRaw,diasRetraso);
      }

      // Fecha última reclamación
      const ulRaw=ci.ultimaRecl!==undefined?row[ci.ultimaRecl]:'';
      const ultimaRecl=typeof ulRaw==='number'?excelSerialToDate(ulRaw):String(ulRaw||'').trim();

      resultado.push({
        id:factura,
        exp:g(ci.exp),cliente:g(ci.cliente),clienteNm:g(ci.clienteNm),
        concepto:'',fecha:fechaISO,importe,diasRetraso,
        reclamacion:g(ci.reclamacion),ultimaRecl,
        respuestaCliente:g(ci.respuestaCliente),
        mesCobro,
        estado:estadoDefault==='No vencida'?'No vencida':normalizarEstado(estadoRaw),
        fechaCobro:'',_origen:estadoDefault,
      });
    });
    return resultado;
  };

  const fusionar=(delExcel,appActual)=>{
    const cobradas=appActual.filter(f=>f.estado==='Cobrada');
    const cobradosIds=new Set(cobradas.map(f=>f.id));
    const idsExcel=new Set(delExcel.map(f=>f.id));

    const aInsertar=delExcel
      .filter(f=>!cobradosIds.has(f.id))
      .map(f=>{
        const exist=appActual.find(x=>x.id===f.id);
        // Si el usuario había ajustado el mes a mano, lo respetamos
        if(exist&&exist._mesCobro_manual)return{...f,mesCobro:exist.mesCobro};
        return f;
      });

    const conservar=appActual.filter(f=>
      !idsExcel.has(f.id)&&
      f.estado!=='Cobrada'&&
      ['En disputa','PDT Resolución Jud.','Controlado','Incobrable'].includes(f.estado)
    );

    return[...cobradas,...aInsertar,...conservar];
  };

  const importarExcelBMG=e=>{
    const file=e.target.files[0];if(!file)return;
    if(!window.XLSX){alert('La librería SheetJS no está cargada aún. Espera un segundo y vuelve a intentarlo.');return;}
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const wb=window.XLSX.read(ev.target.result,{type:'array',cellDates:false});

        // Detectar pestañas por nombre (buscar parcialmente)
        const nombrePend=wb.SheetNames.find(n=>n.toUpperCase().includes('PENDIENTE'));
        const nombreNoVenc=wb.SheetNames.find(n=>n.toUpperCase().includes('NO VENCIDA')||n.toUpperCase().includes('EMITIDAS'));

        if(!nombrePend&&!nombreNoVenc){
          alert(`No se encontraron las pestañas esperadas.\nPestañas en el archivo: ${wb.SheetNames.join(', ')}\n\nSe esperaba: "FACTURAS PENDIENTES" y/o "FACTURAS EMITIDAS NO VENCIDAS"`);
          return;
        }

        const toRows=sheet=>window.XLSX.utils.sheet_to_json(sheet,{header:1,defval:''});

        const pendientes=nombrePend?parsearHojaXLSX(toRows(wb.Sheets[nombrePend]),'Pendiente'):[];
        const noVencidas=nombreNoVenc?parsearHojaXLSX(toRows(wb.Sheets[nombreNoVenc]),'No vencida'):[];
        const delExcel=[...pendientes,...noVencidas];

        if(delExcel.length===0){
          alert('No se encontraron filas válidas (con nº factura e importe) en las pestañas.');
          return;
        }

        const resultado=fusionar(delExcel,facturas);
        setFacturas(resultado);
        setImportLog({
          pendientes:pendientes.length,noVencidas:noVencidas.length,
          cobradas:facturas.filter(f=>f.estado==='Cobrada').length,
          conservadas:resultado.filter(f=>f._origen===undefined||['En disputa','PDT Resolución Jud.','Controlado','Incobrable'].includes(f.estado)).length,
          fecha:new Date().toLocaleString('es-ES'),
        });
      }catch(err){
        alert('Error al leer el Excel: '+err.message);
        console.error(err);
      }
    };
    r.readAsArrayBuffer(file);
    e.target.value='';
  };

  const normalizarEstado=s=>{
    const u=s.toUpperCase();
    if(u.includes('RESOLUCIÓN')||u.includes('JUDICIAL')||u.includes('JUD'))return'PDT Resolución Jud.';
    if(u.includes('CONTROLADO'))return'Controlado';
    if(u.includes('NUEVO VENCIMIENTO'))return'Nuevo Vencimiento';
    if(u.includes('SIN RESPUESTA'))return'Sin Respuesta';
    if(u.includes('COBRAD'))return'Cobrada';
    if(u.includes('INCOBRABLE'))return'Incobrable';
    if(u.includes('DISPUTA'))return'En disputa';
    return'Pendiente';
  };

  const clientesUnicos=[...new Set(facturas.map(f=>f.cliente))].sort();
  const filtradas=facturas.filter(f=>{
    if(filtroMes!=='todos'&&f.mesCobro!==parseInt(filtroMes))return false;
    if(filtroEstado!=='todos'&&f.estado!==filtroEstado)return false;
    if(filtroCliente!=='todos'&&f.cliente!==filtroCliente)return false;
    return true;
  });

  const totPend=facturas.filter(f=>!['Cobrada','Cancelada','Incobrable'].includes(f.estado)).reduce((s,f)=>s+f.importe,0);
  const totCob=facturas.filter(f=>f.estado==='Cobrada').reduce((s,f)=>s+f.importe,0);
  const totDisp=facturas.filter(f=>['En disputa','PDT Resolución Jud.'].includes(f.estado)).reduce((s,f)=>s+f.importe,0);

  // Resumen por mes de cobro estimado
  const porMes=MESES.map((_,m)=>facturas.filter(f=>f.mesCobro===m&&!['Cancelada','Incobrable','Cobrada'].includes(f.estado)).reduce((s,f)=>s+f.importe,0));

  const estadoBadgeClass=e=>{
    if(e==='Cobrada')return'pill-ok';
    if(e==='Pendiente'||e==='Sin Respuesta')return'pill-warn';
    if(e==='En disputa'||e==='PDT Resolución Jud.')return'pill-dis';
    if(e==='Incobrable'||e==='Cancelada')return'pill-err';
    return'pill-neu';
  };

  return(
    <div>
      <div className="metrics">
        <div className="metric"><div className="metric-label">Pendiente cobro</div><div className="metric-val orange">{fmt(totPend)}</div><div className="metric-sub">{facturas.filter(f=>!['Cobrada','Cancelada','Incobrable'].includes(f.estado)).length} facturas</div></div>
        <div className="metric"><div className="metric-label">Cobrado</div><div className="metric-val green">{fmt(totCob)}</div><div className="metric-sub">{facturas.filter(f=>f.estado==='Cobrada').length} facturas</div></div>
        <div className="metric"><div className="metric-label">En disputa / Jud.</div><div className="metric-val red">{fmt(totDisp)}</div><div className="metric-sub">{facturas.filter(f=>['En disputa','PDT Resolución Jud.'].includes(f.estado)).length} facturas</div></div>
        <div className="metric"><div className="metric-label">Total fichero</div><div className="metric-val blue">{facturas.length}</div><div className="metric-sub">facturas</div></div>
      </div>

      {/* Resumen de cobros estimados por mes */}
      <div className="card">
        <div className="card-header"><h2>Cobros estimados por mes (facturas pendientes)</h2></div>
        <div className="card-body" style={{padding:'10px 14px'}}>
          <div style={{display:'grid',gridTemplateColumns:'repeat(12,1fr)',gap:6}}>
            {MESES.map((m,i)=>(
              <div key={i} style={{textAlign:'center',padding:'8px 4px',borderRadius:5,background:porMes[i]>0?'#f0f7ee':'#f8f8f8',border:`1px solid ${porMes[i]>0?'#b8d8b0':'#e8e8e8'}`}}>
                <div style={{fontSize:10,color:'#888',marginBottom:3}}>{m}</div>
                <div style={{fontSize:11,fontWeight:600,color:porMes[i]>0?'#1a7a45':'#ccc'}}>{porMes[i]>0?fmt(porMes[i]):'—'}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Importador */}
      <div className="card">
        <div className="card-header"><h2>Importar / actualizar desde Excel BMG</h2></div>
        <div className="card-body">
          <div className="alert alert-info" style={{marginBottom:12}}>
            <i className="ti ti-info-circle"></i>
            <span>Sube directamente el <strong>.xlsx</strong> de seguimiento. La app lee las dos pestañas a la vez. Las facturas ya cobradas en la app nunca se eliminan.</span>
          </div>
          <div style={{display:'flex',gap:12,alignItems:'flex-start',flexWrap:'wrap'}}>
            <div>
              <label className="upload-area" style={{display:'block',width:280,cursor:'pointer'}}>
                <i className="ti ti-file-spreadsheet" style={{fontSize:28,display:'block',marginBottom:8,color:'#1a7a45'}}></i>
                <strong>Subir Seguimiento_Factura_*.xlsx</strong><br/>
                <span style={{fontSize:10,color:'#aaa',marginTop:4,display:'block'}}>
                  Lee automáticamente:<br/>
                  ✓ Pestaña "FACTURAS PENDIENTES"<br/>
                  ✓ Pestaña "FACTURAS EMITIDAS NO VENCIDAS"
                </span>
                <input type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={importarExcelBMG}/>
              </label>
            </div>
            <div style={{flex:1,minWidth:180,fontSize:11,color:'#555',lineHeight:1.8}}>
              <strong>Reglas de fusión al importar:</strong><br/>
              🔒 Facturas <strong>Cobradas</strong> → nunca se tocan<br/>
              🔄 Facturas en el Excel → se actualizan o añaden<br/>
              ⚠️ En disputa / Judicial → se conservan aunque no estén<br/>
              🗑 Pendientes que ya no aparecen → se eliminan
            </div>
          </div>
          {importLog&&(
            <div className="alert alert-ok" style={{marginTop:10}}>
              <i className="ti ti-circle-check"></i>
              <span>
                <strong>{importLog.fecha}</strong><br/>
                ✓ {importLog.pendientes} pendientes + {importLog.noVencidas} no vencidas importadas
                · 🔒 {importLog.cobradas} cobradas preservadas
              </span>
            </div>
          )}
        </div>
      </div>

      {/* Formulario manual */}
      <div className="card">
        <div className="card-header">
          <h2>{editId?'Editar factura':'Añadir factura manualmente'}</h2>
          {editId&&<button className="btn btn-sm" onClick={()=>{setEditId(null);setForm(blank);}}>Cancelar edición</button>}
        </div>
        <div className="card-body">
          <div className="form-row">
            <div className="form-group"><label>Nº Factura</label><input value={form.id} onChange={e=>setForm(p=>({...p,id:e.target.value}))} style={{width:110}} placeholder="M00001/26"/></div>
            <div className="form-group"><label>Cliente (código)</label><input value={form.cliente} onChange={e=>setForm(p=>({...p,cliente:e.target.value}))} style={{width:130}} placeholder="BANCO SABADELL"/></div>
            <div className="form-group"><label>Cliente (nombre)</label><input value={form.clienteNm} onChange={e=>setForm(p=>({...p,clienteNm:e.target.value}))} style={{width:150}} placeholder="Nombre del deudor"/></div>
            <div className="form-group"><label>Fecha factura</label><input type="date" value={form.fecha} onChange={e=>setForm(p=>({...p,fecha:e.target.value}))} style={{width:125}}/></div>
            <div className="form-group"><label>Importe (€ total)</label><input type="number" value={form.importe} onChange={e=>setForm(p=>({...p,importe:e.target.value}))} style={{width:110}} placeholder="0"/></div>
            <div className="form-group"><label>Días retraso</label><input type="number" value={form.diasRetraso} onChange={e=>setForm(p=>({...p,diasRetraso:e.target.value}))} style={{width:80}} placeholder="0"/></div>
            <div className="form-group"><label>Mes cobro estimado</label><select value={form.mesCobro} onChange={e=>setForm(p=>({...p,mesCobro:parseInt(e.target.value)}))} style={{width:120}}>{MESES_FULL.map((m,i)=><option key={i} value={i}>{m}</option>)}</select></div>
            <div className="form-group"><label>Estado</label><select value={form.estado} onChange={e=>setForm(p=>({...p,estado:e.target.value}))} style={{width:140}}>{ESTADOS.map(e=><option key={e} value={e}>{e}</option>)}</select></div>
            {form.estado==='Cobrada'&&<div className="form-group"><label>Fecha cobro</label><input type="date" value={form.fechaCobro} onChange={e=>setForm(p=>({...p,fechaCobro:e.target.value}))} style={{width:125}}/></div>}
            <div className="form-group"><label>&nbsp;</label><button className="btn btn-primary" onClick={guardar}>{editId?'Actualizar':'Añadir'}</button></div>
          </div>
        </div>
      </div>

      <div className="card">
        <div className="card-header">
          <h2>Listado ({filtradas.length}) · {fmt(filtradas.reduce((s,f)=>s+(f.importe||f.totalFra||0),0))}</h2>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
            <select value={filtroMes} onChange={e=>setFiltroMes(e.target.value)} style={{fontSize:11}}>
              <option value="todos">Todos los meses</option>
              {MESES_FULL.map((m,i)=><option key={i} value={i}>{m}</option>)}
            </select>
            <select value={filtroEstado} onChange={e=>setFiltroEstado(e.target.value)} style={{fontSize:11}}>
              <option value="todos">Todos los estados</option>
              {ESTADOS.map(e=><option key={e} value={e}>{e}</option>)}
            </select>
            <select value={filtroCliente} onChange={e=>setFiltroCliente(e.target.value)} style={{fontSize:11}}>
              <option value="todos">Todos los clientes</option>
              {clientesUnicos.map(c=><option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>
        <div style={{overflowX:'auto'}}>
        <table>
          <thead><tr>
            <th>Nº Factura</th>
            <th>Cliente</th>
            <th>Deudor / Nombre</th>
            <th>Fecha</th>
            <th className="num">Importe</th>
            <th className="num">Días</th>
            <th>Cobro estimado</th>
            <th>Estado</th>
            <th style={{maxWidth:200}}>Observaciones</th>
            <th>Fecha cobro</th>
            <th></th>
          </tr></thead>
          <tbody>
          {filtradas.map(f=>{
            const imp=f.importe||f.totalFra||0;
            const dias=parseInt(f.diasRetraso)||0;
            return(
            <tr key={f.id}>
              <td style={{fontFamily:'monospace',fontSize:11,whiteSpace:'nowrap'}}>{f.id}</td>
              <td style={{fontWeight:600,fontSize:11,whiteSpace:'nowrap'}}>{f.cliente}</td>
              <td style={{fontSize:11,color:'#555',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={f.clienteNm}>{f.clienteNm||f.concepto||'—'}</td>
              <td style={{fontSize:11,whiteSpace:'nowrap'}}>{f.fecha||'—'}</td>
              <td className="num" style={{fontWeight:700,color:imp>10000?'#b83232':'#1a1a1a'}}>{fmt(imp)}</td>
              <td className="num" style={{fontSize:11,color:dias>365?'#b83232':dias>180?'#b06000':'#555'}}>{dias>0?dias:'—'}</td>
              <td>
                <select value={f.mesCobro}
                  style={{fontSize:10,padding:'2px 4px',border:'1px solid #ddd',borderRadius:4,width:90,
                    background:f._mesCobro_manual?'#fffbe6':'#fff',
                    borderColor:f._mesCobro_manual?'#e0a000':'#ddd'}}
                  title={f._mesCobro_manual?'Mes editado manualmente':'Mes estimado automáticamente'}
                  onChange={ev=>setFacturas(p=>p.map(x=>x.id===f.id?{...x,mesCobro:parseInt(ev.target.value),_mesCobro_manual:true}:x))}>
                  {MESES_FULL.map((m,i)=><option key={i} value={i}>{m}</option>)}
                </select>
              </td>
              <td>
                <select value={f.estado} style={{fontSize:10,padding:'2px 4px',border:'1px solid #ddd',borderRadius:4,maxWidth:140}}
                  onChange={e=>{
                    const nuevo=e.target.value;
                    if(nuevo==='Cobrada'&&f.estado!=='Cobrada'){
                      const fecha=prompt('Fecha de cobro (YYYY-MM-DD):',new Date().toISOString().split('T')[0]);
                      cambiarEstado(f.id,nuevo,fecha||'');
                    }else cambiarEstado(f.id,nuevo);
                  }}>
                  {ESTADOS.map(e=><option key={e} value={e}>{e}</option>)}
                </select>
              </td>
              <td style={{fontSize:10,color:'#666',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={f.respuestaCliente}>{f.respuestaCliente||'—'}</td>
              <td style={{fontSize:11,color:'#1a7a45',whiteSpace:'nowrap'}}>{f.fechaCobro||'—'}</td>
              <td style={{whiteSpace:'nowrap'}}>
                <button className="btn btn-sm btn-ghost" onClick={()=>{setForm({...f,importe:f.importe||f.totalFra||0});setEditId(f.id);}} title="Editar"><i className="ti ti-edit"></i></button>
                <button className="btn btn-sm btn-danger" onClick={()=>{if(confirm('¿Eliminar?'))setFacturas(p=>p.filter(x=>x.id!==f.id));}} title="Eliminar"><i className="ti ti-trash"></i></button>
              </td>
            </tr>
          );})}
          {filtradas.length===0&&<tr><td colSpan={11} style={{textAlign:'center',padding:24,color:'#aaa'}}>Sin resultados con los filtros actuales</td></tr>}
          </tbody>
        </table>
        </div>
      </div>
    </div>
  );
}

// TAB EXTRACTO REAL
// ══════════════════════════════════════════════
function TabExtracto({movimientosReal,setMovimientosReal,gastos,impuestos,MES_ACTUAL}){
  const [filtroMes,setFiltroMes]=useState('todos');
  const [filtroBanco,setFiltroBanco]=useState('todos');
  const [bancoSeleccionado,setBancoSeleccionado]=useState('CAIXABANK');
  const [bancos,setBancos]=useState(['CAIXABANK','SABADELL','CAJAMAR','BSCH','BANKINTER']);
  const [nuevoBanco,setNuevoBanco]=useState('');

  const catsGasto=gastos.map(g=>g.concepto);
  const catsImp=impuestos.map(i=>i.concepto);
  // Ingresos: cobros de facturas NO se categorizan aquí (vienen de pestaña facturas)
  // Solo traspasos entre cuentas y nueva deuda
  const CATS_INGRESO=['Traspaso entre cuentas','Nueva deuda / financiación'];
  const CATS=[...CATS_INGRESO,...catsGasto,...catsImp,'Sin categorizar'];

  const autocat=(concepto,importe)=>{
    const c=concepto.toLowerCase().replace(/\n/g,' ');
    // Ingresos: solo traspasos o deuda — nunca "cobro de factura" automático
    if(importe>0){
      if(c.includes('traspas')||c.includes('transfer')||c.includes('trasp')) return 'Traspaso entre cuentas';
      if(c.includes('prestam')||c.includes('crédito')||c.includes('credito')||c.includes('financ')||c.includes('poliza')||c.includes('póliza')) return 'Nueva deuda / financiación';
      return 'Sin categorizar'; // ingresos positivos sin clasificar → revisar a mano
    }
    // Gastos: buscar coincidencia en nombre de partida
    const match=[...gastos,...impuestos].find(g=>
      g.concepto.toLowerCase().split(' ').some(w=>w.length>4&&c.includes(w))
    );
    if(match) return match.concepto;
    if(c.includes('nomin')||c.includes('salari')) return gastos.find(g=>g.id==='nominas')?.concepto||catsGasto[0]||'Sin categorizar';
    if(c.includes('seguridad social')||c.includes('recibo ss')) return gastos.find(g=>g.id==='ss')?.concepto||'Sin categorizar';
    if(c.includes('alquiler')||c.includes('arrendamiento')) return gastos.find(g=>g.id==='alquiler')?.concepto||'Sin categorizar';
    if(c.includes('hacienda')||c.includes('aeat')||c.includes('mod.')||c.includes('irpf')||c.includes('iva')) return catsImp[0]||'Sin categorizar';
    return catsGasto[catsGasto.length-1]||'Sin categorizar';
  };

  const claveDedup=(fecha,concepto,importe,banco)=>`${fecha}|${String(concepto).replace(/\s+/g,' ').trim()}|${importe}|${banco}`;

  // ── IMPORTADOR EXCEL (.xls/.xlsx) con SheetJS ──
  // Formato esperado: Fecha | Concepto | Importe | Saldo (Saldo opcional)
  const importarExcel=e=>{
    const file=e.target.files[0];if(!file)return;
    if(!window.XLSX){alert('SheetJS no está cargado aún, espera un momento.');return;}
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const wb=window.XLSX.read(ev.target.result,{type:'array',cellDates:true});
        const sheet=wb.Sheets[wb.SheetNames[0]];
        const rows=window.XLSX.utils.sheet_to_json(sheet,{header:1,defval:''});
        if(rows.length<2){alert('El archivo está vacío.');return;}

        // Detectar fila de cabecera (buscar "fecha" o "importe")
        let headerRow=0;
        for(let i=0;i<Math.min(5,rows.length);i++){
          const r0=rows[i].map(c=>String(c).toLowerCase());
          if(r0.some(c=>c.includes('fecha'))||r0.some(c=>c.includes('importe'))){headerRow=i;break;}
        }
        const headers=rows[headerRow].map(c=>String(c).toLowerCase().trim());
        const ci={
          fecha: headers.findIndex(h=>h.includes('fecha')),
          concepto: headers.findIndex(h=>h.includes('concepto')||h.includes('descripci')||h.includes('movimiento')),
          importe: headers.findIndex(h=>h.includes('importe')||h.includes('amount')||h.includes('cargo')),
        };
        // Fallback posicional si no hay cabecera reconocible
        if(ci.fecha<0) ci.fecha=0;
        if(ci.concepto<0) ci.concepto=1;
        if(ci.importe<0) ci.importe=2;

        const clavesExistentes=new Set(movimientosReal.map(m=>claveDedup(m.fecha,m.concepto,m.importe,m.banco)));
        const nuevos=[];
        let añadidos=0,duplicados=0,saltados=0;

        rows.slice(headerRow+1).forEach((row,idx)=>{
          if(!row[ci.fecha]&&!row[ci.importe])return; // fila vacía

          // Fecha: puede ser Date (SheetJS con cellDates), número serial, o string
          let fechaISO='';let fechaStr='';
          const fRaw=row[ci.fecha];
          if(fRaw instanceof Date){
            fechaISO=fRaw.toISOString().split('T')[0];
            fechaStr=`${String(fRaw.getDate()).padStart(2,'0')}/${String(fRaw.getMonth()+1).padStart(2,'0')}/${fRaw.getFullYear()}`;
          } else if(typeof fRaw==='number'&&fRaw>40000){
            // Serial Excel
            const d=new Date((fRaw-25569)*86400*1000);
            fechaISO=d.toISOString().split('T')[0];
            fechaStr=`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
          } else {
            fechaStr=String(fRaw||'').trim();
            const p=fechaStr.split(/[\/\-\.]/);
            if(p.length===3){
              fechaISO=p[0].length===4
                ?`${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`
                :`${p[2].length===2?'20'+p[2]:p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
            }
          }
          if(!fechaISO){saltados++;return;}

          // Concepto: limpiar saltos de línea del Excel
          const concepto=String(row[ci.concepto]||'').replace(/\n|\r/g,' ').replace(/\s+/g,' ').trim();
          if(!concepto){saltados++;return;}

          // Importe
          const importeRaw=String(row[ci.importe]||'').replace(',','.').replace(/[^0-9.-]/g,'');
          const importe=parseFloat(importeRaw);
          if(isNaN(importe)){saltados++;return;}

          const mes=fechaISO?new Date(fechaISO).getMonth():MES_ACTUAL;
          const clave=claveDedup(fechaStr,concepto,importe,bancoSeleccionado);
          if(clavesExistentes.has(clave)){duplicados++;return;}
          clavesExistentes.add(clave);

          nuevos.push({
            id:'ext_'+Date.now()+'_'+idx,
            fecha:fechaStr,fechaISO,concepto,importe,mes,
            banco:bancoSeleccionado,
            categoria:autocat(concepto,importe),
          });
          añadidos++;
        });

        setMovimientosReal(prev=>[...prev,...nuevos]);
        alert(`✓ ${añadidos} movimientos añadidos (${bancoSeleccionado})${duplicados>0?` · ${duplicados} duplicados ignorados`:''}${saltados>0?` · ${saltados} filas sin fecha/importe`:''}`);
      }catch(err){
        alert('Error al leer el Excel: '+err.message);
        console.error(err);
      }
    };
    r.readAsArrayBuffer(file);
    e.target.value='';
  };

  const updCat=(id,cat)=>setMovimientosReal(p=>p.map(m=>m.id===id?{...m,categoria:cat}:m));
  const updBanco=(id,banco)=>setMovimientosReal(p=>p.map(m=>m.id===id?{...m,banco}:m));
  const del=id=>setMovimientosReal(p=>p.filter(m=>m.id!==id));
  const addBanco=()=>{const b=nuevoBanco.trim().toUpperCase();if(b&&!bancos.includes(b)){setBancos(p=>[...p,b]);}setNuevoBanco('');};

  const filtrados=movimientosReal
    .filter(m=>filtroMes==='todos'||m.mes===parseInt(filtroMes))
    .filter(m=>filtroBanco==='todos'||m.banco===filtroBanco)
    .sort((a,b)=>(b.fechaISO||'').localeCompare(a.fechaISO||''));

  // Excluir "Sin categorizar" positivos (cobros de facturas pendientes de clasificar)
  const totSalidas=filtrados.filter(m=>m.importe<0).reduce((s,m)=>s+m.importe,0);
  const totEntradas=filtrados.filter(m=>m.importe>0&&m.categoria!=='Sin categorizar').reduce((s,m)=>s+m.importe,0);
  const sinCat=filtrados.filter(m=>m.categoria==='Sin categorizar'&&m.importe>0);
  const porCat={};
  filtrados.filter(m=>m.categoria!=='Sin categorizar').forEach(m=>{
    if(!porCat[m.categoria])porCat[m.categoria]=0;
    porCat[m.categoria]+=m.importe;
  });

  return(
    <div>
      <div className="alert alert-info">
        <i className="ti ti-info-circle"></i>
        <span>Los <strong>cobros de facturas</strong> no se categorizan aquí — el sistema los coge de la pestaña Facturas. Aquí solo registras <strong>gastos, traspasos entre cuentas y nueva deuda</strong>. Los ingresos sin categoría aparecen destacados para que los clasifiques a mano.</span>
      </div>

      {/* Importador */}
      <div className="card">
        <div className="card-header"><h2>Subir extracto bancario (.xls / .xlsx)</h2></div>
        <div className="card-body">
          <div className="alert alert-ok" style={{marginBottom:12}}>
            <i className="ti ti-stack"></i>
            <span><strong>Acumulativo:</strong> cada subida añade movimientos nuevos sin modificar los anteriores. Duplicados (misma fecha+concepto+importe+banco) se ignoran automáticamente.</span>
          </div>
          <div style={{display:'flex',gap:16,flexWrap:'wrap',alignItems:'flex-start'}}>
            {/* Selector de banco */}
            <div>
              <div style={{fontSize:11,fontWeight:700,color:'#555',marginBottom:6,textTransform:'uppercase',letterSpacing:'.03em'}}>1. Selecciona el banco</div>
              <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:8}}>
                {bancos.map(b=>(
                  <button key={b} type="button"
                    className={`btn btn-sm ${bancoSeleccionado===b?'btn-primary':''}`}
                    onClick={()=>setBancoSeleccionado(b)}
                    style={{fontWeight:bancoSeleccionado===b?700:400}}>
                    {b}
                  </button>
                ))}
              </div>
              <div style={{display:'flex',gap:6}}>
                <input value={nuevoBanco} onChange={e=>setNuevoBanco(e.target.value)}
                  onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();addBanco();setBancoSeleccionado(nuevoBanco.trim().toUpperCase());}}}
                  placeholder="Nuevo banco..." style={{width:130,fontSize:11}}/>
                <button className="btn btn-sm" type="button" onClick={()=>{addBanco();if(nuevoBanco.trim())setBancoSeleccionado(nuevoBanco.trim().toUpperCase());}}>
                  <i className="ti ti-plus"></i> Añadir
                </button>
              </div>
            </div>
            {/* Upload */}
            <div style={{flex:1,minWidth:280}}>
              <div style={{fontSize:11,fontWeight:700,color:'#555',marginBottom:6,textTransform:'uppercase',letterSpacing:'.03em'}}>2. Sube el extracto de <strong style={{color:'#1a2b4a'}}>{bancoSeleccionado}</strong></div>
              <label className="upload-area" style={{display:'block',cursor:'pointer'}}>
                <i className="ti ti-file-spreadsheet" style={{fontSize:22,display:'block',marginBottom:4,color:'#1a7a45'}}></i>
                <strong>Subir extracto .xls / .xlsx</strong>
                <div style={{fontSize:10,color:'#888',marginTop:4,lineHeight:1.7}}>
                  Columnas detectadas automáticamente: Fecha · Concepto · Importe<br/>
                  Formato de fecha: DD/MM/YYYY o YYYY-MM-DD
                </div>
                <input type="file" accept=".xls,.xlsx" style={{display:'none'}} onChange={importarExcel}/>
              </label>
            </div>
          </div>

          {movimientosReal.length>0&&(
            <div style={{marginTop:12,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
              <span style={{fontSize:11,color:'#666'}}>{movimientosReal.length} movimientos acumulados en total</span>
              <button className="btn btn-sm btn-danger" onClick={()=>{if(confirm('¿Borrar TODOS los movimientos del extracto?'))setMovimientosReal([]);}}>
                <i className="ti ti-trash"></i> Borrar todo
              </button>
            </div>
          )}
        </div>
      </div>

      {movimientosReal.length>0&&(<>
        {/* Alerta ingresos sin categorizar */}
        {sinCat.length>0&&(
          <div className="alert alert-warn">
            <i className="ti ti-alert-triangle"></i>
            <span><strong>{sinCat.length} ingreso{sinCat.length>1?'s':''} sin categorizar</strong> ({fmt(sinCat.reduce((s,m)=>s+m.importe,0))}). Clasifícalos como "Traspaso entre cuentas" o "Nueva deuda" en la tabla. Si son cobros de facturas, ignóralos — el sistema los gestiona desde la pestaña Facturas.</span>
          </div>
        )}

        <div className="metrics">
          <div className="metric"><div className="metric-label">Entradas clasificadas</div><div className="metric-val green">{fmt(totEntradas)}</div></div>
          <div className="metric"><div className="metric-label">Salidas (pagos)</div><div className="metric-val red">{fmt(totSalidas)}</div></div>
          <div className="metric"><div className="metric-label">Sin categorizar</div><div className={`metric-val ${sinCat.length>0?'orange':'gray'}`}>{sinCat.length} mov.</div></div>
          <div className="metric"><div className="metric-label">Total movimientos</div><div className="metric-val blue">{movimientosReal.length}</div></div>
        </div>

        {/* Resumen por categoría */}
        <div className="grid2">
          <div className="card">
            <div className="card-header">
              <h2>Resumen por categoría</h2>
              <div style={{display:'flex',gap:6}}>
                <select value={filtroMes} onChange={e=>setFiltroMes(e.target.value)} style={{fontSize:11}}>
                  <option value="todos">Todos los meses</option>
                  {MESES_FULL.map((m,i)=><option key={i} value={i}>{m}</option>)}
                </select>
                <select value={filtroBanco} onChange={e=>setFiltroBanco(e.target.value)} style={{fontSize:11}}>
                  <option value="todos">Todos los bancos</option>
                  {bancos.map(b=><option key={b} value={b}>{b}</option>)}
                </select>
              </div>
            </div>
            <div style={{padding:0}}>
            <table>
              <thead><tr><th>Categoría</th><th className="num">Total</th><th className="num">Movs.</th></tr></thead>
              <tbody>
              {Object.entries(porCat).sort((a,b)=>a[1]-b[1]).map(([cat,tot])=>(
                <tr key={cat}>
                  <td style={{fontSize:12}}>{cat}</td>
                  <td className={`num ${tot>=0?'green':'red'}`} style={{fontWeight:600}}>{fmt(tot)}</td>
                  <td className="num gray">{filtrados.filter(m=>m.categoria===cat).length}</td>
                </tr>
              ))}
              {sinCat.length>0&&(
                <tr style={{background:'#fff8e6'}}>
                  <td style={{fontSize:12,color:'#b06000',fontWeight:600}}>⚠ Sin categorizar (ingresos)</td>
                  <td className="num warn-num" style={{fontWeight:600}}>{fmt(sinCat.reduce((s,m)=>s+m.importe,0))}</td>
                  <td className="num">{sinCat.length}</td>
                </tr>
              )}
              </tbody>
            </table>
            </div>
          </div>

          {/* Por banco */}
          <div className="card">
            <div className="card-header"><h2>Por banco</h2></div>
            <div style={{padding:0}}>
            <table>
              <thead><tr><th>Banco</th><th className="num">Entradas</th><th className="num">Salidas</th><th className="num">Movs.</th></tr></thead>
              <tbody>
              {bancos.filter(b=>movimientosReal.some(m=>m.banco===b)).map(b=>{
                const movsBanco=movimientosReal.filter(m=>m.banco===b);
                const ent=movsBanco.filter(m=>m.importe>0&&m.categoria!=='Sin categorizar').reduce((s,m)=>s+m.importe,0);
                const sal=movsBanco.filter(m=>m.importe<0).reduce((s,m)=>s+m.importe,0);
                return(
                  <tr key={b}>
                    <td style={{fontWeight:600}}>{b}</td>
                    <td className="num green">{fmt(ent)}</td>
                    <td className="num red">{fmt(sal)}</td>
                    <td className="num gray">{movsBanco.length}</td>
                  </tr>
                );
              })}
              </tbody>
            </table>
            </div>
          </div>
        </div>

        {/* Tabla de movimientos */}
        <div className="card">
          <div className="card-header">
            <h2>Movimientos ({filtrados.length})</h2>
            <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>
              <select value={filtroMes} onChange={e=>setFiltroMes(e.target.value)} style={{fontSize:11}}>
                <option value="todos">Todos los meses</option>
                {MESES_FULL.map((m,i)=><option key={i} value={i}>{m}</option>)}
              </select>
              <select value={filtroBanco} onChange={e=>setFiltroBanco(e.target.value)} style={{fontSize:11}}>
                <option value="todos">Todos los bancos</option>
                {bancos.map(b=><option key={b} value={b}>{b}</option>)}
              </select>
            </div>
          </div>
          <div style={{overflowX:'auto'}}>
          <table>
            <thead><tr>
              <th style={{minWidth:90}}>Fecha</th>
              <th style={{minWidth:220}}>Concepto</th>
              <th style={{minWidth:90}}>Banco</th>
              <th className="num" style={{minWidth:90}}>Importe</th>
              <th style={{minWidth:60}}>Mes</th>
              <th style={{minWidth:190}}>Categoría</th>
              <th></th>
            </tr></thead>
            <tbody>
            {filtrados.map(mv=>{
              const sinCatFlag=mv.categoria==='Sin categorizar';
              return(
                <tr key={mv.id} style={{background:sinCatFlag&&mv.importe>0?'#fffbe6':''}}>
                  <td style={{fontSize:11,whiteSpace:'nowrap'}}>{mv.fecha}</td>
                  <td style={{fontSize:11,maxWidth:280,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}
                    title={mv.concepto}>{mv.concepto}</td>
                  <td>
                    <select value={mv.banco} onChange={e=>updBanco(mv.id,e.target.value)}
                      style={{fontSize:10,padding:'1px 3px',border:'1px solid #ddd',borderRadius:3,width:85}}>
                      {bancos.map(b=><option key={b} value={b}>{b}</option>)}
                    </select>
                  </td>
                  <td className={`num ${mv.importe>=0?'green':'red'}`} style={{fontWeight:600}}>{fmt(mv.importe)}</td>
                  <td style={{fontSize:11}}>{MESES[mv.mes]}</td>
                  <td>
                    <select value={CATS.includes(mv.categoria)?mv.categoria:'Sin categorizar'}
                      onChange={e=>updCat(mv.id,e.target.value)}
                      style={{fontSize:10,padding:'2px 4px',border:`1px solid ${sinCatFlag&&mv.importe>0?'#e0a000':'#ddd'}`,
                        borderRadius:4,width:190,
                        background:sinCatFlag&&mv.importe>0?'#fffbe6':'#fff'}}>
                      {CATS.map(c=><option key={c} value={c}>{c}</option>)}
                    </select>
                  </td>
                  <td><button className="btn btn-sm btn-danger" onClick={()=>del(mv.id)}><i className="ti ti-x"></i></button></td>
                </tr>
              );
            })}
            {filtrados.length===0&&<tr><td colSpan={7} style={{textAlign:'center',padding:20,color:'#aaa'}}>Sin movimientos con los filtros seleccionados</td></tr>}
            </tbody>
          </table>
          </div>
        </div>
      </>)}
    </div>
  );
}

// TAB GASTOS FIJOS
// ══════════════════════════════════════════════
function TabGastos({gastos,setGastos,addGasto,impuestos,setImpuestos,mesesCerrados,setMesesCerrados}){
  const [nuevo,setNuevo]=useState({concepto:'',grupo:'estructura',importe:'',iva:0.21,irpf:0});

  const handleAdd=()=>{
    if(!nuevo.concepto.trim())return;
    addGasto(nuevo.concepto,nuevo.grupo,nuevo.importe,parseFloat(nuevo.iva)||0,parseFloat(nuevo.irpf)||0);
    setNuevo({concepto:'',grupo:'estructura',importe:'',iva:0.21,irpf:0});
  };

  const upd=(id,m,v)=>setGastos(p=>p.map(g=>g.id===id?{...g,importes:g.importes.map((x,i)=>i===m?parseFloat(v)||0:x)}:g));
  const updField=(id,field,v)=>setGastos(p=>p.map(g=>g.id===id?{...g,[field]:parseFloat(v)||0}:g));
  const updI=(id,m,v)=>setImpuestos(p=>p.map(i=>i.id===id?{...i,importes:i.importes.map((x,j)=>j===m?parseFloat(v)||0:x)}:i));
  const del=id=>{if(confirm('¿Eliminar partida?'))setGastos(p=>p.filter(g=>g.id!==id));};
  const toggleCerrado=m=>setMesesCerrados(p=>({...p,[m]:!p[m]}));
  const grupos=['personal','colaboradores','estructura'];

  // Cálculo caja por gasto: base × (1 + IVA - IRPF)
  const cajaMesGasto=(g,m)=>{
    const base=g.importes[m]||0;
    return base*(1+(g.iva||0)-(g.irpf||0));
  };
  const totalBaseAnual=gastos.reduce((s,g)=>s+g.importes.reduce((a,v)=>a+v,0),0);
  const totalCajaAnual=gastos.reduce((s,g)=>s+MESES.reduce((_,__,m)=>_+cajaMesGasto(g,m),0),0);

  return(
    <div>
      <div className="alert alert-info">
        <i className="ti ti-info-circle"></i>
        Base contable (PyG) vs caja real: <strong>Caja = Base + Base×IVA − Base×IRPF</strong>. Nóminas y SS tienen IVA/IRPF a 0 (ya son netos). Colaboradores y estructura usan sus tipos propios.
      </div>
      <div style={{display:'flex',gap:16,marginBottom:10,fontSize:11,flexWrap:'wrap',alignItems:'center'}}>
        <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:14,height:14,background:'#fff8f8',border:'1px solid #e4c0c0',borderRadius:2,display:'inline-block'}}></span>Previsión</span>
        <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:14,height:14,background:'#fdecea',border:'1px solid #e09090',borderRadius:2,display:'inline-block'}}></span><i className="ti ti-lock" style={{fontSize:11,color:'#b83232'}}></i> Mes cerrado</span>
        <span style={{color:'#888'}}>Clic en el mes para abrirlo/cerrarlo</span>
      </div>
      <div className="card">
        <div className="card-header">
          <h2>Gastos fijos y estructura</h2>
          <div style={{display:'flex',gap:16,fontSize:11}}>
            <span style={{color:'#b83232',fontWeight:600}}>Base anual: {fmt(totalBaseAnual)}</span>
            <span style={{color:'#1a2b4a',fontWeight:600}}>Caja anual: {fmt(totalCajaAnual)}</span>
          </div>
        </div>
        <div className="card-body">
          <div className="form-row">
            <div className="form-group"><label>Concepto</label>
              <input value={nuevo.concepto} onChange={e=>setNuevo(p=>({...p,concepto:e.target.value}))}
                onKeyDown={e=>{if(e.key==='Enter'){e.preventDefault();handleAdd();}}}
                style={{width:200}} placeholder="Nueva partida..."/>
            </div>
            <div className="form-group"><label>Grupo</label>
              <select value={nuevo.grupo} onChange={e=>setNuevo(p=>({...p,grupo:e.target.value}))} style={{width:120}}>
                {grupos.map(g=><option key={g} value={g}>{g}</option>)}
              </select>
            </div>
            <div className="form-group"><label>Importe/mes</label>
              <input type="number" value={nuevo.importe} onChange={e=>setNuevo(p=>({...p,importe:e.target.value}))} style={{width:100}} placeholder="Negativo"/>
            </div>
            <div className="form-group"><label>IVA %</label>
              <select value={nuevo.iva} onChange={e=>setNuevo(p=>({...p,iva:parseFloat(e.target.value)}))} style={{width:65}}>
                <option value={0.21}>21%</option><option value={0.1}>10%</option><option value={0}>0%</option>
              </select>
            </div>
            <div className="form-group"><label>IRPF %</label>
              <select value={nuevo.irpf} onChange={e=>setNuevo(p=>({...p,irpf:parseFloat(e.target.value)}))} style={{width:65}}>
                <option value={0}>0%</option><option value={0.15}>15%</option><option value={0.19}>19%</option>
                <option value={0.07}>7%</option><option value={0.02}>2%</option>
              </select>
            </div>
            <div className="form-group"><label>&nbsp;</label>
              <button className="btn btn-primary btn-sm" type="button" onClick={handleAdd}><i className="ti ti-plus"></i> Añadir</button>
            </div>
          </div>
        </div>
        <div style={{overflowX:'auto'}}>
        <table style={{minWidth:1300}}>
          <thead><tr>
            <th className="sticky-col" style={{minWidth:200}}>Concepto</th>
            <th style={{width:55,fontSize:9,textAlign:'center'}}>IVA</th>
            <th style={{width:55,fontSize:9,textAlign:'center'}}>IRPF</th>
            {MESES.map((m,i)=>{const cerrado=mesesCerrados[i];return(
              <th key={i} className="num" style={{cursor:'pointer',minWidth:68,userSelect:'none',
                background:cerrado?'#fdecea':'#f4f6f9',color:cerrado?'#b83232':'#555'}}
                onClick={()=>toggleCerrado(i)} title={cerrado?`${m}: cerrado`:`${m}: previsión`}>
                {cerrado?<i className="ti ti-lock" style={{fontSize:9,marginRight:1}}></i>
                        :<i className="ti ti-pencil" style={{fontSize:9,marginRight:1,opacity:.4}}></i>}
                {m}
              </th>
            );})}
            <th className="num" style={{fontSize:9}}>Base año</th>
            <th className="num" style={{fontSize:9,color:'#1a2b4a'}}>Caja año</th>
            <th></th>
          </tr></thead>
          <tbody>
          {grupos.map(gr=>{
            const filas=gastos.filter(g=>g.grupo===gr);
            if(!filas.length)return null;
            return[
              <tr key={'gr_'+gr} className="section-row"><td colSpan={19}>{gr.toUpperCase()}</td></tr>,
              ...filas.map(g=>{
                const baseAnual=g.importes.reduce((s,v)=>s+v,0);
                const cajaAnual=MESES.reduce((s,_,m)=>s+cajaMesGasto(g,m),0);
                const tieneImpuesto=(g.iva||0)!==0||(g.irpf||0)!==0;
                return(
                  <tr key={g.id}>
                    <td className="sticky-col">
                      <input style={{background:'transparent',border:'none',borderBottom:'1px dashed transparent',
                        fontWeight:500,fontSize:12,width:'100%',minWidth:160,padding:'1px 2px'}}
                        value={g.concepto}
                        onChange={e=>setGastos(p=>p.map(x=>x.id===g.id?{...x,concepto:e.target.value}:x))}
                        onFocus={e=>e.target.style.borderBottomColor='#b83232'}
                        onBlur={e=>e.target.style.borderBottomColor='transparent'}
                        title="Clic para editar nombre"/>
                    </td>
                    <td style={{textAlign:'center'}}>
                      <select value={g.iva||0} onChange={e=>updField(g.id,'iva',e.target.value)}
                        style={{fontSize:10,padding:'1px 2px',border:'1px solid #ddd',borderRadius:3,width:50,
                          background:(g.iva||0)>0?'#f0f8ff':'#f8f8f8',color:(g.iva||0)>0?'#1a2b4a':'#aaa'}}>
                        <option value={0}>0%</option><option value={0.1}>10%</option><option value={0.21}>21%</option>
                      </select>
                    </td>
                    <td style={{textAlign:'center'}}>
                      <select value={g.irpf||0} onChange={e=>updField(g.id,'irpf',e.target.value)}
                        style={{fontSize:10,padding:'1px 2px',border:'1px solid #ddd',borderRadius:3,width:50,
                          background:(g.irpf||0)>0?'#fff8e6':'#f8f8f8',color:(g.irpf||0)>0?'#b06000':'#aaa'}}>
                        <option value={0}>0%</option><option value={0.02}>2%</option><option value={0.07}>7%</option>
                        <option value={0.15}>15%</option><option value={0.19}>19%</option>
                      </select>
                    </td>
                    {g.importes.map((v,m)=>{const cerrado=mesesCerrados[m];const caja=cajaMesGasto(g,m);return(
                      <td key={m} className="num" style={{background:cerrado?'#fdecea':'',borderLeft:cerrado?'1px solid #e09090':''}}>
                        <input className="inline-edit" type="number" value={v||''} placeholder="0"
                          onChange={e=>upd(g.id,m,e.target.value)}
                          style={{color:v<0?'#b83232':'#1a7a45',borderBottomColor:cerrado?'#e09090':'#ccc'}}/>
                        {tieneImpuesto&&v!==0&&<div style={{fontSize:8,color:'#1a2b4a',textAlign:'right',marginTop:1}}>{fmt(caja)}</div>}
                      </td>
                    );})}
                    <td className="num red" style={{fontWeight:600,fontSize:11}}>{fmt(baseAnual)}</td>
                    <td className="num" style={{fontWeight:700,fontSize:11,
                      color:Math.abs(cajaAnual)<Math.abs(baseAnual)?'#1a7a45':'#b83232'}}>
                      {fmt(cajaAnual)}
                    </td>
                    <td><button className="btn btn-sm btn-danger" onClick={()=>del(g.id)}><i className="ti ti-trash"></i></button></td>
                  </tr>
                );
              })
            ];
          })}
          <tr className="total-row">
            <td className="sticky-col">TOTAL BASE</td><td></td><td></td>
            {MESES.map((_,m)=>{const cerrado=mesesCerrados[m];return(
              <td key={m} className="num red" style={{background:cerrado?'#f8d8d8':'',fontWeight:700}}>
                <strong>{fmt(gastos.reduce((s,g)=>s+(g.importes[m]||0),0))}</strong>
              </td>
            );})}
            <td className="num red"><strong>{fmt(totalBaseAnual)}</strong></td>
            <td></td><td></td>
          </tr>
          <tr style={{background:'#f0f4f8'}}>
            <td className="sticky-col" style={{fontWeight:700,fontSize:11,color:'#1a2b4a'}}>
              <i className="ti ti-building-bank" style={{marginRight:4}}></i>TOTAL CAJA (base+IVA−IRPF)
            </td><td></td><td></td>
            {MESES.map((_,m)=>{
              const cajaMes=gastos.reduce((s,g)=>s+cajaMesGasto(g,m),0);
              const cerrado=mesesCerrados[m];
              return(
                <td key={m} className="num" style={{fontWeight:700,color:'#1a2b4a',background:cerrado?'#e0e8f4':'#f0f4f8'}}>
                  {fmt(cajaMes)}
                </td>
              );
            })}
            <td className="num" style={{fontWeight:700,color:'#1a2b4a'}}>{fmt(totalCajaAnual)}</td>
            <td></td><td></td>
          </tr>
          </tbody>
        </table>
        </div>
      </div>

      <div className="card">
        <div className="card-header"><h2>Impuestos y pagos variables</h2></div>
        <div style={{overflowX:'auto'}}>
        <table style={{minWidth:1200}}>
          <thead><tr>
            <th className="sticky-col" style={{minWidth:220}}>Concepto</th><th></th>
            {MESES.map((m,i)=>{const cerrado=mesesCerrados[i];return(
              <th key={i} className="num" style={{background:cerrado?'#fdecea':'#f4f6f9',color:cerrado?'#b83232':'#555',minWidth:72}}>
                {cerrado&&<i className="ti ti-lock" style={{fontSize:9,marginRight:2}}></i>}{m}
              </th>
            );})}
            <th className="num">Total</th>
          </tr></thead>
          <tbody>
          {impuestos.map(imp=>(
            <tr key={imp.id}>
              <td className="sticky-col">
                <input style={{background:'transparent',border:'none',borderBottom:'1px dashed transparent',fontWeight:500,fontSize:12,width:'100%',minWidth:180,padding:'1px 2px'}}
                  value={imp.concepto}
                  onChange={e=>setImpuestos(p=>p.map(x=>x.id===imp.id?{...x,concepto:e.target.value}:x))}
                  onFocus={e=>e.target.style.borderBottomColor='#b83232'}
                  onBlur={e=>e.target.style.borderBottomColor='transparent'}/>
              </td><td></td>
              {imp.importes.map((v,m)=>{const cerrado=mesesCerrados[m];return(
                <td key={m} className="num" style={{background:cerrado?'#fdecea':''}}>
                  <input className="inline-edit" type="number" value={v||''} placeholder="0"
                    onChange={e=>updI(imp.id,m,e.target.value)}
                    style={{color:v<0?'#b83232':'#1a7a45',borderBottomColor:cerrado?'#e09090':'#ccc'}}/>
                </td>
              );})}
              <td className="num red" style={{fontWeight:600}}>{fmt(imp.importes.reduce((s,v)=>s+v,0))}</td>
            </tr>
          ))}
          </tbody>
        </table>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
