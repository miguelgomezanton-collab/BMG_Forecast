const fmt=(n,dec=0)=>{if(n===null||n===undefined||isNaN(n))return'—';const s=Math.abs(n).toLocaleString('es-ES',{minimumFractionDigits:dec,maximumFractionDigits:dec});return(n<0?'-':'')+'€\u202f'+s;};
const pn=v=>{const s=String(v||0).replace(/[€\s]/g,'').replace(',','.');const n=parseFloat(s);return isNaN(n)?0:n;};
const load=()=>{try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null;}catch{return null;}};
const persist=d=>{try{localStorage.setItem(SK,JSON.stringify(d));}catch{}};
const pct=(a,b)=>b?Math.round(a/b*100):0;
const uid=()=>'c'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);

// ── MODAL AÑADIR CLIENTE ──────────────────────────────────────────
function ModalCliente({onAdd,onClose}){
  const [nombre,setNombre]=useState('');
  const [grupo,setGrupo]=useState('Varios');
  const [iva,setIva]=useState('0.21');
  const ok=()=>{
    if(!nombre.trim())return;
    onAdd({id:uid(),nombre:nombre.trim(),grupo,iva:parseFloat(iva)||0});
    onClose();
  };
  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <h3><i className="ti ti-user-plus" style={{marginRight:7}}></i>Añadir cliente / línea de facturación</h3>
        <div className="form-group"><label>Nombre</label><input autoFocus value={nombre} onChange={e=>setNombre(e.target.value)} onKeyDown={e=>e.key==='Enter'&&ok()} placeholder="Ej: Nuevo Cliente SA"/></div>
        <div className="form-group"><label>Grupo</label>
          <select value={grupo} onChange={e=>setGrupo(e.target.value)}>
            {GRUPOS_CLIENTE.map(g=><option key={g} value={g}>{g}</option>)}
          </select>
        </div>
        <div className="form-group"><label>IVA</label>
          <select value={iva} onChange={e=>setIva(e.target.value)}>
            <option value="0.21">21% (general)</option>
            <option value="0.10">10% (reducido)</option>
            <option value="0">Exento</option>
          </select>
        </div>
        <div className="modal-footer">
          <button className="btn" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" onClick={ok}><i className="ti ti-plus"></i>Añadir</button>
        </div>
      </div>
    </div>
  );
}

// ── MODAL AÑADIR GASTO ────────────────────────────────────────────
function ModalGasto({grupoDefault,onAdd,onClose}){
  const [concepto,setConcepto]=useState('');
  const [grupo,setGrupo]=useState(grupoDefault||'Estructura');
  const [iva,setIva]=useState('0.21');
  const [irpf,setIrpf]=useState('0');
  const ok=()=>{
    if(!concepto.trim())return;
    onAdd({id:uid(),concepto:concepto.trim(),grupo,iva:parseFloat(iva)||0,irpf:parseFloat(irpf)||0,imp:Array(12).fill(0)});
    onClose();
  };
  return(
    <div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal">
        <h3><i className="ti ti-plus" style={{marginRight:7}}></i>Añadir partida de gasto</h3>
        <div className="form-group"><label>Concepto</label><input autoFocus value={concepto} onChange={e=>setConcepto(e.target.value)} onKeyDown={e=>e.key==='Enter'&&ok()} placeholder="Ej: Asesoría jurídica externa"/></div>
        <div className="form-group"><label>Grupo</label>
          <select value={grupo} onChange={e=>setGrupo(e.target.value)}>
            {GRUPOS_GASTO.map(g=><option key={g} value={g}>{g}</option>)}

        </div>
        <div className="form-group"><label>Retención IRPF</label>
          <select value={irpf} onChange={e=>setIrpf(e.target.value)}>

            <option value="0.07">7%</option>

function App(){
  const sv=load();
  const [clientes,setClientes]=useState(()=>sv?.clientes||JSON.parse(JSON.stringify(CLIENTES0)));
  const [fact,setFact]        =useState(()=>sv?.fact    ||JSON.parse(JSON.stringify(FACT0)));
  const [gastos,setGastos]    =useState(()=>sv?.gastos  ||JSON.parse(JSON.stringify(GASTOS0)));
  const [imptos,setImptos]    =useState(()=>sv?.imptos  ||JSON.parse(JSON.stringify(IMPTOS0)));
  const [caja,setCaja]        =useState(()=>sv?.caja||JSON.parse(JSON.stringify(CAJA0)));
  const [saldo0,setSaldo0]    =useState(()=>sv?.saldo0??45000);
  const [locked,setLocked]    =useState(()=>sv?.locked||false);
  const [lockedAt,setLockedAt]=useState(()=>sv?.lockedAt||null);
  const [sub,setSub]          =useState('facturacion');
  const [modal,setModal]      =useState(null); // 'cliente' | {tipo:'gasto',grupo}

  const save=useCallback((p)=>{persist({clientes,fact,gastos,imptos,caja,saldo0,locked,lockedAt,...p});},[clientes,fact,gastos,imptos,caja,saldo0,locked,lockedAt]);

  // Edición celdas
  const setF=(cid,m,v)=>{if(locked)return;const arr=(fact[cid]||Array(12).fill(0)).slice();arr[m]=pn(v);const n={...fact,[cid]:arr};setFact(n);save({fact:n});};
  const setG=(gid,m,v)=>{if(locked)return;let val=pn(v);if(val>0)val=-val;const n=gastos.map(g=>g.id!==gid?g:{...g,imp:g.imp.map((x,i)=>i===m?val:x)});setGastos(n);save({gastos:n});};
  const setI=(iid,m,v)=>{if(locked)return;let val=pn(v);if(val>0)val=-val;const n=imptos.map(i=>i.id!==iid?i:{...i,imp:i.imp.map((x,j)=>j===m?val:x)});setImptos(n);save({imptos:n});};
  const setS=v=>{if(locked)return;const n=pn(v);setSaldo0(n);save({saldo0:n});};
  const setCajaRow=(rid,m,v)=>{
    if(locked)return;
    const val=pn(v);
    const n=caja.map(r=>r.id!==rid?r:{...r,imp:r.imp.map((x,i)=>i===m?val:x)});
    setCaja(n);save({caja:n});
  };
  const addCajaRow=(tipo,subtipo)=>{
    if(locked)return;
    const id='cj'+Date.now().toString(36);
    const label=subtipo==='impuestos'?'Nombre del impuesto / retención:':tipo==='cobro'?'Nombre del cobro:':'Nombre del pago:';
    const concepto=prompt(label);
    if(!concepto||!concepto.trim())return;
    const n=[...caja,{id,concepto:concepto.trim(),tipo,subtipo:subtipo||tipo,imp:Array(12).fill(0)}];
    setCaja(n);save({caja:n});
  };
  const delCajaRow=(rid)=>{
    if(locked)return;
    if(!confirm('¿Eliminar esta fila?'))return;
    const n=caja.filter(r=>r.id!==rid);
    setCaja(n);save({caja:n});
  };

  // Añadir/eliminar clientes
  const addCliente=c=>{
    const nc=[...clientes,c];const nf={...fact,[c.id]:Array(12).fill(0)};
    setClientes(nc);setFact(nf);save({clientes:nc,fact:nf});
  };
  const delCliente=id=>{
    if(!confirm('¿Eliminar este cliente y todos sus datos?'))return;
    const nc=clientes.filter(c=>c.id!==id);const nf={...fact};delete nf[id];
    setClientes(nc);setFact(nf);save({clientes:nc,fact:nf});
  };

  // Añadir/eliminar gastos
  const addGasto=g=>{const n=[...gastos,g];setGastos(n);save({gastos:n});};
  const delGasto=id=>{
    if(!confirm('¿Eliminar esta partida y todos sus datos?'))return;
    const n=gastos.filter(g=>g.id!==id);setGastos(n);save({gastos:n});
  };

  // Lock
  const doLock=()=>{
    if(!confirm('¿Fijar el presupuesto? No se podrá editar hasta desbloquearlo.'))return;
    const at=new Date().toLocaleDateString('es-ES',{day:'2-digit',month:'long',year:'numeric'});
    setLocked(true);setLockedAt(at);save({locked:true,lockedAt:at});
  };
  const doUnlock=()=>{
    if(!confirm('¿Desbloquear para editar? Esto modifica la foto base.'))return;
    setLocked(false);setLockedAt(null);save({locked:false,lockedAt:null});
  };

  // Cálculos — usan clientes y gastos como estado
  const CV=gastos.filter(g=>CV_BASE.includes(g.id)||g.grupo==='Personal').map(g=>g.id);
  const ingM   =m=>clientes.reduce((s,c)=>(fact[c.id]?.[m]||0)+s,0);
  const ingIVAM=m=>clientes.reduce((s,c)=>{const b=fact[c.id]?.[m]||0;return s+b*(1+(c.iva??0.21));},0);
  const cvM    =m=>gastos.filter(g=>CV.includes(g.id)).reduce((s,g)=>s+(g.imp[m]||0),0);
  const gfijM  =m=>gastos.reduce((s,g)=>s+(g.imp[m]||0),0);
  const imptM  =m=>imptos.reduce((s,i)=>s+(i.imp[m]||0),0);
  const mbM    =m=>ingM(m)+cvM(m);
  const ebitM  =m=>ingM(m)+gfijM(m);
  const resM   =m=>ebitM(m)+imptM(m);
  const pagoCM =m=>gastos.reduce((s,g)=>(g.imp[m]||0)*(1+(g.iva||0)-(g.irpf||0))+s,0)+imptM(m);
  const flujoM =m=>ingIVAM(m)+pagoCM(m);
  const saldoM =m=>{let s=saldo0;for(let i=0;i<=m;i++)s+=flujoM(i);return s;};

  const TI=MESES.reduce((_,__,m)=>_+ingM(m),0);
  const TMB=MESES.reduce((_,__,m)=>_+mbM(m),0);
  const TEB=MESES.reduce((_,__,m)=>_+ebitM(m),0);
  const TR=MESES.reduce((_,__,m)=>_+resM(m),0);
  const SF=saldoM(11);

  const props={clientes,setClientes,fact,gastos,setGastos,imptos,caja,locked,ingM,ingIVAM,cvM,mbM,ebitM,imptM,resM,pagoCM,flujoM,saldoM,gfijM,setF,setG,setI,setS,saldo0,addCliente,delCliente,addGasto,delGasto,setModal,save,CV,setCajaRow,addCajaRow,delCajaRow};

  return(
    <div className="app">
      {modal==='cliente'&&<ModalCliente onAdd={addCliente} onClose={()=>setModal(null)}/>}
      {modal?.tipo==='gasto'&&<ModalGasto grupoDefault={modal.grupo} onAdd={addGasto} onClose={()=>setModal(null)}/>}

      <div className="header">
        <div>
          <h1><i className="ti ti-building-skyscraper" style={{marginRight:7}}></i>BMG Law Services · Presupuesto 2026</h1>
          <div className="header-sub">Base anual fija · referencia para el seguimiento mensual</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
          {locked
            ?<><span style={{fontSize:11,color:'#90e0a0'}}><i className="ti ti-lock" style={{marginRight:4}}></i>Fijado el {lockedAt}</span>
               <button className="btn btn-sm" style={{background:'rgba(255,255,255,.1)',color:'#fff',borderColor:'rgba(255,255,255,.25)'}} onClick={doUnlock}><i className="ti ti-lock-open"></i> Desbloquear</button></>
            :<button className="btn btn-success" onClick={doLock}><i className="ti ti-lock"></i> Fijar presupuesto</button>
          }
        </div>
      </div>

      <div className="main-nav">
        <button className="active"><i className="ti ti-target"></i>Presupuesto</button>
        <button style={{color:'#bbb',cursor:'default'}}><i className="ti ti-chart-arrows-vertical"></i>Seguimiento</button>
        <button style={{color:'#bbb',cursor:'default'}}><i className="ti ti-dashboard"></i>Dashboard</button>
      </div>

      {locked
        ?<div className="locked-banner"><i className="ti ti-lock" style={{fontSize:16}}></i><span>Presupuesto fijado el <strong>{lockedAt}</strong>. Solo lectura.</span></div>
        :<div className="draft-banner"><i className="ti ti-pencil" style={{fontSize:16}}></i><span><strong>Borrador</strong> — edita directamente en las celdas. Pulsa <strong>Fijar presupuesto</strong> cuando todo esté correcto.</span></div>
      }

      <div className="metrics">
        <div className="metric"><div className="metric-label">Ingresos año</div><div className="metric-val green">{fmt(TI)}</div><div className="metric-sub">Base imponible</div></div>
        <div className="metric"><div className="metric-label">Margen bruto</div><div className={`metric-val ${TMB>=0?'green':'red'}`}>{fmt(TMB)}</div><div className="metric-sub">{pct(TMB,TI)}% sobre ventas</div></div>
        <div className="metric"><div className="metric-label">EBITDA</div><div className={`metric-val ${TEB>=0?'green':'red'}`}>{fmt(TEB)}</div><div className="metric-sub">{pct(TEB,TI)}% sobre ventas</div></div>
        <div className="metric"><div className="metric-label">Resultado neto</div><div className={`metric-val ${TR>=0?'green':'red'}`}>{fmt(TR)}</div><div className="metric-sub">{pct(TR,TI)}% sobre ventas</div></div>
        <div className="metric"><div className="metric-label">Saldo fin de año</div><div className={`metric-val ${SF>=0?'green':'red'}`}>{fmt(SF)}</div><div className="metric-sub">Saldo inicial: {fmt(saldo0)}</div></div>
      </div>

      <div className="sub-nav">
        <button className={sub==='facturacion'?'active':''} onClick={()=>setSub('facturacion')}><i className="ti ti-chart-bar"></i>Facturación</button>
        <button className={sub==='gastos'?'active':''} onClick={()=>setSub('gastos')}><i className="ti ti-receipt"></i>Gastos</button>
        <button className={sub==='pyg'?'active':''} onClick={()=>setSub('pyg')}><i className="ti ti-report-money"></i>Cuenta PyG</button>
        <button className={sub==='tesoreria'?'active':''} onClick={()=>setSub('tesoreria')}><i className="ti ti-building-bank"></i>Tesorería</button>
      </div>

      {sub==='facturacion'&&<TabFact {...props}/>}
      {sub==='gastos'&&<TabGastos {...props}/>}
      {sub==='pyg'&&<TabPyG {...props}/>}
      {sub==='tesoreria'&&<TabTes {...props}/>}
    </div>
  );
}

// ── FACTURACIÓN ──────────────────────────────────────────────────
function TabFact({clientes,setClientes,fact,locked,ingM,ingIVAM,setF,delCliente,setModal,save}){
  const TI=MESES.reduce((_,__,m)=>_+ingM(m),0);

  // IVA editable inline — actualiza el cliente en el array de estado
  const setIVA=(cid,val)=>{
    if(locked)return;
    const iva=Math.min(100,Math.max(0,parseFloat(val)||0))/100;
    const n=clientes.map(c=>c.id===cid?{...c,iva}:c);
    setClientes(n);save({clientes:n});
  };

  return(
    <div>
      <div className="alert alert-info">
        <i className="ti ti-info-circle"></i>
        <span>Importes en <strong>base imponible (sin IVA)</strong>. El % de IVA es editable por cliente y se aplica automáticamente en tesorería.</span>
      </div>
      <div className="card">
        <div className="card-header">
          <h2>Facturación por cliente · 2026</h2>
          {!locked&&<button className="btn btn-sm btn-primary" onClick={()=>setModal('cliente')}><i className="ti ti-plus"></i>Nuevo cliente</button>}
        </div>
        <div className="overflow-x">
        <table style={{minWidth:1120}}>
          <thead><tr>
            <th className="sticky" style={{minWidth:200}}>Cliente</th>
            <th style={{minWidth:72,textAlign:'center'}}>IVA %</th>
            {MESES.map(m=><th key={m} className="mh" style={{minWidth:68}}>{m}</th>)}
            <th className="mh mh-total" style={{minWidth:82}}>Total año</th>
            {!locked&&<th style={{width:32}}></th>}
          </tr></thead>
          <tbody>
          {clientes.map(c=>{
            const tcA=MESES.reduce((_,__,m)=>_+(fact[c.id]?.[m]||0),0);
            return(
              <tr key={c.id}>
                <td className="sticky" style={{fontWeight:500}}>{c.nombre}</td>
                <td style={{textAlign:'center',padding:'3px 6px'}}>
                  {locked
                    ? <span className={c.iva>0?'tag tag-iva':'tag tag-exento'}>{c.iva>0?`${+(c.iva*100).toFixed(1)}%`:'Exento'}</span>
                    : <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:2}}>
                        <input
                          type="number"
                          defaultValue={+(c.iva*100).toFixed(1)}
                          onBlur={e=>setIVA(c.id,e.target.value)}
                          min={0} max={100} step={0.1}
                          style={{width:46,textAlign:'center',border:'1px solid #dde0e6',borderRadius:4,padding:'2px 4px',fontSize:11,fontFamily:'monospace',background:'#f8f9ff'}}
                        />
                        <span style={{fontSize:10,color:'#888'}}>%</span>
                      </div>
                  }
                </td>
                {MESES.map((_,m)=>(
                  <td key={m} style={{padding:'3px 4px',borderLeft:'1px solid #f0f0f0'}}>
                    <input type="number" className="cell-edit" defaultValue={fact[c.id]?.[m]||0} disabled={locked} onBlur={e=>setF(c.id,m,e.target.value)} min={0}/>
                  </td>
                ))}
                <td className="num" style={{fontWeight:600,borderLeft:'2px solid #1a2b4a',background:'#f4f8ff'}}>{fmt(tcA)}</td>
                {!locked&&<td style={{padding:'2px 4px'}}><button className="btn btn-sm btn-danger" title="Eliminar" onClick={()=>delCliente(c.id)}><i className="ti ti-trash"></i></button></td>}
              </tr>
            );
          })}
          {/* Fila añadir nueva línea */}
          {!locked&&(
            <tr>
              <td colSpan={MESES.length+3} style={{padding:'6px 8px'}}>
                <button className="btn-add" onClick={()=>setModal('cliente')}>
                  <i className="ti ti-plus"></i>Añadir cliente / línea de facturación
                </button>
              </td>
            </tr>
          )}
          <tr className="total-row">
            <td className="sticky" colSpan={2}>TOTAL FACTURACIÓN</td>
            {MESES.map((_,m)=><td key={m} className="num">{fmt(ingM(m))}</td>)}
            <td className="num" style={{borderLeft:'2px solid #1a2b4a'}}>{fmt(TI)}</td>
            {!locked&&<td></td>}
          </tr>
          <tr style={{background:'#f0fbf6'}}>
            <td className="sticky" colSpan={2} style={{color:'#1a7a45',fontWeight:600,paddingLeft:8,fontSize:11}}>↳ Cobros caja (+ IVA)</td>
            {MESES.map((_,m)=><td key={m} className="num" style={{color:'#1a7a45',fontWeight:600}}>{fmt(ingIVAM(m))}</td>)}
            <td className="num" style={{borderLeft:'2px solid #1a2b4a',color:'#1a7a45',fontWeight:700}}>{fmt(MESES.reduce((_,__,m)=>_+ingIVAM(m),0))}</td>
            {!locked&&<td></td>}
          </tr>
          </tbody>
        </table>
        </div>
      </div>
    </div>
  );
}

                style={{width:40,textAlign:'center',border:'1px solid #dde0e6',borderRadius:4,padding:'2px 3px',fontSize:11,fontFamily:'monospace',background:'#f8f9ff'}}/>

          : <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:2}}>

                style={{width:40,textAlign:'center',border:'1px solid #dde0e6',borderRadius:4,padding:'2px 3px',fontSize:11,fontFamily:'monospace',background:'#fff9f0'}}/>

    </tr>
  );
}

// ── GASTOS ───────────────────────────────────────────────────────
function TabGastos({gastos,setGastos,locked,gfijM,setG,delGasto,setModal,save}){
  const grupos=GRUPOS_GASTO;
  const TG=MESES.reduce((_,__,m)=>_+gfijM(m),0);

  const setGastoMeta=(gid,field,rawVal)=>{
    if(locked)return;
    const val=Math.min(100,Math.max(0,parseFloat(rawVal)||0))/100;
    const n=gastos.map(g=>g.id!==gid?g:{...g,[field]:val});
    setGastos(n);save({gastos:n});
  };

  return(
    <div>
      <div className="alert alert-info">
        <i className="ti ti-info-circle"></i>
        <span>Importes en valor absoluto. IVA e IRPF editables por partida — se usan en la proyección de tesorería. Los impuestos (IVA/IRPF/IS) van en la pestaña <strong>Tesorería</strong>.</span>
      </div>
      <div className="card">
        <div className="card-header"><h2>Gastos por partida · 2026</h2></div>
        <div className="overflow-x">
        <table style={{minWidth:1200}}>
          <thead><tr>
            <th className="sticky" style={{minWidth:200}}>Partida</th>
            <th style={{minWidth:62,textAlign:'center',fontSize:9}}>IVA %</th>
            <th style={{minWidth:62,textAlign:'center',fontSize:9}}>IRPF %</th>
            {MESES.map(m=><th key={m} className="mh" style={{minWidth:72}}>{m}</th>)}
            <th className="mh mh-total" style={{minWidth:82}}>Total año</th>
            {!locked&&<th style={{width:32}}></th>}
          </tr></thead>
          <tbody>
          {grupos.map(gr=>{
            const gg=gastos.filter(g=>g.grupo===gr);
            const tgM=m=>gg.reduce((s,g)=>s+(g.imp[m]||0),0);
            const tgA=MESES.reduce((_,__,m)=>_+tgM(m),0);
            return[
              <tr key={`sg${gr}`} className="section-row"><td className="sticky" colSpan={locked?16:17}>{gr}</td></tr>,
              ...gg.map(g=><GastoRow key={g.id} g={g} locked={locked} setG={setG} setGastoMeta={setGastoMeta} delGasto={delGasto}/>),
              !locked&&<tr key={`add${gr}`}>
                <td colSpan={17} style={{padding:'4px 8px',background:'#fafafa'}}>
                  <button className="btn-add" onClick={()=>setModal({tipo:'gasto',grupo:gr})}>
                    <i className="ti ti-plus"></i>Añadir partida en {gr}
                  </button>
                </td>
              </tr>,
              <tr key={`tot${gr}`} style={{background:'#f4f6f9'}}>
                <td className="sticky" style={{fontWeight:700,paddingLeft:8,fontSize:11,color:'#1a2b4a'}} colSpan={3}>Subtotal {gr}</td>
                {MESES.map((_,m)=><td key={m} className="num" style={{fontWeight:600,color:'#b83232'}}>{fmt(tgM(m))}</td>)}
                <td className="num" style={{fontWeight:700,borderLeft:'2px solid #1a2b4a',color:'#b83232'}}>{fmt(tgA)}</td>
                {!locked&&<td></td>}
              </tr>
            ].filter(Boolean);
          })}
          <tr className="total-row">
            <td className="sticky" colSpan={3}>TOTAL GASTOS</td>
            {MESES.map((_,m)=><td key={m} className="num red">{fmt(gfijM(m))}</td>)}
            <td className="num red" style={{borderLeft:'2px solid #1a2b4a'}}>{fmt(TG)}</td>
            {!locked&&<td></td>}
          </tr>
          </tbody>
        </table>
        </div>
      </div>
    </div>
  );
}

              <td className="sticky" style={{paddingLeft:8}}>% sobre ventas</td>
              {MESES.map((_,m)=><td key={m} className="num">{pct(ebitM(m),ingM(m))}%</td>)}
              <td className="num" style={{borderLeft:'2px solid #1a2b4a'}}>{pct(TEB,TI)}%</td>
            </tr>
          </tbody>
        </table>
        </div>
      </div>
    </div>
  );
}


// ── TESORERÍA ────────────────────────────────────────────────────
function TabTes({caja,locked,saldo0,setS,setCajaRow,addCajaRow,delCajaRow}){
  // Cobros y pagos totales por mes desde las filas manuales
  const cobrosM =m=>caja.filter(r=>r.tipo==='cobro').reduce((s,r)=>s+(r.imp[m]||0),0);
  const pagosM  =m=>caja.filter(r=>r.tipo==='pago') .reduce((s,r)=>s+(r.imp[m]||0),0);
  const flujoM  =m=>cobrosM(m)-pagosM(m);
  const saldoM  =m=>{let s=saldo0;for(let i=0;i<=m;i++)s+=flujoM(i);return s;};

  const TC=MESES.reduce((_,__,m)=>_+cobrosM(m),0);
  const TP=MESES.reduce((_,__,m)=>_+pagosM(m),0);
  const SF=saldoM(11);
  const saldos=MESES.map((_,m)=>saldoM(m));
  const minS=Math.min(...saldos);
  const mesBajo=saldos.findIndex(s=>s===minS);

  const CRow=({r})=>{
    const tot=r.imp.reduce((s,v)=>s+v,0);
    const esCobro=r.tipo==='cobro';
    return(
      <tr>
        <td className="sticky" style={{paddingLeft:16,fontWeight:500}}>{r.concepto}</td>
        {MESES.map((_,m)=>(
          <td key={m} style={{padding:'3px 4px',borderLeft:'1px solid #f0f0f0'}}>
            <input type="number" className="cell-edit"
              value={r.imp[m]||0}
              disabled={locked}
              onChange={e=>setCajaRow(r.id,m,e.target.value)}
              min={0}
              style={{color:esCobro?'#1a7a45':'#b83232'}}
            />
          </td>
        ))}
        <td className="num" style={{fontWeight:600,borderLeft:'2px solid #1a2b4a',background:esCobro?'#f4fbf6':'#fdf8f0',color:esCobro?'#1a7a45':'#b83232'}}>{fmt(tot)}</td>
        {!locked&&<td style={{padding:'2px 4px'}}>
          <button className="btn btn-sm btn-danger" title="Eliminar" onClick={()=>delCajaRow(r.id)}><i className="ti ti-trash"></i></button>
        </td>}
      </tr>
    );
  };

  return(
    <div>
      <div className="alert alert-info">
        <i className="ti ti-info-circle"></i>
        <span>Plan de caja <strong>100% manual</strong>. Introduce directamente los cobros y pagos previstos cada mes. El saldo acumulado se calcula automáticamente.</span>
      </div>

      {/* Saldo inicial */}
      <div className="card" style={{marginBottom:14}}>
        <div className="card-header"><h2>Saldo bancario inicial · 1 enero 2026</h2></div>
        <div className="card-body" style={{display:'flex',alignItems:'center',gap:20,flexWrap:'wrap'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:12,color:'#555'}}>Saldo apertura:</span>
            <input type="number"
              style={{width:150,padding:'6px 10px',border:'1px solid #dde0e6',borderRadius:5,fontSize:15,fontWeight:700,fontFamily:'monospace',color:'#1a2b4a'}}
              value={saldo0} disabled={locked} onChange={e=>setS(e.target.value)}/>
          </div>
          <div style={{fontSize:11,color:'#555'}}>
            Saldo fin de año: <strong style={{color:SF>=0?'#1a7a45':'#b83232',fontSize:14}}>{fmt(SF)}</strong>
          </div>
          {minS<20000&&(
            <div style={{fontSize:11,background:'#fff8e0',color:'#7a5000',padding:'5px 10px',borderRadius:5,border:'1px solid #f0d070',display:'flex',alignItems:'center',gap:5}}>
              <i className="ti ti-alert-triangle"></i>Mes más ajustado: <strong>{MESES[mesBajo]}</strong> ({fmt(minS)})
            </div>
          )}
        </div>
      </div>

      {/* Tabla plan de caja */}
      <div className="card">
        <div className="card-header">
          <h2>Plan de caja mensual · 2026</h2>
          <span style={{fontSize:10,color:'#888'}}>{locked?'Solo lectura':'Editable — introduce los importes directamente'}</span>
        </div>
        <div className="overflow-x">
        <table style={{minWidth:1200}}>
          <thead><tr>
            <th className="sticky" style={{minWidth:220}}>Concepto</th>
            {MESES.map(m=><th key={m} className="mh" style={{minWidth:72}}>{m}</th>)}
            <th className="mh mh-total" style={{minWidth:82}}>Total año</th>
            {!locked&&<th style={{width:32}}></th>}
          </tr></thead>
          <tbody>
            {/* COBROS */}
            <tr className="section-row"><td className="sticky" colSpan={locked?14:15}>Cobros</td></tr>
            {caja.filter(r=>r.tipo==='cobro').map(r=><CRow key={r.id} r={r}/>)}
            {!locked&&<tr><td colSpan={locked?14:15} style={{padding:'4px 8px',background:'#fafafa'}}>
              <button className="btn-add" style={{borderColor:'#a0d4b0',color:'#1a7a45'}} onClick={()=>addCajaRow('cobro')}>
                <i className="ti ti-plus"></i>Añadir línea de cobro
              </button>
            </td></tr>}
            <tr style={{background:'#e4f4ec'}}>
              <td className="sticky" style={{fontWeight:700,color:'#1a7a45',paddingLeft:8}}>TOTAL COBROS</td>
              {MESES.map((_,m)=><td key={m} className="num green" style={{fontWeight:700}}>{fmt(cobrosM(m))}</td>)}
              <td className="num green" style={{fontWeight:700,borderLeft:'2px solid #1a2b4a'}}>{fmt(TC)}</td>
              {!locked&&<td></td>}
            </tr>

            {/* PAGOS EXPLOTACIÓN */}
            <tr className="section-row"><td className="sticky" colSpan={locked?14:15}>Pagos de explotación</td></tr>
            {caja.filter(r=>r.tipo==='pago'&&(r.subtipo==='explotacion'||!r.subtipo)).map(r=><CRow key={r.id} r={r}/>)}
            {!locked&&<tr><td colSpan={locked?14:15} style={{padding:'4px 8px',background:'#fafafa'}}>
              <button className="btn-add" style={{borderColor:'#e4b0b0',color:'#b83232'}} onClick={()=>addCajaRow('pago','explotacion')}>
                <i className="ti ti-plus"></i>Añadir pago de explotación
              </button>
            </td></tr>}
            <tr style={{background:'#f4e8e8'}}>
              <td className="sticky" style={{fontWeight:700,color:'#b83232',paddingLeft:8,fontSize:11}}>Subtotal explotación</td>
              {MESES.map((_,m)=>{
                const t=caja.filter(r=>r.tipo==='pago'&&(r.subtipo==='explotacion'||!r.subtipo)).reduce((s,r)=>s+(r.imp[m]||0),0);
                return<td key={m} className="num red" style={{fontWeight:600}}>{fmt(t)}</td>;
              })}
              <td className="num red" style={{fontWeight:600,borderLeft:'2px solid #1a2b4a'}}>
                {fmt(MESES.reduce((_,__,m)=>_+caja.filter(r=>r.tipo==='pago'&&(r.subtipo==='explotacion'||!r.subtipo)).reduce((s,r)=>s+(r.imp[m]||0),0),0))}
              </td>
              {!locked&&<td></td>}
            </tr>

            {/* PAGOS IMPUESTOS */}
            <tr className="section-row"><td className="sticky" colSpan={locked?14:15}>Pagos fiscales (IVA, IRPF, IS)</td></tr>
            {caja.filter(r=>r.tipo==='pago'&&r.subtipo==='impuestos').map(r=><CRow key={r.id} r={r}/>)}
            {!locked&&<tr><td colSpan={locked?14:15} style={{padding:'4px 8px',background:'#fafafa'}}>
              <button className="btn-add" style={{borderColor:'#c8b0d8',color:'#6a2b9a'}} onClick={()=>addCajaRow('pago','impuestos')}>
                <i className="ti ti-plus"></i>Añadir pago fiscal
              </button>
            </td></tr>}
            <tr style={{background:'#f0e8f8'}}>
              <td className="sticky" style={{fontWeight:700,color:'#6a2b9a',paddingLeft:8,fontSize:11}}>Subtotal fiscal</td>
              {MESES.map((_,m)=>{
                const t=caja.filter(r=>r.tipo==='pago'&&r.subtipo==='impuestos').reduce((s,r)=>s+(r.imp[m]||0),0);
                return<td key={m} className="num" style={{fontWeight:600,color:'#6a2b9a'}}>{fmt(t)}</td>;
              })}
              <td className="num" style={{fontWeight:600,borderLeft:'2px solid #1a2b4a',color:'#6a2b9a'}}>
                {fmt(MESES.reduce((_,__,m)=>_+caja.filter(r=>r.tipo==='pago'&&r.subtipo==='impuestos').reduce((s,r)=>s+(r.imp[m]||0),0),0))}
              </td>
              {!locked&&<td></td>}
            </tr>

            {/* TOTAL PAGOS */}
            <tr style={{background:'#fdecea'}}>
              <td className="sticky" style={{fontWeight:700,color:'#b83232',paddingLeft:8}}>TOTAL PAGOS</td>
              {MESES.map((_,m)=><td key={m} className="num red" style={{fontWeight:700}}>{fmt(pagosM(m))}</td>)}
              <td className="num red" style={{fontWeight:700,borderLeft:'2px solid #1a2b4a'}}>{fmt(TP)}</td>
              {!locked&&<td></td>}
            </tr>

            {/* FLUJO Y SALDO */}
            <tr style={{background:'#e4ecf4'}}>
              <td className="sticky" style={{fontWeight:700}}>FLUJO NETO MENSUAL</td>
              {MESES.map((_,m)=><td key={m} className={`num ${flujoM(m)>=0?'green':'red'}`} style={{fontWeight:700}}>{fmt(flujoM(m))}</td>)}
              <td className={`num ${(TC-TP)>=0?'green':'red'}`} style={{fontWeight:700,borderLeft:'2px solid #1a2b4a'}}>{fmt(TC-TP)}</td>
              {!locked&&<td></td>}
            </tr>
            <tr className="result-row">
              <td className="sticky">SALDO ACUMULADO</td>
              {MESES.map((_,m)=>{
                const s=saldoM(m);
                return<td key={m} className="num" style={{fontWeight:700,background:s<20000?'#8b2020':undefined}}>{fmt(s)}</td>;
              })}
              <td className="num" style={{borderLeft:'2px solid rgba(255,255,255,.3)',fontWeight:700}}>{fmt(SF)}</td>
              {!locked&&<td></td>}
            </tr>
          </tbody>
        </table>
        </div>
        <div style={{padding:'7px 14px',fontSize:10,color:'#888',borderTop:'1px solid #f0f0f0',background:'#fafafa'}}>
          <i className="ti ti-info-circle" style={{marginRight:4}}></i>Saldo en rojo oscuro = por debajo de 20.000 € (umbral de alerta operativa)
        </div>
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
