<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguimiento Real 2026 · BMG Law Services</title>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script>window.XLSX=XLSX;</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;background:#f0f2f5;color:#1a1a1a}
.app{max-width:1600px;margin:0 auto;padding:16px}
.header{background:#1a2b4a;color:#fff;padding:14px 20px;border-radius:8px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.header h1{font-size:15px;font-weight:700}
.header-sub{font-size:11px;color:#a0b4d0;margin-top:2px}
.main-nav{display:flex;gap:2px;background:#fff;border-radius:8px;padding:4px;margin-bottom:14px;border:1px solid #e0e0e0;flex-wrap:wrap}
.main-nav button{padding:7px 16px;border:none;background:transparent;border-radius:5px;cursor:pointer;font-size:12px;color:#555;font-weight:500;display:flex;align-items:center;gap:5px;transition:.12s;white-space:nowrap}
.main-nav button.active{background:#1a2b4a;color:#fff}
.main-nav button:hover:not(.active){background:#f0f2f5}
.sub-nav{display:flex;gap:0;border-bottom:2px solid #e4e8ee;margin-bottom:16px;flex-wrap:wrap}
.sub-nav button{padding:8px 18px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.12s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.sub-nav button.active{color:#1a2b4a;border-bottom-color:#1a2b4a}
.sub-nav button:hover:not(.active){color:#333}
.card{background:#fff;border-radius:8px;border:1px solid #e0e0e0;margin-bottom:14px;overflow:hidden}
.card-header{padding:11px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:#fafafa}
.card-header h2{font-size:12px;font-weight:700;color:#1a2b4a;text-transform:uppercase;letter-spacing:.04em}
.card-body{padding:14px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:14px}
.metric{background:#fff;border-radius:7px;padding:12px 14px;border:1px solid #e0e0e0}
.metric-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.metric-val{font-size:19px;font-weight:700;line-height:1.1}
.metric-sub{font-size:10px;color:#888;margin-top:3px}
.green{color:#1a7a45}.red{color:#b83232}.blue{color:#1a2b4a}.orange{color:#b06000}.gray{color:#888}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f4f6f9;padding:6px 8px;text-align:left;font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid #e4e8ee;white-space:nowrap}
td{padding:5px 8px;border-bottom:1px solid #f2f2f2;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.num{text-align:right;font-variant-numeric:tabular-nums;font-family:monospace;font-size:11px}
.sticky{position:sticky;left:0;background:#fff;z-index:2}
th.sticky{background:#f4f6f9;z-index:3}
.section-row td{background:#eef2f7;font-weight:700;font-size:10px;color:#1a2b4a;text-transform:uppercase;letter-spacing:.04em}
.total-row td{background:#e4ecf4;font-weight:700;font-size:11px;border-top:2px solid #1a2b4a}
.result-row td{background:#1a2b4a;color:#fff;font-weight:700;font-size:12px}
.result-row td.sticky{background:#1a2b4a;color:#fff}
.cell-edit{background:transparent;border:none;border-bottom:1px dashed #ccc;width:72px;text-align:right;font-size:11px;padding:1px 2px;font-family:monospace;color:#1a1a1a}
.cell-edit:focus{outline:none;border-bottom-color:#1a2b4a;background:#f0f4ff;border-radius:2px 2px 0 0}
.btn{padding:5px 12px;border-radius:5px;border:1px solid #dde0e6;background:#fff;cursor:pointer;font-size:11px;font-weight:600;color:#333;display:inline-flex;align-items:center;gap:5px;font-family:Arial,sans-serif}
.btn:hover{background:#f4f6f9}
.btn-primary{background:#1a2b4a;color:#fff;border-color:#1a2b4a}
.btn-sm{padding:3px 8px;font-size:10px}
.btn-danger{color:#b83232;border-color:#e4c0c0}.btn-danger:hover{background:#fdecea}
.btn-add{width:100%;padding:6px;border:1.5px dashed #c0cad8;border-radius:6px;background:transparent;color:#888;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;gap:5px;font-family:Arial,sans-serif}
.btn-add:hover{border-color:#1a2b4a;color:#1a2b4a;background:#f4f7fb}
.overflow-x{overflow-x:auto}
.mh{font-size:9px;text-align:center;padding:4px 2px;white-space:nowrap;border-left:1px solid #e8e8e8}
.mh-total{background:#e4ecf4;color:#1a2b4a;font-weight:700;border-left:2px solid #1a2b4a}
.pct-row td{font-size:10px;color:#888;font-style:italic;background:#fafafa}
.alert{padding:8px 12px;border-radius:6px;font-size:11px;margin-bottom:12px;display:flex;align-items:flex-start;gap:6px}
.alert-info{background:#e8f0fb;color:#1a2b4a;border:1px solid #c0d0e8}
.upload-area{border:2px dashed #ccd0d8;border-radius:7px;padding:16px;text-align:center;color:#888;cursor:pointer;font-size:11px;display:block}
.upload-area:hover{border-color:#1a2b4a;color:#1a2b4a;background:#f4f7fb}
.pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
.pill-ok{background:#e4f4ec;color:#1a7a45}.pill-warn{background:#fff4e0;color:#b06000}
.pill-err{background:#fdecea;color:#b83232}.pill-neu{background:#f0f0f0;color:#555}
.pill-jud{background:#fde8f0;color:#9b2060}.pill-nv{background:#e8f0fb;color:#1a2b4a}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:10px;padding:24px;width:100%;max-width:400px;box-shadow:0 16px 48px rgba(0,0,0,.18)}
.modal h3{font-size:14px;font-weight:700;margin-bottom:16px;color:#1a2b4a}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fg label{font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.03em}
.fg input,.fg select{font-size:12px;padding:6px 9px;border:1px solid #dde0e6;border-radius:5px;font-family:Arial,sans-serif}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useCallback}=React;
const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MESES_FULL=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
// MES_ACTUAL es ahora dinámico — se controla desde el estado de App
const SK='bmg_seguimiento_2026_v1';
const GRUPOS_GASTO=['Personal','Colaboradores','Estructura'];
const GRUPOS_CLIENTE=['Bancos','Servicios','Varios'];
const CV=['nominas','ss','rosalia','legalpigeon'];
const ESTADOS_FAC=['Pendiente','No vencida','Cobrada','En disputa','Controlado','PDT Resolución Jud.','Nuevo Vencimiento','Sin Respuesta','Incobrable','Cancelada'];

const CLIENTES0=[
  {id:'bsabadell',nombre:'Banco Sabadell',iva:0.21},
  {id:'link',nombre:'Link Finanzas',iva:0.21},
  {id:'aiqon',nombre:'Aiqon',iva:0},
  {id:'claimup',nombre:'Claim Up',iva:0.21},
  {id:'reclamio',nombre:'Reclamio',iva:0.21},
  {id:'cajamar',nombre:'Cajamar',iva:0.21},
  {id:'caixabank',nombre:'CaixaBank',iva:0.21},
  {id:'hispania',nombre:'Hispania / EOS / Sareb',iva:0.21},
  {id:'otros',nombre:'Otros clientes',iva:0.21},
  {id:'madrid',nombre:'Madrid',iva:0.21},
  {id:'gestoria',nombre:'Gestoría',iva:0.21},
  {id:'fiscal',nombre:'Fiscal',iva:0.21},
  {id:'procesal',nombre:'Procesal',iva:0.21},
  {id:'consultoria',nombre:'Consultoría',iva:0.21},
];

const GASTOS0=[
  {id:'nominas',concepto:'Nóminas personal fijo (neto)',grupo:'Personal',iva:0,irpf:0,imp:Array(12).fill(0)},
  {id:'ss',concepto:'Seguridad Social empresa',grupo:'Personal',iva:0,irpf:0,imp:Array(12).fill(0)},
  {id:'rosalia',concepto:'Rosalía / LexConnect / Alejandro / Laura',grupo:'Colaboradores',iva:0.21,irpf:0.15,imp:Array(12).fill(0)},
  {id:'legalpigeon',concepto:'Legal Pigeon',grupo:'Colaboradores',iva:0.21,irpf:0.15,imp:Array(12).fill(0)},
  {id:'mario',concepto:'623 Mario',grupo:'Colaboradores',iva:0.21,irpf:0.15,imp:Array(12).fill(0)},
  {id:'miguel_fee',concepto:'623 Miguel',grupo:'Colaboradores',iva:0.21,irpf:0.15,imp:Array(12).fill(0)},
  {id:'marc',concepto:'623 Marc',grupo:'Colaboradores',iva:0.21,irpf:0.15,imp:Array(12).fill(0)},
  {id:'apoint',concepto:'623 Apoint',grupo:'Colaboradores',iva:0.21,irpf:0.15,imp:Array(12).fill(0)},
  {id:'ignacio',concepto:'623 Ignacio',grupo:'Colaboradores',iva:0.21,irpf:0.15,imp:Array(12).fill(0)},
  {id:'jorge',concepto:'623 Jorge',grupo:'Colaboradores',iva:0.21,irpf:0.15,imp:Array(12).fill(0)},
  {id:'luis',concepto:'623 Luis Miralbell (fee -50%)',grupo:'Colaboradores',iva:0.21,irpf:0.15,imp:Array(12).fill(0)},
  {id:'alquiler',concepto:'Alquiler oficina Barcelona',grupo:'Estructura',iva:0.21,irpf:0.19,imp:Array(12).fill(0)},
  {id:'it',concepto:'Informática',grupo:'Estructura',iva:0.21,irpf:0,imp:Array(12).fill(0)},
  {id:'otros_g',concepto:'Otros gastos operativos',grupo:'Estructura',iva:0.21,irpf:0,imp:Array(12).fill(0)},
];

const fmt=(n,dec=0)=>{if(n===null||n===undefined||isNaN(n))return'—';const s=Math.abs(n).toLocaleString('es-ES',{minimumFractionDigits:dec,maximumFractionDigits:dec});return(n<0?'-':'')+'€\u202f'+s;};
const pn=v=>{const s=String(v||0).replace(/[€\s]/g,'').replace(',','.');const n=parseFloat(s);return isNaN(n)?0:n;};
const uid=()=>'c'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const load=()=>{try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null;}catch{return null;}};
const persist=d=>{try{localStorage.setItem(SK,JSON.stringify(d));}catch{}};
const pct=(a,b)=>b?Math.round(a/b*100):0;

// ── MODALS ───────────────────────────────────────────────────────
function ModalCliente({onAdd,onClose}){
  const [nombre,setNombre]=useState('');
  const [grupo,setGrupo]=useState('Varios');
  const [iva,setIva]=useState('0.21');
  const ok=()=>{if(!nombre.trim())return;onAdd({id:uid(),nombre:nombre.trim(),grupo,iva:parseFloat(iva)||0});onClose();};
  return(<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal">
      <h3><i className="ti ti-user-plus" style={{marginRight:7}}></i>Añadir cliente</h3>
      <div className="fg"><label>Nombre</label><input autoFocus value={nombre} onChange={e=>setNombre(e.target.value)} onKeyDown={e=>e.key==='Enter'&&ok()} placeholder="Ej: Nuevo Cliente SA"/></div>
      <div className="fg"><label>Grupo</label><select value={grupo} onChange={e=>setGrupo(e.target.value)}>{GRUPOS_CLIENTE.map(g=><option key={g}>{g}</option>)}</select></div>
      <div className="fg"><label>IVA</label><select value={iva} onChange={e=>setIva(e.target.value)}><option value="0.21">21%</option><option value="0.10">10%</option><option value="0">Exento</option></select></div>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}>
        <button className="btn" onClick={onClose}>Cancelar</button>
        <button className="btn btn-primary" onClick={ok}><i className="ti ti-plus"></i>Añadir</button>
      </div>
    </div>
  </div>);
}

function ModalGasto({grupoDefault,onAdd,onClose}){
  const [concepto,setConcepto]=useState('');
  const [grupo,setGrupo]=useState(grupoDefault||'Estructura');
  const [iva,setIva]=useState('0.21');
  const [irpf,setIrpf]=useState('0');
  const ok=()=>{if(!concepto.trim())return;onAdd({id:uid(),concepto:concepto.trim(),grupo,iva:parseFloat(iva)||0,irpf:parseFloat(irpf)||0,imp:Array(12).fill(0)});onClose();};
  return(<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal">
      <h3><i className="ti ti-plus" style={{marginRight:7}}></i>Añadir partida de gasto</h3>
      <div className="fg"><label>Concepto</label><input autoFocus value={concepto} onChange={e=>setConcepto(e.target.value)} onKeyDown={e=>e.key==='Enter'&&ok()} placeholder="Ej: Asesoría externa"/></div>
      <div className="fg"><label>Grupo</label><select value={grupo} onChange={e=>setGrupo(e.target.value)}>{GRUPOS_GASTO.map(g=><option key={g}>{g}</option>)}</select></div>
      <div className="fg"><label>IVA</label><select value={iva} onChange={e=>setIva(e.target.value)}><option value="0.21">21%</option><option value="0.10">10%</option><option value="0">Sin IVA</option></select></div>
      <div className="fg"><label>Retención IRPF</label><select value={irpf} onChange={e=>setIrpf(e.target.value)}><option value="0">Sin retención</option><option value="0.15">15%</option><option value="0.19">19%</option><option value="0.07">7%</option></select></div>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}>
        <button className="btn" onClick={onClose}>Cancelar</button>
        <button className="btn btn-primary" onClick={ok}><i className="ti ti-plus"></i>Añadir</button>
      </div>
    </div>
  </div>);
}

// ── APP ──────────────────────────────────────────────────────────
function App(){
  const sv=load();
  const [clientes,setClientes]=useState(()=>sv?.clientes||JSON.parse(JSON.stringify(CLIENTES0)));
  const [factReal,setFactReal]=useState(()=>sv?.factReal||Object.fromEntries(CLIENTES0.map(c=>[c.id,Array(12).fill(0)])));
  const [factFcst,setFactFcst]=useState(()=>sv?.factFcst||Object.fromEntries(CLIENTES0.map(c=>[c.id,Array(12).fill(0)])));
  const [gastosReal,setGastosReal]=useState(()=>sv?.gastosReal||JSON.parse(JSON.stringify(GASTOS0)));
  const [gastosFcst,setGastosFcst]=useState(()=>sv?.gastosFcst||JSON.parse(JSON.stringify(GASTOS0)));
  const [facturas,setFacturas]=useState(()=>sv?.facturas||[]);
  const [movs,setMovs]=useState(()=>sv?.movs||[]);
  // Mes de cierre independiente para facturación y gastos (0=Ene, 11=Dic, -1=ninguno cerrado)
  const [cierreFact, setCierreFact]=useState(()=>sv?.cierreFact??-1);
  const [cierreGastos,setCierreGastos]=useState(()=>sv?.cierreGastos??-1);
  const [sub,setSub]=useState('facturacion');
  const [modal,setModal]=useState(null);

  const save=useCallback((p)=>{
    persist({clientes,factReal,factFcst,gastosReal,gastosFcst,facturas,movs,cierreFact,cierreGastos,...p});
  },[clientes,factReal,factFcst,gastosReal,gastosFcst,facturas,movs,cierreFact,cierreGastos]);

  // Clientes
  const addCliente=c=>{const nc=[...clientes,c];const nr={...factReal,[c.id]:Array(12).fill(0)};const nf={...factFcst,[c.id]:Array(12).fill(0)};setClientes(nc);setFactReal(nr);setFactFcst(nf);save({clientes:nc,factReal:nr,factFcst:nf});};
  const delCliente=id=>{if(!confirm('¿Eliminar?'))return;const nc=clientes.filter(c=>c.id!==id);const nr={...factReal};const nf={...factFcst};delete nr[id];delete nf[id];setClientes(nc);setFactReal(nr);setFactFcst(nf);save({clientes:nc,factReal:nr,factFcst:nf});};
  const setIVACliente=(cid,v)=>{const iva=Math.min(100,Math.max(0,parseFloat(v)||0))/100;const nc=clientes.map(c=>c.id===cid?{...c,iva}:c);setClientes(nc);save({clientes:nc});};

  // Gastos
  const addGasto=g=>{const nr=[...gastosReal,g];const nf=[...gastosFcst,{...g}];setGastosReal(nr);setGastosFcst(nf);save({gastosReal:nr,gastosFcst:nf});};
  const delGasto=id=>{if(!confirm('¿Eliminar?'))return;const nr=gastosReal.filter(g=>g.id!==id);const nf=gastosFcst.filter(g=>g.id!==id);setGastosReal(nr);setGastosFcst(nf);save({gastosReal:nr,gastosFcst:nf});};
  const setGMeta=(gid,field,v)=>{const val=Math.min(100,Math.max(0,parseFloat(v)||0))/100;const nr=gastosReal.map(g=>g.id!==gid?g:{...g,[field]:val});const nf=gastosFcst.map(g=>g.id!==gid?g:{...g,[field]:val});setGastosReal(nr);setGastosFcst(nf);save({gastosReal:nr,gastosFcst:nf});};
  const setGR=(gid,m,v)=>{let val=pn(v);if(val>0)val=-val;const n=gastosReal.map(g=>g.id!==gid?g:{...g,imp:g.imp.map((x,i)=>i===m?val:x)});setGastosReal(n);save({gastosReal:n});};
  const setGF=(gid,m,v)=>{let val=pn(v);if(val>0)val=-val;const n=gastosFcst.map(g=>g.id!==gid?g:{...g,imp:g.imp.map((x,i)=>i===m?val:x)});setGastosFcst(n);save({gastosFcst:n});};

  // Cálculos — usan cierreFact/cierreGastos en lugar de MES_ACTUAL fijo
  const ingRealM=m=>clientes.reduce((s,c)=>(factReal[c.id]?.[m]||0)+s,0);
  const ingFcstM=m=>clientes.reduce((s,c)=>(factFcst[c.id]?.[m]||0)+s,0);
  const ingM=m=>m<=cierreFact?ingRealM(m):ingFcstM(m);
  const ingIVARealM=m=>clientes.reduce((s,c)=>{const b=factReal[c.id]?.[m]||0;return s+b*(1+(c.iva||0));},0);
  const gCombM=m=>(m<=cierreGastos?gastosReal:gastosFcst).reduce((s,g)=>s+(g.imp[m]||0),0);

  // Cobros desde facturas
  const cobrosRealesM=m=>facturas.filter(f=>f.estado==='Cobrada'&&f.fechaCobro&&new Date(f.fechaCobro).getMonth()===m&&new Date(f.fechaCobro).getFullYear()===2026).reduce((s,f)=>s+(parseFloat(f.importe)||0),0);
  const cobrosPendM=m=>facturas.filter(f=>f.mesCobro===m&&!['Cobrada','Cancelada','Incobrable'].includes(f.estado)).reduce((s,f)=>s+(parseFloat(f.importe)||0),0);

  // Pagos del extracto
  const pagosExtM=m=>movs.filter(mv=>mv.mes===m&&mv.importe<0).reduce((s,mv)=>s+mv.importe,0);
  const flujoCajaM=m=>cobrosRealesM(m)+pagosExtM(m);

  const totRealYTD=cierreFact>=0?MESES.slice(0,cierreFact+1).reduce((_,__,m)=>_+ingRealM(m),0):0;
  const totPend=facturas.filter(f=>!['Cobrada','Cancelada','Incobrable'].includes(f.estado)).reduce((s,f)=>s+(parseFloat(f.importe)||0),0);
  const totVenc=facturas.filter(f=>f.estado==='Pendiente').reduce((s,f)=>s+(parseFloat(f.importe)||0),0);
  const totPagosYTD=cierreGastos>=0?MESES.slice(0,cierreGastos+1).reduce((_,__,m)=>_+pagosExtM(m),0):0;

  return(
    <div className="app">
      {modal==='cliente'&&<ModalCliente onAdd={addCliente} onClose={()=>setModal(null)}/>}
      {modal?.tipo==='gasto'&&<ModalGasto grupoDefault={modal.grupo} onAdd={addGasto} onClose={()=>setModal(null)}/>}

      <div className="header">
        <div>
          <h1><i className="ti ti-building-skyscraper" style={{marginRight:7}}></i>BMG Law Services · Seguimiento Real 2026</h1>
          <div className="header-sub">Fact. cerrada hasta: {cierreFact>=0?MESES[cierreFact]:'Sin cerrar'} · Gastos cerrados hasta: {cierreGastos>=0?MESES[cierreGastos]:'Sin cerrar'}</div>
        </div>
        <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:10,color:'#a0b4d0',whiteSpace:'nowrap'}}>Facturación cerrada hasta:</span>
            <select value={cierreFact} onChange={e=>{const v=parseInt(e.target.value);setCierreFact(v);save({cierreFact:v});}}
              style={{fontSize:11,padding:'3px 7px',borderRadius:4,border:'1px solid rgba(255,255,255,.2)',background:'rgba(255,255,255,.1)',color:'#fff',fontFamily:'Arial,sans-serif',cursor:'pointer'}}>
              <option value={-1}>Sin cerrar</option>

// ── FACTURACIÓN REAL ─────────────────────────────────────────────
function FactRow({c,factReal,factFcst,setFactReal,setFactFcst,setIVACliente,delCliente,save,cierreFact}){
  const totReal=cierreFact>=0?MESES.slice(0,cierreFact+1).reduce((_,__,m)=>_+(factReal[c.id]?.[m]||0),0):0;
  const totCierre=totReal+MESES.slice(cierreFact+1).reduce((_,__,i)=>_+(factFcst[c.id]?.[cierreFact+1+i]||0),0);
  const setR=(m,v)=>{const val=pn(v);const n={...factReal,[c.id]:(factReal[c.id]||Array(12).fill(0)).map((x,i)=>i===m?val:x)};setFactReal(n);save({factReal:n});};
  const setF=(m,v)=>{const val=pn(v);const n={...factFcst,[c.id]:(factFcst[c.id]||Array(12).fill(0)).map((x,i)=>i===m?val:x)};setFactFcst(n);save({factFcst:n});};
  return(
    <tr>
      <td className="sticky" style={{fontWeight:500}}>{c.nombre}</td>
      <td style={{textAlign:'center',padding:'3px 5px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:2}}>
          <input type="number" defaultValue={+(c.iva*100).toFixed(1)} onBlur={e=>setIVACliente(c.id,e.target.value)} min={0} max={100} step={0.1}
            style={{width:42,textAlign:'center',border:'1px solid #dde0e6',borderRadius:4,padding:'2px 3px',fontSize:11,fontFamily:'monospace',background:'#f8f9ff'}}/>
          <span style={{fontSize:10,color:'#888'}}>%</span>
        </div>
      </td>
      {MESES.map((_,m)=>{
        const esReal=m<=cierreFact;
        const def=esReal?(factReal[c.id]?.[m]||0):(factFcst[c.id]?.[m]||0);
        return(<td key={m} style={{padding:'3px 4px',borderLeft:'1px solid #f0f0f0',background:esReal?'#f4fbf6':'#f4f7fd'}}>
          <input type="number" className="cell-edit" defaultValue={def}
            disabled={esReal}
            onBlur={e=>{if(esReal)setR(m,e.target.value);else setF(m,e.target.value);}}
            min={0}
            style={{color:esReal?'#1a7a45':'#1a2b4a',borderBottomColor:esReal?'transparent':'#90b0d8',cursor:'text',fontWeight:esReal?600:400}}/>
        </td>);
      })}
      <td className="num" style={{fontWeight:600,borderLeft:'2px solid #c0d0e0',background:'#f0f4f8',color:'#1a7a45'}}>{fmt(totReal)}</td>
      <td className="num" style={{fontWeight:600,borderLeft:'2px solid #1a2b4a',background:'#e8f0fb',color:'#1a2b4a'}}>{fmt(totCierre)}</td>
      <td style={{padding:'2px 4px'}}><button className="btn btn-sm btn-danger" onClick={()=>delCliente(c.id)}><i className="ti ti-trash"></i></button></td>
    </tr>
  );
}

// ── CLIENTES PENDIENTES DE COBRO ─────────────────────────────────
function TabFacturas({facturas,setFacturas,cobrosRealesM,cobrosPendM,save}){
  const blank={id:'',cliente:'',clienteNm:'',fecha:'',importe:'',diasRetraso:0,mesCobro:Math.min(6,11),estado:'Pendiente',fechaCobro:'',respuestaCliente:''};
  const [form,setForm]=useState(blank);
  const [editId,setEditId]=useState(null);
  const [filtroMes,setFiltroMes]=useState('todos');
  const [filtroEstado,setFiltroEstado]=useState('todos');
  const [importLog,setImportLog]=useState(null);

  const upd=f=>{setFacturas([...f]);save({facturas:[...f]});};
  const guardar=()=>{
    if(!form.id||!form.cliente||!form.importe){alert('Nº Factura, Cliente e Importe son obligatorios.');return;}
    const f={...form,importe:parseFloat(form.importe)||0,mesCobro:parseInt(form.mesCobro)};
    if(editId){upd(facturas.map(x=>x.id===editId?f:x));setEditId(null);}
    else upd([...facturas,f]);
    setForm(blank);
  };
  const cambiarEstado=(id,estado)=>{
    const fc=estado==='Cobrada'?prompt('Fecha de cobro (YYYY-MM-DD):',new Date().toISOString().split('T')[0]):'';
    upd(facturas.map(f=>f.id!==id?f:{...f,estado,fechaCobro:estado==='Cobrada'?(fc||new Date().toISOString().split('T')[0]):f.fechaCobro}));
  };

  const importarXLSX=e=>{
    const file=e.target.files[0];if(!file)return;
    if(!window.XLSX){alert('Librería no cargada.');return;}
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const wb=window.XLSX.read(ev.target.result,{type:'array',cellDates:true});
        let pendRows=[],nvRows=[];
        wb.SheetNames.forEach(n=>{
          const u=n.toUpperCase();
          const rows=window.XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,defval:''});
          if(u.includes('PENDIENTE'))pendRows=rows;
          else if(u.includes('NO VENCIDA')||u.includes('EMITIDA'))nvRows=rows;
        });
        if(!pendRows.length)pendRows=window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
        const toISO=v=>{if(!v)return'';if(v instanceof Date)return v.toISOString().split('T')[0];if(typeof v==='number'&&v>40000){const d=new Date((v-25569)*86400000);return d.toISOString().split('T')[0];}const s=String(v).trim();const p=s.split(/[\/\-\.]/);if(p.length===3)return p[0].length===4?`${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`:`${p[2].length===2?'20'+p[2]:p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;return s;};
        const parseHoja=(rows,defEstado)=>{
          if(!rows||rows.length<2)return[];
          const hdrs=rows[0].map(h=>String(h||'').trim().toUpperCase());
          const ci={};[['factura',['FACTURA','Nº FACTURA']],['cliente',['CLIENTE']],['clienteNm',['DEUDOR','NOMBRE']],['fecha',['FECHA FACTURA','FECHA FRA','FECHA']],['importe',['IMPORTE FACTURA','IMPORTE','TOTAL']],['diasRetraso',['DÍAS RETRASO','DIAS RETRASO']],['estado',['ESTADO']],['respuesta',['RESPUESTA','OBSERVACIONES']]].forEach(([k,als])=>{const i=hdrs.findIndex(h=>als.some(a=>h.includes(a)));if(i>=0)ci[k]=i;});
          if(ci.factura===undefined)return[];
          return rows.slice(1).map(row=>{
            const g=i=>i!==undefined?String(row[i]??'').trim():'';
            const factura=g(ci.factura);const importe=parseFloat(String(g(ci.importe)).replace(',','.'))||0;
            if(!factura||!importe)return null;
            const fechaISO=toISO(ci.fecha!==undefined?row[ci.fecha]:'');
            const diasRetraso=parseInt(g(ci.diasRetraso))||0;
            const mesCobro=diasRetraso>200?Math.min(9,11):diasRetraso>60?Math.min(8,11):Math.min(6,11);
            return{id:factura,cliente:g(ci.cliente),clienteNm:g(ci.clienteNm),fecha:fechaISO,importe,diasRetraso,mesCobro,estado:defEstado==='No vencida'?'No vencida':g(ci.estado)||'Pendiente',fechaCobro:'',respuestaCliente:g(ci.respuesta)};
          }).filter(Boolean);
        };
        const delExcel=[...parseHoja(pendRows,'Pendiente'),...parseHoja(nvRows,'No vencida')];
        const cobradas=facturas.filter(f=>f.estado==='Cobrada');
        const cobIds=new Set(cobradas.map(f=>f.id));
        const exIds=new Set(delExcel.map(f=>f.id));
        const merged=[...cobradas,...delExcel.filter(f=>!cobIds.has(f.id)),...facturas.filter(f=>!exIds.has(f.id)&&['En disputa','PDT Resolución Jud.','Controlado','Incobrable'].includes(f.estado))];
        upd(merged);setImportLog({fecha:new Date().toLocaleDateString('es-ES'),total:delExcel.length});
      }catch(err){alert('Error: '+err.message);}
    };
    r.readAsArrayBuffer(file);e.target.value='';
  };

  const filtradas=facturas.filter(f=>filtroMes==='todos'||f.mesCobro===parseInt(filtroMes)).filter(f=>filtroEstado==='todos'||f.estado===filtroEstado).sort((a,b)=>parseInt(b.diasRetraso||0)-parseInt(a.diasRetraso||0));
  const pendTotal=facturas.filter(f=>!['Cobrada','Cancelada','Incobrable'].includes(f.estado)).reduce((s,f)=>s+(parseFloat(f.importe)||0),0);
  const cobTotal=facturas.filter(f=>f.estado==='Cobrada').reduce((s,f)=>s+(parseFloat(f.importe)||0),0);

  return(
    <div>
      <div className="metrics">
        <div className="metric"><div className="metric-label">Pendiente cobro</div><div className="metric-val orange">{fmt(pendTotal)}</div></div>
        <div className="metric"><div className="metric-label">Cobrado YTD</div><div className="metric-val green">{fmt(cobTotal)}</div></div>
        {[0,1,2].map(i=>{const m=Math.min(cierreFact+1,11)+i;return m<=11?<div key={m} className="metric"><div className="metric-label">Previsto {MESES[m]}</div><div className="metric-val blue">{fmt(cobrosPendM(m))}</div></div>:null;})}
      </div>
      <div className="card">
        <div className="card-header"><h2>Importar desde Excel BMG</h2></div>
        <div className="card-body">
          <div style={{display:'flex',gap:16,flexWrap:'wrap',alignItems:'flex-start'}}>
            <label className="upload-area" style={{width:240}}>
              <i className="ti ti-file-spreadsheet" style={{fontSize:22,display:'block',marginBottom:6,color:'#1a7a45'}}></i>
              <strong>Subir Seguimiento_Factura_*.xlsx</strong>
              <span style={{fontSize:10,color:'#aaa',display:'block',marginTop:4}}>Lee "FACTURAS PENDIENTES" y "FACTURAS EMITIDAS NO VENCIDAS"</span>
              <input type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={importarXLSX}/>
            </label>
            <div style={{fontSize:11,color:'#555',lineHeight:1.9}}>🔒 Cobradas — nunca se modifican<br/>🔄 Excel — se actualizan/añaden<br/>⚠️ En disputa/Judicial — se conservan</div>
          </div>
          {importLog&&<div style={{marginTop:10,padding:'8px 12px',borderRadius:6,background:'#e4f4ec',border:'1px solid #a0d4b0',fontSize:11,color:'#1a5c30'}}><i className="ti ti-circle-check" style={{marginRight:5}}></i>Importado el {importLog.fecha} · {importLog.total} facturas</div>}
        </div>
      </div>
      <div className="card">
        <div className="card-header"><h2>{editId?'Editar factura':'Añadir factura'}</h2>{editId&&<button className="btn btn-sm" onClick={()=>{setEditId(null);setForm(blank);}}>Cancelar</button>}</div>
        <div className="card-body">
          <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'flex-end'}}>
            {[['Nº Factura','id',110,'M00001/26'],['Cliente','cliente',140,''],['Deudor','clienteNm',140,'']].map(([lbl,key,w,ph])=>(
              <div key={key} style={{display:'flex',flexDirection:'column',gap:3}}>
                <label style={{fontSize:10,fontWeight:700,color:'#666',textTransform:'uppercase'}}>{lbl}</label>
                <input value={form[key]} onChange={e=>setForm(p=>({...p,[key]:e.target.value}))} style={{width:w,padding:'5px 8px',border:'1px solid #dde0e6',borderRadius:5,fontSize:12,fontFamily:'Arial,sans-serif'}} placeholder={ph}/>
              </div>
            ))}
            <div style={{display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:10,fontWeight:700,color:'#666',textTransform:'uppercase'}}>Fecha</label><input type="date" value={form.fecha} onChange={e=>setForm(p=>({...p,fecha:e.target.value}))} style={{width:130,padding:'5px 8px',border:'1px solid #dde0e6',borderRadius:5,fontSize:12,fontFamily:'Arial,sans-serif'}}/></div>
            <div style={{display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:10,fontWeight:700,color:'#666',textTransform:'uppercase'}}>Importe €</label><input type="number" value={form.importe} onChange={e=>setForm(p=>({...p,importe:e.target.value}))} style={{width:110,padding:'5px 8px',border:'1px solid #dde0e6',borderRadius:5,fontSize:12,fontFamily:'Arial,sans-serif'}} min={0}/></div>
            <div style={{display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:10,fontWeight:700,color:'#666',textTransform:'uppercase'}}>Días</label><input type="number" value={form.diasRetraso} onChange={e=>setForm(p=>({...p,diasRetraso:e.target.value}))} style={{width:70,padding:'5px 8px',border:'1px solid #dde0e6',borderRadius:5,fontSize:12,fontFamily:'Arial,sans-serif'}} min={0}/></div>
            <div style={{display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:10,fontWeight:700,color:'#666',textTransform:'uppercase'}}>Mes cobro</label>
              <select value={form.mesCobro} onChange={e=>setForm(p=>({...p,mesCobro:parseInt(e.target.value)}))} style={{width:110,padding:'5px 8px',border:'1px solid #dde0e6',borderRadius:5,fontSize:12,fontFamily:'Arial,sans-serif'}}>
                {MESES_FULL.map((m,i)=><option key={i} value={i}>{m}</option>)}
              </select>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:10,fontWeight:700,color:'#666',textTransform:'uppercase'}}>Estado</label>
              <select value={form.estado} onChange={e=>setForm(p=>({...p,estado:e.target.value}))} style={{width:145,padding:'5px 8px',border:'1px solid #dde0e6',borderRadius:5,fontSize:12,fontFamily:'Arial,sans-serif'}}>
                {ESTADOS_FAC.map(e=><option key={e}>{e}</option>)}
              </select>
            </div>
            <button className="btn btn-primary" onClick={guardar}>{editId?'Actualizar':'Añadir'}</button>
          </div>
        </div>
      </div>
      <div className="card">
        <div className="card-header">
          <h2>Listado ({filtradas.length})</h2>
          <div style={{display:'flex',gap:6}}>
            <select value={filtroMes} onChange={e=>setFiltroMes(e.target.value)} style={{fontSize:11,padding:'3px 6px',border:'1px solid #dde0e6',borderRadius:4,fontFamily:'Arial,sans-serif'}}>
              <option value="todos">Todos los meses</option>{MESES_FULL.map((m,i)=><option key={i} value={i}>{m}</option>)}
            </select>
            <select value={filtroEstado} onChange={e=>setFiltroEstado(e.target.value)} style={{fontSize:11,padding:'3px 6px',border:'1px solid #dde0e6',borderRadius:4,fontFamily:'Arial,sans-serif'}}>
              <option value="todos">Todos los estados</option>{ESTADOS_FAC.map(e=><option key={e}>{e}</option>)}
            </select>
          </div>
        </div>
        <div className="overflow-x">
        <table>
          <thead><tr><th>Nº Factura</th><th>Cliente</th><th>Deudor</th><th>Fecha</th><th className="num">Importe</th><th className="num">Días</th><th>Cobro est.</th><th>Estado</th><th>F. Cobro</th><th></th></tr></thead>
          <tbody>
          {filtradas.map(f=>{
            const dias=parseInt(f.diasRetraso)||0;
            return(<tr key={f.id} style={{background:f.estado==='Cobrada'?'#f4fbf6':undefined}}>
              <td style={{fontFamily:'monospace',fontSize:11}}>{f.id}</td>
              <td style={{fontWeight:600,fontSize:11}}>{f.cliente}</td>
              <td style={{fontSize:11,color:'#555',maxWidth:130,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{f.clienteNm||'—'}</td>
              <td style={{fontSize:11,whiteSpace:'nowrap'}}>{f.fecha||'—'}</td>
              <td className="num" style={{fontWeight:700}}>{fmt(parseFloat(f.importe)||0)}</td>
              <td className="num" style={{fontSize:11,color:dias>365?'#b83232':dias>180?'#b06000':'#555'}}>{dias||'—'}</td>
              <td><select value={f.mesCobro} onChange={ev=>upd(facturas.map(x=>x.id===f.id?{...x,mesCobro:parseInt(ev.target.value)}:x))} style={{fontSize:10,padding:'2px 4px',border:'1px solid #ddd',borderRadius:4,width:88,fontFamily:'Arial,sans-serif'}}>{MESES_FULL.map((m,i)=><option key={i} value={i}>{m}</option>)}</select></td>
              <td><select value={f.estado} onChange={e=>{const nuevo=e.target.value;if(nuevo==='Cobrada'&&f.estado!=='Cobrada')cambiarEstado(f.id,nuevo);else upd(facturas.map(x=>x.id===f.id?{...x,estado:nuevo}:x));}} style={{fontSize:10,padding:'2px 4px',border:'1px solid #ddd',borderRadius:4,width:140,fontFamily:'Arial,sans-serif'}}>{ESTADOS_FAC.map(e=><option key={e}>{e}</option>)}</select></td>
              <td style={{fontSize:11,color:'#1a7a45',whiteSpace:'nowrap'}}>{f.fechaCobro||'—'}</td>
              <td><button className="btn btn-sm" style={{marginRight:2}} onClick={()=>{setForm({...f});setEditId(f.id);}}><i className="ti ti-edit"></i></button><button className="btn btn-sm btn-danger" onClick={()=>upd(facturas.filter(x=>x.id!==f.id))}><i className="ti ti-trash"></i></button></td>
            </tr>);
          })}
          {filtradas.length===0&&<tr><td colSpan={10} style={{textAlign:'center',padding:20,color:'#aaa'}}>Sin resultados</td></tr>}
          </tbody>
        </table>
        </div>
      </div>
    </div>
  );
}

// ── PyG REAL ─────────────────────────────────────────────────────
function TabPyG({ingM,gCombM,gastosReal,gastosFcst,cierreFact,cierreGastos}){
  const cvM=m=>(m<=cierreGastos?gastosReal:gastosFcst).filter(g=>CV.includes(g.id)).reduce((s,g)=>s+(g.imp[m]||0),0);
  const mbM=m=>ingM(m)+cvM(m);
  const ebitM=m=>ingM(m)+gCombM(m);
  const TI=MESES.reduce((_,__,m)=>_+ingM(m),0);
  const TMB=MESES.reduce((_,__,m)=>_+mbM(m),0);
  const TEB=MESES.reduce((_,__,m)=>_+ebitM(m),0);
  const bg=m=>m<=cierreGastos?'#f4fbf6':'#f4f7fd';
  const bt=m=>m<=cierreGastos?'2px solid #a0d4b0':'2px solid #90b0d8';
  return(
    <div>
      <div style={{display:'flex',gap:16,alignItems:'center',padding:'8px 0',marginBottom:10,fontSize:11,flexWrap:'wrap'}}>
        <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:14,height:14,background:'#e4f4ec',border:'1px solid #a0d4b0',borderRadius:2,display:'inline-block'}}></span><strong style={{color:'#1a7a45'}}>Real</strong></span>
        <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:14,height:14,background:'#e8f0fb',border:'1px solid #90b0d8',borderRadius:2,display:'inline-block'}}></span><strong style={{color:'#1a2b4a'}}>Forecast</strong></span>
      </div>
      <div className="metrics">
        <div className="metric"><div className="metric-label">Ingresos proyección</div><div className="metric-val green">{fmt(TI)}</div></div>
        <div className="metric"><div className="metric-label">Margen bruto</div><div className={`metric-val ${TMB>=0?'green':'red'}`}>{fmt(TMB)}</div><div className="metric-sub">{pct(TMB,TI)}%</div></div>
        <div className="metric"><div className="metric-label">EBITDA</div><div className={`metric-val ${TEB>=0?'green':'red'}`}>{fmt(TEB)}</div><div className="metric-sub">{pct(TEB,TI)}%</div></div>
      </div>
      <div className="card">
        <div className="card-header"><h2>Cuenta de explotación real + forecast · 2026</h2><span style={{fontSize:10,color:'#888'}}>Sin impuestos — están en Caja real</span></div>
        <div className="overflow-x">
        <table style={{minWidth:1120}}>
          <thead><tr>
            <th className="sticky" style={{minWidth:230}}>Partida</th>
            {MESES.map((m,i)=><th key={i} className="mh" style={{minWidth:72,background:i<=cierreGastos?'#e4f4ec':'#e8f0fb',color:i<=cierreGastos?'#1a7a45':'#1a2b4a',borderTop:i<=cierreGastos?'2px solid #a0d4b0':'2px solid #90b0d8'}}>
              {m}<div style={{fontSize:8,fontWeight:400,marginTop:1}}>{i<=cierreGastos?'real':'fcst'}</div>
            </th>)}
            <th className="mh mh-total" style={{minWidth:82}}>Año</th>
          </tr></thead>
          <tbody>
            <tr className="section-row"><td className="sticky" colSpan={14}>Ingresos</td></tr>
            <tr><td className="sticky" style={{fontWeight:700,paddingLeft:16,color:'#1a7a45'}}>Ingresos netos</td>
              {MESES.map((_,m)=><td key={m} className="num" style={{color:'#1a7a45',fontWeight:600,background:bg(m),borderTop:bt(m)}}>{fmt(ingM(m))}</td>)}
              <td className="num" style={{fontWeight:700,borderLeft:'2px solid #1a2b4a',color:'#1a7a45'}}>{fmt(TI)}</td>
            </tr>
            <tr className="section-row"><td className="sticky" colSpan={14}>Costes variables</td></tr>
            {gastosReal.filter(g=>CV.includes(g.id)).map(g=>{
              const tot=MESES.reduce((_,__,m)=>_+(m<=cierreGastos?gastosReal:gastosFcst).find(x=>x.id===g.id)?.imp[m]||0,0);
              return(<tr key={g.id}><td className="sticky" style={{paddingLeft:16,color:'#555'}}>{g.concepto}</td>
                {MESES.map((_,m)=>{const v=(m<=cierreGastos?gastosReal:gastosFcst).find(x=>x.id===g.id)?.imp[m]||0;return<td key={m} className="num" style={{color:'#b83232',background:bg(m),borderTop:bt(m)}}>{fmt(v)}</td>;})}
                <td className="num" style={{fontWeight:600,borderLeft:'2px solid #1a2b4a',color:'#b83232',background:'#fdf8f0'}}>{fmt(tot)}</td>
              </tr>);
            })}
            <tr className="total-row"><td className="sticky" style={{paddingLeft:8}}>MARGEN BRUTO</td>{MESES.map((_,m)=><td key={m} className={`num ${mbM(m)>=0?'green':'red'}`}>{fmt(mbM(m))}</td>)}<td className={`num ${TMB>=0?'green':'red'}`} style={{borderLeft:'2px solid #1a2b4a'}}>{fmt(TMB)}</td></tr>
            <tr className="pct-row"><td className="sticky" style={{paddingLeft:8}}>% sobre ventas</td>{MESES.map((_,m)=><td key={m} className="num">{pct(mbM(m),ingM(m))}%</td>)}<td className="num" style={{borderLeft:'2px solid #1a2b4a'}}>{pct(TMB,TI)}%</td></tr>
            <tr className="section-row"><td className="sticky" colSpan={14}>Gastos estructura y colaboradores</td></tr>
            {gastosReal.filter(g=>!CV.includes(g.id)).map(g=>{
              const tot=MESES.reduce((_,__,m)=>_+(m<=cierreGastos?gastosReal:gastosFcst).find(x=>x.id===g.id)?.imp[m]||0,0);
              return(<tr key={g.id}><td className="sticky" style={{paddingLeft:16,color:'#555'}}>{g.concepto}</td>
                {MESES.map((_,m)=>{const v=(m<=cierreGastos?gastosReal:gastosFcst).find(x=>x.id===g.id)?.imp[m]||0;return<td key={m} className="num" style={{color:'#b83232',background:bg(m),borderTop:bt(m)}}>{fmt(v)}</td>;})}
                <td className="num" style={{fontWeight:600,borderLeft:'2px solid #1a2b4a',color:'#b83232',background:'#fdf8f0'}}>{fmt(tot)}</td>
              </tr>);
            })}
            <tr className="result-row"><td className="sticky">EBITDA</td>{MESES.map((_,m)=><td key={m} className="num">{fmt(ebitM(m))}</td>)}<td className="num" style={{borderLeft:'2px solid rgba(255,255,255,.3)',fontSize:13}}>{fmt(TEB)}</td></tr>
            <tr className="pct-row"><td className="sticky" style={{paddingLeft:8}}>% sobre ventas</td>{MESES.map((_,m)=><td key={m} className="num">{pct(ebitM(m),ingM(m))}%</td>)}<td className="num" style={{borderLeft:'2px solid #1a2b4a'}}>{pct(TEB,TI)}%</td></tr>
          </tbody>
        </table>
        </div>
      </div>
    </div>
  );
}

// ── CAJA REAL ────────────────────────────────────────────────────
function TabCaja({facturas,cobrosRealesM,cobrosPendM,pagosExtM,flujoCajaM,cierreFact,cierreGastos}){
  const [saldo0,setSaldo0]=useState(()=>{try{const d=JSON.parse(localStorage.getItem(SK)||'{}');return d?.saldo0??45000;}catch{return 45000;}});
  const setSaldoG=v=>{setSaldo0(pn(v));try{const d=JSON.parse(localStorage.getItem(SK)||'{}');localStorage.setItem(SK,JSON.stringify({...d,saldo0:pn(v)}));}catch{}};
  const saldoM=m=>{let s=saldo0;for(let i=0;i<=m;i++)s+=flujoCajaM(i);return s;};
  const TC=cierreFact>=0?MESES.slice(0,cierreFact+1).reduce((_,__,m)=>_+cobrosRealesM(m),0):0;
  const TP=cierreGastos>=0?MESES.slice(0,cierreGastos+1).reduce((_,__,m)=>_+pagosExtM(m),0):0;
  const SF=saldoM(Math.max(cierreFact,cierreGastos,0));
  return(
    <div>
      <div className="alert alert-info"><i className="ti ti-info-circle"></i><span>Cobros = facturas marcadas como Cobradas. Pagos = extracto bancario. Cobros pendientes = previsión de meses futuros.</span></div>
      <div className="card" style={{marginBottom:14}}>
        <div className="card-header"><h2>Saldo bancario inicial · 1 enero 2026</h2></div>
        <div className="card-body" style={{display:'flex',alignItems:'center',gap:20,flexWrap:'wrap'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:12,color:'#555'}}>Saldo apertura:</span>
            <input type="number" style={{width:150,padding:'6px 10px',border:'1px solid #dde0e6',borderRadius:5,fontSize:15,fontWeight:700,fontFamily:'monospace',color:'#1a2b4a'}} value={saldo0} onChange={e=>setSaldoG(e.target.value)}/>
          </div>
          <div style={{fontSize:11}}>Saldo actual ({MESES[Math.max(cierreFact,cierreGastos,0)]}): <strong style={{color:SF>=0?'#1a7a45':'#b83232',fontSize:14}}>{fmt(SF)}</strong></div>
        </div>
      </div>
      <div className="card">
        <div className="card-header"><h2>Plan de caja real · 2026</h2></div>
        <div className="overflow-x">
        <table style={{minWidth:1100}}>
          <thead><tr>
            <th className="sticky" style={{minWidth:220}}>Concepto</th>
            {MESES.map((m,i)=><th key={i} className="mh" style={{minWidth:72,background:i<cierreFact?'#e8f7ee':i===cierreFact?'#fff4e0':'#f4f6f9',color:i<cierreFact?'#1a7a45':i===cierreFact?'#b06000':'#999'}}>
              {m}{i<cierreFact?' ✓':i===cierreFact?' →':''}
            </th>)}
            <th className="mh mh-total" style={{minWidth:82}}>YTD</th>
          </tr></thead>
          <tbody>
            <tr className="section-row"><td className="sticky" colSpan={14}>Cobros</td></tr>
            <tr style={{background:'#f4fbf6'}}><td className="sticky" style={{fontWeight:700,paddingLeft:16,color:'#1a7a45'}}>Cobros reales (facturas cobradas)</td>
              {MESES.map((_,m)=><td key={m} className="num" style={{color:'#1a7a45',fontWeight:600,background:m>cierreFact?'#fafafa':undefined}}>{m<=cierreFact?fmt(cobrosRealesM(m)):'—'}</td>)}
              <td className="num" style={{fontWeight:700,borderLeft:'2px solid #1a2b4a',color:'#1a7a45'}}>{fmt(TC)}</td>
            </tr>
            <tr style={{background:'#f4f8ff'}}><td className="sticky" style={{paddingLeft:16,color:'#888',fontStyle:'italic'}}>↳ Cobros pendientes previstos</td>
              {MESES.map((_,m)=><td key={m} className="num" style={{fontSize:11,color:'#1a2b4a',fontStyle:'italic'}}>{m>cierreFact?fmt(cobrosPendM(m)):'—'}</td>)}
              <td className="num" style={{borderLeft:'2px solid #1a2b4a',color:'#888',fontStyle:'italic'}}>{fmt(MESES.slice(cierreFact+1).reduce((_,__,i)=>_+cobrosPendM(cierreFact+1+i),0))}</td>
            </tr>
            <tr className="section-row"><td className="sticky" colSpan={14}>Pagos (extracto bancario)</td></tr>
            <tr><td className="sticky" style={{fontWeight:700,paddingLeft:16,color:'#b83232'}}>Total pagos reales</td>
              {MESES.map((_,m)=><td key={m} className="num" style={{color:'#b83232',fontWeight:600,background:m>cierreGastos?'#fafafa':undefined}}>{m<=cierreGastos?fmt(pagosExtM(m)):'—'}</td>)}
              <td className="num" style={{fontWeight:700,borderLeft:'2px solid #1a2b4a',color:'#b83232'}}>{fmt(TP)}</td>
            </tr>
            <tr style={{background:'#e4ecf4'}}><td className="sticky" style={{fontWeight:700}}>FLUJO NETO REAL</td>
              {MESES.map((_,m)=><td key={m} className={`num ${flujoCajaM(m)>=0?'green':'red'}`} style={{fontWeight:700,background:m>Math.max(cierreFact,cierreGastos)?'#f4f6f9':undefined}}>{m<=Math.max(cierreFact,cierreGastos)?fmt(flujoCajaM(m)):'—'}</td>)}
              <td className={`num ${TC+TP>=0?'green':'red'}`} style={{fontWeight:700,borderLeft:'2px solid #1a2b4a'}}>{fmt(TC+TP)}</td>
            </tr>
            <tr className="result-row"><td className="sticky">SALDO ACUMULADO</td>
              {MESES.map((_,m)=>{const s=saldoM(m);return<td key={m} className="num" style={{fontWeight:700,background:m<=Math.max(cierreFact,cierreGastos)&&s<20000?'#8b2020':m>Math.max(cierreFact,cierreGastos)?'rgba(0,0,0,.2)':undefined,color:m>Math.max(cierreFact,cierreGastos)?'rgba(255,255,255,.3)':undefined}}>{m<=Math.max(cierreFact,cierreGastos)?fmt(s):'—'}</td>;})}
              <td className="num" style={{fontWeight:700,borderLeft:'2px solid rgba(255,255,255,.3)'}}>{MESES[Math.max(cierreFact,cierreGastos,0)]}: {fmt(SF)}</td>
            </tr>
          </tbody>
        </table>
        </div>
      </div>
    </div>
  );
}

// ── EXTRACTO BANCARIO ────────────────────────────────────────────
const CATS=['Nóminas personal fijo (neto)','Seguridad Social empresa','Rosalía / LexConnect / Alejandro / Laura','Legal Pigeon','623 Mario','623 Miguel','623 Marc','623 Apoint','623 Ignacio','623 Jorge','623 Luis Miralbell','Alquiler oficina Barcelona','Informática','Otros gastos operativos','Traspaso entre cuentas','Nueva deuda / financiación','Sin categorizar'];

function TabExtracto({movs,setMovs,save}){
  const [banco,setBanco]=useState('CAIXABANK');
  const [filtroMes,setFiltroMes]=useState('todos');
  const [bancos,setBancos]=useState(['CAIXABANK','SABADELL','CAJAMAR','BSCH','BANKINTER']);

  const autocat=(c,imp)=>{
    const s=c.toLowerCase();
    if(imp>0)return s.includes('traspas')?'Traspaso entre cuentas':s.includes('prestam')||s.includes('financ')?'Nueva deuda / financiación':'Sin categorizar';
    if(s.includes('nomin')||s.includes('salari'))return'Nóminas personal fijo (neto)';
    if(s.includes('seguridad social')||s.includes(' ss '))return'Seguridad Social empresa';
    if(s.includes('alquiler'))return'Alquiler oficina Barcelona';
    if(s.includes('hacienda')||s.includes('irpf')||s.includes('aeat'))return'Otros gastos operativos';
    if(s.includes('mario'))return'623 Mario';if(s.includes('miguel'))return'623 Miguel';
    if(s.includes('marc'))return'623 Marc';if(s.includes('legalpigeon'))return'Legal Pigeon';
    return'Otros gastos operativos';
  };

  const importarXLSX=e=>{
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const wb=window.XLSX.read(ev.target.result,{type:'array',cellDates:true});
        const rows=window.XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
        let hRow=0;for(let i=0;i<Math.min(5,rows.length);i++){if(rows[i].map(c=>String(c).toLowerCase()).some(c=>c.includes('fecha')||c.includes('importe'))){hRow=i;break;}}
        const hdrs=rows[hRow].map(c=>String(c).toLowerCase().trim());
        const ci={fecha:hdrs.findIndex(h=>h.includes('fecha')),concepto:hdrs.findIndex(h=>h.includes('concepto')||h.includes('descripci')),importe:hdrs.findIndex(h=>h.includes('importe')||h.includes('cargo'))};
        if(ci.fecha<0)ci.fecha=0;if(ci.concepto<0)ci.concepto=1;if(ci.importe<0)ci.importe=2;
        const existentes=new Set(movs.map(m=>`${m.fecha}|${m.concepto}|${m.importe}|${m.banco}`));
        const nuevos=[];let añ=0,dup=0;
        rows.slice(hRow+1).forEach((row,idx)=>{
          if(!row[ci.fecha]&&!row[ci.importe])return;
          let fechaISO='',fechaStr='';
          const fRaw=row[ci.fecha];
          if(fRaw instanceof Date){fechaISO=fRaw.toISOString().split('T')[0];fechaStr=`${String(fRaw.getDate()).padStart(2,'0')}/${String(fRaw.getMonth()+1).padStart(2,'0')}/${fRaw.getFullYear()}`;}
          else if(typeof fRaw==='number'&&fRaw>40000){const d=new Date((fRaw-25569)*86400000);fechaISO=d.toISOString().split('T')[0];fechaStr=`${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;}
          else{fechaStr=String(fRaw||'').trim();const p=fechaStr.split(/[\/\-\.]/);if(p.length===3)fechaISO=p[0].length===4?`${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`:`${p[2].length===2?'20'+p[2]:p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;}
          if(!fechaISO)return;
          const concepto=String(row[ci.concepto]||'').replace(/\s+/g,' ').trim();if(!concepto)return;
          const importe=parseFloat(String(row[ci.importe]||'').replace(',','.').replace(/[^0-9.-]/g,''));if(isNaN(importe))return;
          const mes=new Date(fechaISO).getMonth();
          const k=`${fechaStr}|${concepto}|${importe}|${banco}`;
          if(existentes.has(k)){dup++;return;}existentes.add(k);
          nuevos.push({id:'e'+Date.now()+'_'+idx,fecha:fechaStr,fechaISO,concepto,importe,mes,banco,categoria:autocat(concepto,importe)});añ++;
        });
        const n=[...movs,...nuevos];setMovs(n);save({movs:n});
        alert(`✓ ${añ} movimientos añadidos${dup>0?` · ${dup} duplicados`:''}`);
      }catch(err){alert('Error: '+err.message);}
    };
    r.readAsArrayBuffer(file);e.target.value='';
  };

  const updCat=(id,cat)=>{const n=movs.map(m=>m.id===id?{...m,categoria:cat}:m);setMovs(n);save({movs:n});};
  const del=id=>{const n=movs.filter(m=>m.id!==id);setMovs(n);save({movs:n});};

  const filtrados=movs.filter(m=>filtroMes==='todos'||m.mes===parseInt(filtroMes)).sort((a,b)=>(b.fechaISO||'').localeCompare(a.fechaISO||''));
  const sinCat=movs.filter(m=>m.categoria==='Sin categorizar'&&m.importe>0).length;

  return(
    <div>
      <div className="alert alert-info"><i className="ti ti-info-circle"></i><span>Los <strong>cobros de facturas NO van aquí</strong> — se gestionan en "Clientes pendientes cobro". Aquí solo gastos, traspasos y deuda.</span></div>
      <div className="card">
        <div className="card-header"><h2>Importar extracto bancario</h2></div>
        <div className="card-body">
          <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap',marginBottom:12}}>
            <div style={{display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:10,fontWeight:700,color:'#666',textTransform:'uppercase'}}>Banco</label>
              <select value={banco} onChange={e=>setBanco(e.target.value)} style={{padding:'5px 8px',border:'1px solid #dde0e6',borderRadius:5,fontSize:12,fontFamily:'Arial,sans-serif'}}>
                {bancos.map(b=><option key={b}>{b}</option>)}
              </select>
            </div>
          </div>
          <label className="upload-area" style={{maxWidth:280}}>
            <i className="ti ti-file-spreadsheet" style={{fontSize:22,display:'block',marginBottom:6,color:'#1a2b4a'}}></i>
            <strong>Subir extracto bancario (.xlsx)</strong>
            <span style={{fontSize:10,color:'#aaa',display:'block',marginTop:4}}>Formato: Fecha | Concepto | Importe</span>
            <input type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={importarXLSX}/>
          </label>
        </div>
      </div>
      {movs.length>0&&<div className="card">
        <div className="card-header">
          <h2>Movimientos ({filtrados.length})</h2>
          <div style={{display:'flex',gap:6}}>
            <select value={filtroMes} onChange={e=>setFiltroMes(e.target.value)} style={{fontSize:11,padding:'3px 6px',border:'1px solid #dde0e6',borderRadius:4,fontFamily:'Arial,sans-serif'}}><option value="todos">Todos</option>{MESES_FULL.map((m,i)=><option key={i} value={i}>{m}</option>)}</select>
            {sinCat>0&&<span style={{fontSize:11,background:'#fff8e0',color:'#7a5000',padding:'3px 8px',borderRadius:4,border:'1px solid #f0d070'}}>{sinCat} sin categorizar</span>}
            <button className="btn btn-sm btn-danger" onClick={()=>{if(confirm('¿Borrar todo?')){setMovs([]);save({movs:[]});}}}>Limpiar</button>
          </div>
        </div>
        <div className="overflow-x">
        <table>
          <thead><tr><th>Fecha</th><th>Concepto</th><th>Banco</th><th className="num">Importe</th><th>Mes</th><th>Categoría</th><th></th></tr></thead>
          <tbody>
          {filtrados.map(mv=>(
            <tr key={mv.id} style={{background:mv.categoria==='Sin categorizar'&&mv.importe>0?'#fffbe6':undefined}}>
              <td style={{fontSize:11,whiteSpace:'nowrap'}}>{mv.fecha}</td>
              <td style={{fontSize:11,maxWidth:260,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={mv.concepto}>{mv.concepto}</td>
              <td style={{fontSize:11}}>{mv.banco}</td>
              <td className={`num ${mv.importe>=0?'green':'red'}`} style={{fontWeight:600}}>{fmt(mv.importe)}</td>
              <td style={{fontSize:11}}>{MESES[mv.mes]}</td>
              <td><select value={mv.categoria} onChange={e=>updCat(mv.id,e.target.value)} style={{fontSize:10,padding:'2px 4px',border:'1px solid #ddd',borderRadius:4,width:200,fontFamily:'Arial,sans-serif',background:mv.categoria==='Sin categorizar'&&mv.importe>0?'#fffbe6':'#fff'}}>
                {CATS.map(c=><option key={c}>{c}</option>)}
              </select></td>
              <td><button className="btn btn-sm btn-danger" onClick={()=>del(mv.id)}><i className="ti ti-x"></i></button></td>
            </tr>
          ))}
          </tbody>
        </table>
        </div>
      </div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
