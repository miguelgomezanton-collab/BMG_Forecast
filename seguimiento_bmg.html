<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;font-size:13px;background:#f0f2f5;color:#1a1a1a}
.app{max-width:1600px;margin:0 auto;padding:16px}
.header{background:#1a2b4a;color:#fff;padding:14px 20px;border-radius:8px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.header h1{font-size:15px;font-weight:700}
.header-sub{font-size:11px;color:#a0b4d0;margin-top:2px}
.main-nav{display:flex;gap:2px;background:#fff;border-radius:8px;padding:4px;margin-bottom:14px;border:1px solid #e0e0e0;flex-wrap:wrap}
.main-nav button{padding:7px 16px;border:none;background:transparent;border-radius:5px;cursor:pointer;font-size:12px;color:#555;font-weight:500;display:flex;align-items:center;gap:5px;transition:.12s;white-space:nowrap}
.main-nav button.active{background:#1a2b4a;color:#fff}
.main-nav button:hover:not(.active){background:#f0f2f5}
.sub-nav{display:flex;gap:0;border-bottom:2px solid #e4e8ee;margin-bottom:16px;flex-wrap:wrap}
.sub-nav button{padding:8px 18px;border:none;background:transparent;cursor:pointer;font-size:12px;font-weight:600;color:#888;border-bottom:2px solid transparent;margin-bottom:-2px;transition:.12s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.sub-nav button.active{color:#1a2b4a;border-bottom-color:#1a2b4a}
.sub-nav button:hover:not(.active){color:#333}
.card{background:#fff;border-radius:8px;border:1px solid #e0e0e0;margin-bottom:14px;overflow:hidden}
.card-header{padding:11px 16px;border-bottom:1px solid #f0f0f0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;background:#fafafa}
.card-header h2{font-size:12px;font-weight:700;color:#1a2b4a;text-transform:uppercase;letter-spacing:.04em}
.card-body{padding:14px}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:10px;margin-bottom:14px}
.metric{background:#fff;border-radius:7px;padding:12px 14px;border:1px solid #e0e0e0}
.metric-label{font-size:10px;color:#888;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.metric-val{font-size:19px;font-weight:700;line-height:1.1}
.metric-sub{font-size:10px;color:#888;margin-top:3px}
.green{color:#1a7a45}.red{color:#b83232}.blue{color:#1a2b4a}.orange{color:#b06000}.gray{color:#888}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#f4f6f9;padding:6px 8px;text-align:left;font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.04em;border-bottom:2px solid #e4e8ee;white-space:nowrap}
td{padding:5px 8px;border-bottom:1px solid #f2f2f2;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.num{text-align:right;font-variant-numeric:tabular-nums;font-family:monospace;font-size:11px}
.sticky{position:sticky;left:0;background:#fff;z-index:2}
th.sticky{background:#f4f6f9;z-index:3}
.section-row td{background:#eef2f7;font-weight:700;font-size:10px;color:#1a2b4a;text-transform:uppercase;letter-spacing:.04em}
.total-row td{background:#e4ecf4;font-weight:700;font-size:11px;border-top:2px solid #1a2b4a}
.result-row td{background:#1a2b4a;color:#fff;font-weight:700;font-size:12px}
.result-row td.sticky{background:#1a2b4a;color:#fff}
.cell-edit{background:transparent;border:none;border-bottom:1px dashed #ccc;width:72px;text-align:right;font-size:11px;padding:1px 2px;font-family:monospace;color:#1a1a1a}
.cell-edit:focus{outline:none;border-bottom-color:#1a2b4a;background:#f0f4ff;border-radius:2px 2px 0 0}
.btn{padding:5px 12px;border-radius:5px;border:1px solid #dde0e6;background:#fff;cursor:pointer;font-size:11px;font-weight:600;color:#333;display:inline-flex;align-items:center;gap:5px;font-family:Arial,sans-serif}
.btn:hover{background:#f4f6f9}
.btn-primary{background:#1a2b4a;color:#fff;border-color:#1a2b4a}
.btn-sm{padding:3px 8px;font-size:10px}
.btn-danger{color:#b83232;border-color:#e4c0c0}.btn-danger:hover{background:#fdecea}
.btn-add{width:100%;padding:6px;border:1.5px dashed #c0cad8;border-radius:6px;background:transparent;color:#888;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;gap:5px;font-family:Arial,sans-serif}
.btn-add:hover{border-color:#1a2b4a;color:#1a2b4a;background:#f4f7fb}
.overflow-x{overflow-x:auto}
.mh{font-size:9px;text-align:center;padding:4px 2px;white-space:nowrap;border-left:1px solid #e8e8e8}
.mh-total{background:#e4ecf4;color:#1a2b4a;font-weight:700;border-left:2px solid #1a2b4a}
.pct-row td{font-size:10px;color:#888;font-style:italic;background:#fafafa}
.alert{padding:8px 12px;border-radius:6px;font-size:11px;margin-bottom:12px;display:flex;align-items:flex-start;gap:6px}
.alert-info{background:#e8f0fb;color:#1a2b4a;border:1px solid #c0d0e8}
.upload-area{border:2px dashed #ccd0d8;border-radius:7px;padding:16px;text-align:center;color:#888;cursor:pointer;font-size:11px;display:block}
.upload-area:hover{border-color:#1a2b4a;color:#1a2b4a;background:#f4f7fb}
.pill{display:inline-block;font-size:10px;padding:2px 7px;border-radius:20px;font-weight:600;white-space:nowrap}
.pill-ok{background:#e4f4ec;color:#1a7a45}.pill-warn{background:#fff4e0;color:#b06000}
.pill-err{background:#fdecea;color:#b83232}.pill-neu{background:#f0f0f0;color:#555}
.pill-jud{background:#fde8f0;color:#9b2060}.pill-nv{background:#e8f0fb;color:#1a2b4a}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:10px;padding:24px;width:100%;max-width:400px;box-shadow:0 16px 48px rgba(0,0,0,.18)}
.modal h3{font-size:14px;font-weight:700;margin-bottom:16px;color:#1a2b4a}
.fg{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.fg label{font-size:10px;font-weight:700;color:#666;text-transform:uppercase;letter-spacing:.03em}
.fg input,.fg select{font-size:12px;padding:6px 9px;border:1px solid #dde0e6;border-radius:5px;font-family:Arial,sans-serif}
input[type=number]{-moz-appearance:textfield}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState}=React;
const MESES=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
const MESES_FULL=['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
// MES_ACTUAL es ahora dinámico — se controla desde el estado de App
const SK='bmg_seguimiento_2026_v1';
const GRUPOS_GASTO=['Personal','Colaboradores','Estructura'];
const GRUPOS_CLIENTE=['Bancos','Servicios','Varios'];
const CV=['nominas','ss','rosalia','legalpigeon'];
const ESTADOS_FAC=['Pendiente','No vencida','Cobrada','En disputa','Controlado','PDT Resolución Jud.','Nuevo Vencimiento','Sin Respuesta','Incobrable','Cancelada'];

const CLIENTES0=[
  {id:'bsabadell',nombre:'Banco Sabadell',iva:0.21,plazo:60},
  {id:'link',nombre:'Link Finanzas',iva:0.21,plazo:60},
  {id:'aiqon',nombre:'Aiqon',iva:0,plazo:60},
  {id:'claimup',nombre:'Claim Up',iva:0.21,plazo:60},
  {id:'reclamio',nombre:'Reclamio',iva:0.21,plazo:60},
  {id:'cajamar',nombre:'Cajamar',iva:0.21,plazo:60},
  {id:'caixabank',nombre:'CaixaBank',iva:0.21,plazo:60},
  {id:'hispania',nombre:'Hispania / EOS / Sareb',iva:0.21,plazo:60},
  {id:'otros',nombre:'Otros clientes',iva:0.21,plazo:60},
  {id:'madrid',nombre:'Madrid',iva:0.21,plazo:60},
  {id:'gestoria',nombre:'Gestoría',iva:0.21,plazo:60},
  {id:'fiscal',nombre:'Fiscal',iva:0.21,plazo:60},
  {id:'procesal',nombre:'Procesal',iva:0.21,plazo:60},
  {id:'consultoria',nombre:'Consultoría',iva:0.21,plazo:60},
];

const GASTOS0=[
  {id:'nominas',concepto:'Nóminas personal fijo (bruto)',grupo:'Personal',iva:0,irpf:0,imp:Array(12).fill(0)},
  {id:'ss',concepto:'Seguridad Social empresa',grupo:'Personal',iva:0,irpf:0,imp:Array(12).fill(0)},
  {id:'rosalia',concepto:'Rosalía / LexConnect / Alejandro / Laura',grupo:'Colaboradores',iva:0.21,irpf:0.15,imp:Array(12).fill(0)},
  {id:'legalpigeon',concepto:'Legal Pigeon',grupo:'Colaboradores',iva:0.21,irpf:0.15,imp:Array(12).fill(0)},
  {id:'mario',concepto:'623 Mario',grupo:'Colaboradores',iva:0.21,irpf:0.15,imp:Array(12).fill(0)},
  {id:'miguel_fee',concepto:'623 Miguel',grupo:'Colaboradores',iva:0.21,irpf:0.15,imp:Array(12).fill(0)},
  {id:'marc',concepto:'623 Marc',grupo:'Colaboradores',iva:0.21,irpf:0.15,imp:Array(12).fill(0)},
  {id:'apoint',concepto:'623 Apoint',grupo:'Colaboradores',iva:0.21,irpf:0.15,imp:Array(12).fill(0)},
  {id:'ignacio',concepto:'623 Ignacio',grupo:'Colaboradores',iva:0.21,irpf:0.15,imp:Array(12).fill(0)},
  {id:'jorge',concepto:'623 Jorge',grupo:'Colaboradores',iva:0.21,irpf:0.15,imp:Array(12).fill(0)},
  {id:'luis',concepto:'623 Luis Miralbell (fee -50%)',grupo:'Colaboradores',iva:0.21,irpf:0.15,imp:Array(12).fill(0)},
  {id:'alquiler',concepto:'Alquiler oficina Barcelona',grupo:'Estructura',iva:0.21,irpf:0.19,imp:Array(12).fill(0)},
  {id:'it',concepto:'Informática',grupo:'Estructura',iva:0.21,irpf:0,imp:Array(12).fill(0)},
  {id:'otros_g',concepto:'Otros gastos operativos',grupo:'Estructura',iva:0.21,irpf:0,imp:Array(12).fill(0)},
];

const fmt=(n,dec=0)=>{if(n===null||n===undefined||isNaN(n))return'—';const s=Math.abs(n).toLocaleString('es-ES',{minimumFractionDigits:dec,maximumFractionDigits:dec});return(n<0?'-':'')+'€\u202f'+s;};
const pn=v=>{const s=String(v||0).replace(/[€\s]/g,'').replace(',','.');const n=parseFloat(s);return isNaN(n)?0:n;};
const uid=()=>'c'+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const load=()=>{try{const r=localStorage.getItem(SK);return r?JSON.parse(r):null;}catch{return null;}};
const persist=d=>{try{localStorage.setItem(SK,JSON.stringify(d));}catch{}};
const pct=(a,b)=>b?Math.round(a/b*100):0;

// ── MODALS ───────────────────────────────────────────────────────
function ModalCliente({onAdd,onClose}){
  const [nombre,setNombre]=useState('');
  const [grupo,setGrupo]=useState('Varios');
  const [iva,setIva]=useState('0.21');
  const ok=()=>{if(!nombre.trim())return;onAdd({id:uid(),nombre:nombre.trim(),grupo,iva:parseFloat(iva)||0});onClose();};
  return(<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal">
      <h3><i className="ti ti-user-plus" style={{marginRight:7}}></i>Añadir cliente</h3>
      <div className="fg"><label>Nombre</label><input autoFocus value={nombre} onChange={e=>setNombre(e.target.value)} onKeyDown={e=>e.key==='Enter'&&ok()} placeholder="Ej: Nuevo Cliente SA"/></div>
      <div className="fg"><label>Grupo</label><select value={grupo} onChange={e=>setGrupo(e.target.value)}>{GRUPOS_CLIENTE.map(g=><option key={g}>{g}</option>)}</select></div>
      <div className="fg"><label>IVA</label><select value={iva} onChange={e=>setIva(e.target.value)}><option value="0.21">21%</option><option value="0.10">10%</option><option value="0">Exento</option></select></div>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}>
        <button className="btn" onClick={onClose}>Cancelar</button>
        <button className="btn btn-primary" onClick={ok}><i className="ti ti-plus"></i>Añadir</button>
      </div>
    </div>
  </div>);
}

function ModalGasto({grupoDefault,onAdd,onClose}){
  const [concepto,setConcepto]=useState('');
  const [grupo,setGrupo]=useState(grupoDefault||'Estructura');
  const [iva,setIva]=useState('0.21');
  const [irpf,setIrpf]=useState('0');
  const ok=()=>{if(!concepto.trim())return;onAdd({id:uid(),concepto:concepto.trim(),grupo,iva:parseFloat(iva)||0,irpf:parseFloat(irpf)||0,imp:Array(12).fill(0)});onClose();};
  return(<div className="modal-bg" onClick={e=>e.target===e.currentTarget&&onClose()}>
    <div className="modal">
      <h3><i className="ti ti-plus" style={{marginRight:7}}></i>Añadir partida de gasto</h3>
      <div className="fg"><label>Concepto</label><input autoFocus value={concepto} onChange={e=>setConcepto(e.target.value)} onKeyDown={e=>e.key==='Enter'&&ok()} placeholder="Ej: Asesoría externa"/></div>
      <div className="fg"><label>Grupo</label><select value={grupo} onChange={e=>setGrupo(e.target.value)}>{GRUPOS_GASTO.map(g=><option key={g}>{g}</option>)}</select></div>
      <div className="fg"><label>IVA</label><select value={iva} onChange={e=>setIva(e.target.value)}><option value="0.21">21%</option><option value="0.10">10%</option><option value="0">Sin IVA</option></select></div>
      <div className="fg"><label>Retención IRPF</label><select value={irpf} onChange={e=>setIrpf(e.target.value)}><option value="0">Sin retención</option><option value="0.15">15%</option><option value="0.19">19%</option><option value="0.07">7%</option></select></div>
      <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:16}}>
        <button className="btn" onClick={onClose}>Cancelar</button>
        <button className="btn btn-primary" onClick={ok}><i className="ti ti-plus"></i>Añadir</button>
      </div>
    </div>
  </div>);
}

// ── APP ──────────────────────────────────────────────────────────
function App(){
  const sv=load();
  const [clientes,setClientes]=useState(()=>sv?.clientes||JSON.parse(JSON.stringify(CLIENTES0)));
  const [factReal,setFactReal]=useState(()=>sv?.factReal||Object.fromEntries(CLIENTES0.map(c=>[c.id,Array(12).fill(0)])));
  const [factFcst,setFactFcst]=useState(()=>sv?.factFcst||Object.fromEntries(CLIENTES0.map(c=>[c.id,Array(12).fill(0)])));
  const [gastosReal,setGastosReal]=useState(()=>sv?.gastosReal||JSON.parse(JSON.stringify(GASTOS0)));
  const [gastosFcst,setGastosFcst]=useState(()=>sv?.gastosFcst||JSON.parse(JSON.stringify(GASTOS0)));
  const [facturas,setFacturas]=useState(()=>sv?.facturas||[]);
  const [movs,setMovs]=useState(()=>sv?.movs||[]);
  const [saldo0,setSaldo0]=useState(()=>sv?.saldo0??45000);
  const CAJASEG0=[
    {id:'pag_iva',  concepto:'IVA (mod. 303)',                tipo:'pago',  subtipo:'impuestos',   imp:Array(12).fill(0)},
    {id:'pag_irpf', concepto:'IRPF (mod. 111)',               tipo:'pago',  subtipo:'impuestos',   imp:Array(12).fill(0)},
    {id:'pag_is',   concepto:'IS (mod. 202)',                 tipo:'pago',  subtipo:'impuestos',   imp:Array(12).fill(0)},
    {id:'fin_ent1', concepto:'Entrada financiacion',          tipo:'cobro', subtipo:'financiacion',imp:Array(12).fill(0)},
    {id:'fin_sal1', concepto:'Devolucion amortizacion',       tipo:'pago',  subtipo:'financiacion',imp:Array(12).fill(0)},
  ];
  const [cajaSeg,setCajaSeg]=useState(()=>sv?.cajaSeg||JSON.parse(JSON.stringify(CAJASEG0)));
  const setCajaSegRow=(id,m,v)=>{const n=cajaSeg.map(r=>r.id!==id?{...r}:{...r,imp:r.imp.map((x,i)=>i===m?(pn(v)):x)});setCajaSeg(n);save({cajaSeg:n});};
  const addCajaSegRow=(tipo,subtipo)=>{const id='cs'+Date.now();const n=[...cajaSeg,{id,concepto:tipo==='cobro'?'Nueva entrada':'Nueva salida',tipo,subtipo,imp:Array(12).fill(0)}];setCajaSeg(n);save({cajaSeg:n});};
  const delCajaSegRow=(id)=>{if(!confirm('Eliminar?'))return;const n=cajaSeg.filter(r=>r.id!==id);setCajaSeg(n);save({cajaSeg:n});};
  // cajaPagosReal: importes de caja por partida de gasto en seguimiento {gastoId: [12 meses]}
  const [cajaPagosReal,setCajaPagosReal]=useState(()=>{
    const saved=sv?.cajaPagosReal||{};
    const init={};
    (sv?.gastosReal||JSON.parse(JSON.stringify(GASTOS0))).forEach(g=>{
      init[g.id]=saved[g.id]||Array(12).fill(0);
    });
    return init;
  });
  const [cierreFact,setCierreFact]=useState(()=>sv?.cierreFact??-1);
  const [cierreExtracto,setCierreExtracto]=useState(()=>sv?.cierreExtracto??-1);
  // Reglas aprendidas: {conceptoClave: etiqueta} — se aprende cuando el usuario etiqueta un movimiento
  const [reglas,setReglas]=useState(()=>sv?.reglas||{});
  const [cierreGastos,setCierreGastos]=useState(()=>sv?.cierreGastos??-1);
  const [sub,setSub]=useState('facturacion');
  const [modal,setModal]=useState(null);

  // Ref siempre actualizado — evita el problema de closures stale en handlers
  const stateRef=React.useRef({});
  stateRef.current={clientes,factReal,factFcst,gastosReal,gastosFcst,facturas,movs,saldo0,cierreFact,cierreGastos,cierreExtracto,cajaPagosReal,cajaSeg,reglas};

  // save() siempre usa el estado más reciente via stateRef + el parche
  const save=(patch={})=>{
    persist({...stateRef.current,...patch});
  };

  // Clientes
  const addCliente=c=>{const nc=[...clientes,c];const nr={...factReal,[c.id]:Array(12).fill(0)};const nf={...factFcst,[c.id]:Array(12).fill(0)};setClientes(nc);setFactReal(nr);setFactFcst(nf);save({clientes:nc,factReal:nr,factFcst:nf});};
  const delCliente=id=>{if(!confirm('¿Eliminar?'))return;const nc=clientes.filter(c=>c.id!==id);const nr={...factReal};const nf={...factFcst};delete nr[id];delete nf[id];setClientes(nc);setFactReal(nr);setFactFcst(nf);save({clientes:nc,factReal:nr,factFcst:nf});};
  const setIVACliente=(cid,v)=>{const iva=Math.min(100,Math.max(0,parseFloat(v)||0))/100;const nc=clientes.map(c=>c.id===cid?{...c,iva}:c);setClientes(nc);save({clientes:nc});};
  const setPlazoCobro=(cid,v)=>{const plazo=Math.max(0,parseInt(v)||60);const nc=clientes.map(c=>c.id===cid?{...c,plazo}:c);setClientes(nc);save({clientes:nc});};
  const setSaldoApp=v=>{const n=pn(v);setSaldo0(n);save({saldo0:n});};
  const setCajaPagoReal=(gid,m,v)=>{
    const val=pn(v);
    const ncp={...cajaPagosReal,[gid]:(cajaPagosReal[gid]||Array(12).fill(0)).map((x,i)=>i===m?val:x)};
    setCajaPagosReal(ncp);save({cajaPagosReal:ncp});
  };

  // Gastos
  const addGasto=g=>{
    const nr=[...gastosReal,g];const nf=[...gastosFcst,{...g}];
    const ncp={...cajaPagosReal,[g.id]:Array(12).fill(0)};
    setGastosReal(nr);setGastosFcst(nf);setCajaPagosReal(ncp);
    save({gastosReal:nr,gastosFcst:nf,cajaPagosReal:ncp});
  };
  const delGasto=id=>{
    if(!confirm('¿Eliminar?'))return;
    const nr=gastosReal.filter(g=>g.id!==id);const nf=gastosFcst.filter(g=>g.id!==id);
    const ncp={...cajaPagosReal};delete ncp[id];
    setGastosReal(nr);setGastosFcst(nf);setCajaPagosReal(ncp);
    save({gastosReal:nr,gastosFcst:nf,cajaPagosReal:ncp});
  };
  const setGMeta=(gid,field,v)=>{const val=Math.min(100,Math.max(0,parseFloat(v)||0))/100;const nr=gastosReal.map(g=>g.id!==gid?g:{...g,[field]:val});const nf=gastosFcst.map(g=>g.id!==gid?g:{...g,[field]:val});setGastosReal(nr);setGastosFcst(nf);save({gastosReal:nr,gastosFcst:nf});};
  const setGR=(gid,m,v)=>{let val=pn(v);if(val>0)val=-val;const n=gastosReal.map(g=>g.id!==gid?g:{...g,imp:g.imp.map((x,i)=>i===m?val:x)});setGastosReal(n);save({gastosReal:n});};
  const setGF=(gid,m,v)=>{let val=pn(v);if(val>0)val=-val;const n=gastosFcst.map(g=>g.id!==gid?g:{...g,imp:g.imp.map((x,i)=>i===m?val:x)});setGastosFcst(n);save({gastosFcst:n});};

  // Cálculos — usan cierreFact/cierreGastos en lugar de MES_ACTUAL fijo
  const ingRealM=m=>clientes.reduce((s,c)=>(factReal[c.id]?.[m]||0)+s,0);
  const ingFcstM=m=>clientes.reduce((s,c)=>(factFcst[c.id]?.[m]||0)+s,0);
  // Cobros forecast por mes destino: suma base*IVA de cada cliente desplazado por su plazo
  const cobrosFcstM=m=>clientes.reduce((s,c)=>{
    const plazoMeses=Math.round((c.plazo||60)/30);
    const mOrigen=m-plazoMeses; // mes de facturación que genera este cobro
    // Solo usar forecast si el mes ORIGEN también está sin cerrar
    if(mOrigen<0||mOrigen>11||mOrigen<=cierreFact)return s;
    const base=factFcst[c.id]?.[mOrigen]||0;
    return s+base*(1+(c.iva||0));
  },0);
  const ingM=m=>m<=cierreFact?ingRealM(m):ingFcstM(m);
  const ingIVARealM=m=>clientes.reduce((s,c)=>{const b=factReal[c.id]?.[m]||0;return s+b*(1+(c.iva||0));},0);
  const gCombM=m=>(m<=cierreGastos?gastosReal:gastosFcst).reduce((s,g)=>s+(g.imp[m]||0),0);

  // Cobros desde facturas
  const cobrosRealesM=m=>facturas.filter(f=>f.estado==='Cobrada'&&f.fechaCobro&&new Date(f.fechaCobro).getMonth()===m&&new Date(f.fechaCobro).getFullYear()===2026).reduce((s,f)=>s+(parseFloat(f.importe)||0),0);
  const cobrosPendM=m=>facturas.filter(f=>f.mesCobro===m&&!['Cobrada','Cancelada','Incobrable'].includes(f.estado)).reduce((s,f)=>s+(parseFloat(f.importe)||0),0);

  // Pagos del extracto
  const ETIQ_EXCLUIR=['Traspaso entre cuentas','Cobro de cliente'];
  // Pagos del extracto: salidas que NO son traspasos ni cobros de cliente
  const pagosExtM=m=>movs.filter(mv=>mv.mes===m&&mv.importe<0&&!ETIQ_EXCLUIR.includes(mv.etiqueta)).reduce((s,mv)=>s+mv.importe,0);
  // Cobros del extracto: entradas etiquetadas como "Cobro de cliente"
  const cobrosExtM=m=>movs.filter(mv=>mv.mes===m&&mv.importe>0&&mv.etiqueta==='Cobro de cliente').reduce((s,mv)=>s+mv.importe,0);
  const flujoCajaM=m=>cobrosRealesM(m)+pagosExtM(m);

  const totRealYTD=cierreFact>=0?MESES.slice(0,cierreFact+1).reduce((_,__,m)=>_+ingRealM(m),0):0;
  const totPend=facturas.filter(f=>!['Cobrada','Cancelada','Incobrable'].includes(f.estado)).reduce((s,f)=>s+(parseFloat(f.importe)||0),0);
  const totVenc=facturas.filter(f=>f.estado==='Pendiente').reduce((s,f)=>s+(parseFloat(f.importe)||0),0);
  const totPagosYTD=cierreGastos>=0?MESES.slice(0,cierreGastos+1).reduce((_,__,m)=>_+pagosExtM(m),0):0;

  return(
    <div className="app">
      {modal==='cliente'&&<ModalCliente onAdd={addCliente} onClose={()=>setModal(null)}/>}
      {modal?.tipo==='gasto'&&<ModalGasto grupoDefault={modal.grupo} onAdd={addGasto} onClose={()=>setModal(null)}/>}

      <div className="header">
        <div>
          <h1><i className="ti ti-building-skyscraper" style={{marginRight:7}}></i>BMG Law Services · Seguimiento Real 2026</h1>
          <div className="header-sub">Fact. cerrada hasta: {cierreFact>=0?MESES[cierreFact]:'Sin cerrar'} · Gastos cerrados hasta: {cierreGastos>=0?MESES[cierreGastos]:'Sin cerrar'}</div>
        </div>
        <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:10,color:'#a0b4d0',whiteSpace:'nowrap'}}>Facturación cerrada hasta:</span>
            <select value={cierreFact} onChange={e=>{
              const v=parseInt(e.target.value);
              // Copiar factFcst → factReal para todos los meses que se cierran
              let nr={...factReal};
              clientes.forEach(c=>{
                const arr=(nr[c.id]||Array(12).fill(0)).slice();
                for(let m=0;m<=v;m++){
                  if(!arr[m]&&factFcst[c.id]?.[m]) arr[m]=factFcst[c.id][m];
                }
                nr[c.id]=arr;
              });
              setFactReal(nr);
              setCierreFact(v);
              save({cierreFact:v,factReal:nr});
            }}
              style={{fontSize:11,padding:'3px 7px',borderRadius:4,border:'1px solid rgba(255,255,255,.2)',background:'rgba(255,255,255,.1)',color:'#fff',fontFamily:'Arial,sans-serif',cursor:'pointer'}}>
              <option value={-1}>Sin cerrar</option>
              {MESES.map((m,i)=><option key={i} value={i}>{m}</option>)}
            </select>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:10,color:'#a0b4d0',whiteSpace:'nowrap'}}>Extracto cerrado hasta:</span>
            <select value={cierreExtracto} onChange={e=>{const v=parseInt(e.target.value);setCierreExtracto(v);save({cierreExtracto:v});}}
              style={{fontSize:11,padding:'3px 7px',borderRadius:4,border:'1px solid rgba(255,255,255,.2)',background:'rgba(255,255,255,.1)',color:'#fff',fontFamily:'Arial,sans-serif',cursor:'pointer'}}>
              <option value={-1}>Sin cerrar</option>
              {MESES.map((m,i)=><option key={i} value={i}>{m}</option>)}
            </select>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:10,color:'#a0b4d0',whiteSpace:'nowrap'}}>Gastos cerrados hasta:</span>
            <select value={cierreGastos} onChange={e=>{
              const v=parseInt(e.target.value);
              // Copiar gastosFcst → gastosReal para todos los meses que se cierran
              const nr=gastosReal.map(g=>{
                const gf=gastosFcst.find(x=>x.id===g.id);
                const arr=g.imp.slice();
                for(let m=0;m<=v;m++){
                  if(!arr[m]&&gf?.imp[m]) arr[m]=gf.imp[m];
                }
                return{...g,imp:arr};
              });
              setGastosReal(nr);
              setCierreGastos(v);
              save({cierreGastos:v,gastosReal:nr});
            }}
              style={{fontSize:11,padding:'3px 7px',borderRadius:4,border:'1px solid rgba(255,255,255,.2)',background:'rgba(255,255,255,.1)',color:'#fff',fontFamily:'Arial,sans-serif',cursor:'pointer'}}>
              <option value={-1}>Sin cerrar</option>
              {MESES.map((m,i)=><option key={i} value={i}>{m}</option>)}
            </select>
          </div>
          <span style={{fontSize:10,color:'#90c4a0'}}><i className="ti ti-device-floppy" style={{marginRight:4}}></i>Guardado</span>
        </div>
      </div>

      <div className="main-nav">
        <button onClick={()=>window.location.href='presupuesto_bmg.html'} style={{color:'#555'}}><i className="ti ti-target"></i>Presupuesto</button>
        <button className="active"><i className="ti ti-chart-arrows-vertical"></i>Seguimiento</button>
        <button onClick={()=>window.location.href='dashboard_bmg.html'} style={{color:'#555'}}><i className="ti ti-dashboard"></i>Dashboard</button>
      </div>

      <div className="metrics">
        <div className="metric"><div className="metric-label">Facturación real YTD</div><div className="metric-val green">{fmt(totRealYTD)}</div></div>
        <div className="metric"><div className="metric-label">Cobros reales YTD</div><div className="metric-val green">{fmt(cierreFact>=0?MESES.slice(0,cierreFact+1).reduce((_,__,m)=>_+cobrosRealesM(m),0):0)}</div></div>
        <div className="metric"><div className="metric-label">Facturas pendientes</div><div className="metric-val orange">{fmt(totPend)}</div></div>
        <div className="metric"><div className="metric-label">Vencidas urgente</div><div className="metric-val red">{fmt(totVenc)}</div></div>
        <div className="metric"><div className="metric-label">Pagos reales YTD</div><div className="metric-val red">{fmt(totPagosYTD)}</div></div>
      </div>

      <div className="sub-nav">
        <button className={sub==='facturacion'?'active':''} onClick={()=>setSub('facturacion')}><i className="ti ti-chart-bar"></i>Facturación real</button>
        <button className={sub==='gastos'?'active':''} onClick={()=>setSub('gastos')}><i className="ti ti-receipt"></i>Gastos real</button>
        <button className={sub==='facturas'?'active':''} onClick={()=>setSub('facturas')}><i className="ti ti-file-invoice"></i>Clientes pendientes cobro</button>
        <button className={sub==='pyg'?'active':''} onClick={()=>setSub('pyg')}><i className="ti ti-report-money"></i>PyG real</button>
        <button className={sub==='caja'?'active':''} onClick={()=>setSub('caja')}><i className="ti ti-building-bank"></i>Caja real</button>
        <button className={sub==='extracto'?'active':''} onClick={()=>setSub('extracto')}><i className="ti ti-credit-card"></i>Extracto bancario</button>
      </div>

      {sub==='facturacion'&&<TabFact clientes={clientes} factReal={factReal} factFcst={factFcst} ingRealM={ingRealM} ingFcstM={ingFcstM} ingM={ingM} ingIVARealM={ingIVARealM} setFactReal={setFactReal} setFactFcst={setFactFcst} setIVACliente={setIVACliente} setPlazoCobro={setPlazoCobro} delCliente={delCliente} setModal={setModal} save={save} cierreFact={cierreFact}/> }
      {sub==='gastos'&&<TabGastos gastosReal={gastosReal} gastosFcst={gastosFcst} gCombM={gCombM} setGR={setGR} setGF={setGF} setGMeta={setGMeta} delGasto={delGasto} setModal={setModal} cierreGastos={cierreGastos}/> }
      {sub==='facturas'&&<TabFacturas facturas={facturas} setFacturas={setFacturas} cobrosRealesM={cobrosRealesM} cobrosPendM={cobrosPendM} save={save} cierreFact={cierreFact}/>}
      {sub==='pyg'&&<TabPyG ingM={ingM} gCombM={gCombM} gastosReal={gastosReal} gastosFcst={gastosFcst} cierreFact={cierreFact} cierreGastos={cierreGastos}/>}
      {sub==='caja'&&<TabCaja facturas={facturas} cobrosRealesM={cobrosRealesM} cobrosPendM={cobrosPendM} pagosExtM={pagosExtM} cobrosExtM={cobrosExtM} cobrosFcstM={cobrosFcstM} flujoCajaM={flujoCajaM} cierreFact={cierreFact} cierreGastos={cierreGastos} cierreExtracto={cierreExtracto} saldo0={saldo0} setSaldo0={setSaldoApp} gastosReal={gastosReal} gastosFcst={gastosFcst} cajaPagosReal={cajaPagosReal} setCajaPagoReal={setCajaPagoReal} ingFcstM={ingFcstM} ingIVARealM={ingIVARealM} movs={movs} cajaSeg={cajaSeg} setCajaSeg={setCajaSeg} setCajaSegRow={setCajaSegRow} addCajaSegRow={addCajaSegRow} delCajaSegRow={delCajaSegRow} save={save}/>}
      {sub==='extracto'&&<TabExtracto movs={movs} setMovs={setMovs} save={save} gastosReal={gastosReal} gastosFcst={gastosFcst} reglas={reglas} setReglas={setReglas} cajaSeg={cajaSeg}/>}
    </div>
  );
}

// ── FACTURACIÓN REAL ─────────────────────────────────────────────
function FactRow({c,factReal,factFcst,setFactReal,setFactFcst,setIVACliente,setPlazoCobro,delCliente,save,cierreFact}){
  const totReal=cierreFact>=0?MESES.slice(0,cierreFact+1).reduce((_,__,m)=>_+(factReal[c.id]?.[m]||0),0):0;
  const totCierre=totReal+MESES.slice(cierreFact+1).reduce((_,__,i)=>_+(factFcst[c.id]?.[cierreFact+1+i]||0),0);
  const setR=(m,v)=>{const val=pn(v);const n={...factReal,[c.id]:(factReal[c.id]||Array(12).fill(0)).map((x,i)=>i===m?val:x)};setFactReal(n);save({factReal:n});};
  const setF=(m,v)=>{const val=pn(v);const n={...factFcst,[c.id]:(factFcst[c.id]||Array(12).fill(0)).map((x,i)=>i===m?val:x)};setFactFcst(n);save({factFcst:n});};
  return(
    <tr>
      <td className="sticky" style={{fontWeight:500}}>{c.nombre}</td>
      <td style={{textAlign:'center',padding:'3px 5px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:2}}>
          <input type="number" defaultValue={+(c.iva*100).toFixed(1)} onBlur={e=>setIVACliente(c.id,e.target.value)} min={0} max={100} step={0.1}
            style={{width:42,textAlign:'center',border:'1px solid #dde0e6',borderRadius:4,padding:'2px 3px',fontSize:11,fontFamily:'monospace',background:'#f8f9ff'}}/>
          <span style={{fontSize:10,color:'#888'}}>%</span>
        </div>
      </td>
      <td style={{textAlign:'center',padding:'3px 5px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:2}}>
          <input type="number" defaultValue={c.plazo||60} onBlur={e=>setPlazoCobro(c.id,e.target.value)} min={0} max={365} step={30}
            style={{width:42,textAlign:'center',border:'1px solid #dde0e6',borderRadius:4,padding:'2px 3px',fontSize:11,fontFamily:'monospace',background:'#f0fff4'}}/>
          <span style={{fontSize:10,color:'#888'}}>d</span>
        </div>
      </td>
      {MESES.map((_,m)=>{
        const esReal=m<=cierreFact;
        const def=esReal?(factReal[c.id]?.[m]||0):(factFcst[c.id]?.[m]||0);
        return(<td key={m} style={{padding:'3px 4px',borderLeft:'1px solid #f0f0f0',background:esReal?'#f4fbf6':'#f4f7fd'}}>
          <input type="number" className="cell-edit" key={`${m}-${esReal?1:0}`} defaultValue={def} disabled={esReal}
            onChange={e=>{if(!esReal)setF(m,e.target.value);}}
            min={0}
            style={{color:esReal?'#1a7a45':'#1a2b4a',borderBottomColor:esReal?'transparent':'#90b0d8',cursor:'text',fontWeight:esReal?600:400}}/>
        </td>);
      })}
      <td className="num" style={{fontWeight:600,borderLeft:'2px solid #c0d0e0',background:'#f0f4f8',color:'#1a7a45'}}>{fmt(totReal)}</td>
      <td className="num" style={{fontWeight:600,borderLeft:'2px solid #1a2b4a',background:'#e8f0fb',color:'#1a2b4a'}}>{fmt(totCierre)}</td>
      <td style={{padding:'2px 4px'}}><button className="btn btn-sm btn-danger" onClick={()=>delCliente(c.id)}><i className="ti ti-trash"></i></button></td>
    </tr>
  );
}

function TabFact({clientes,factReal,factFcst,ingRealM,ingFcstM,ingM,ingIVARealM,setFactReal,setFactFcst,setIVACliente,setPlazoCobro,delCliente,setModal,save,cierreFact}){
  const totRealYTD=cierreFact>=0?MESES.slice(0,cierreFact+1).reduce((_,__,m)=>_+ingRealM(m),0):0;
  const totFcst=MESES.slice(cierreFact+1).reduce((_,__,i)=>_+ingFcstM(cierreFact+1+i),0);
  return(
    <div>
      <div style={{display:'flex',gap:16,alignItems:'center',padding:'8px 0',marginBottom:10,fontSize:11,flexWrap:'wrap'}}>
        <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:14,height:14,background:'#e4f4ec',border:'1px solid #a0d4b0',borderRadius:2,display:'inline-block'}}></span><strong style={{color:'#1a7a45'}}>Real cerrado</strong> — bloqueado</span>
        <span style={{display:'flex',alignItems:'center',gap:5}}><span style={{width:14,height:14,background:'#e8f0fb',border:'1px solid #90b0d8',borderRadius:2,display:'inline-block'}}></span><strong style={{color:'#1a2b4a'}}>Forecast</strong> — editable</span>
      </div>
      <div className="metrics">
        <div className="metric"><div className="metric-label">Real YTD</div><div className="metric-val green">{fmt(totRealYTD)}</div></div>
        <div className="metric"><div className="metric-label">Forecast resto año</div><div className="metric-val blue">{fmt(totFcst)}</div></div>
        <div className="metric"><div className="metric-label">Proyección cierre</div><div className="metric-val blue">{fmt(totRealYTD+totFcst)}</div></div>
        <div className="metric"><div className="metric-label">Cobros caja YTD (+IVA)</div><div className="metric-val green">{fmt(cierreFact>=0?MESES.slice(0,cierreFact+1).reduce((_,__,m)=>_+ingIVARealM(m),0):0)}</div></div>
      </div>
      <div className="card">
        <div className="card-header">
          {cierreFact>=0?<h2>Facturación real + forecast · 2026 <span style={{fontSize:10,fontWeight:400,color:'#888',textTransform:'none'}}>Cerrada hasta {MESES[cierreFact]}</span></h2>:<h2>Facturación forecast · 2026 <span style={{fontSize:10,fontWeight:400,color:'#b06000',textTransform:'none'}}>Sin meses cerrados</span></h2>}
          <button className="btn btn-primary btn-sm" onClick={()=>setModal('cliente')}><i className="ti ti-plus"></i>Nuevo cliente</button>
        </div>
        <div className="overflow-x">
        <table style={{minWidth:1150}}>
          <thead><tr>
            <th className="sticky" style={{minWidth:190}}>Cliente</th>
            <th style={{minWidth:66,textAlign:'center',fontSize:9}}>IVA %</th>
            <th style={{minWidth:58,textAlign:'center',fontSize:9}}>Plazo</th>
            {MESES.map((m,i)=><th key={i} className="mh" style={{minWidth:68,background:i<=cierreFact?'#e4f4ec':'#e8f0fb',color:i<=cierreFact?'#1a7a45':'#1a2b4a',borderTop:i<=cierreFact?'2px solid #a0d4b0':'2px solid #90b0d8'}}>
              {m}<div style={{fontSize:8,fontWeight:400,marginTop:1}}>{i<=cierreFact?'real':'fcst'}</div>
            </th>)}
            <th className="mh" style={{minWidth:80,background:'#f0f4f8',color:'#1a2b4a',borderLeft:'2px solid #1a2b4a',fontSize:9}}>Real YTD</th>
            <th className="mh mh-total" style={{minWidth:82}}>Cierre año</th>
            <th style={{width:32}}></th>
          </tr></thead>
          <tbody>
          {clientes.map(c=><FactRow key={c.id} c={c} factReal={factReal} factFcst={factFcst} setFactReal={setFactReal} setFactFcst={setFactFcst} setIVACliente={setIVACliente} setPlazoCobro={setPlazoCobro} delCliente={delCliente} save={save} cierreFact={cierreFact}/>)}
          <tr><td colSpan={MESES.length+4} style={{padding:'6px 8px'}}><button className="btn-add" onClick={()=>setModal('cliente')}><i className="ti ti-plus"></i>Añadir cliente / línea de facturación</button></td></tr>
          <tr style={{background:'#e4f4ec',borderTop:'2px solid #a0d4b0'}}>
            <td className="sticky" colSpan={3} style={{fontWeight:700,color:'#1a7a45',fontSize:11}}>TOTAL REAL YTD</td>
            {MESES.map((_,m)=><td key={m} className="num" style={{color:'#1a7a45',fontWeight:700,background:m<=cierreFact?'#dcf0e4':'#f4f6f9'}}>{m<=cierreFact?fmt(ingRealM(m)):'—'}</td>)}
            <td className="num" style={{fontWeight:700,borderLeft:'2px solid #c0d0e0',background:'#d0ecd8',color:'#1a7a45'}}>{fmt(totRealYTD)}</td>
            <td className="num" style={{background:'#d0ecd8'}}>—</td><td></td>
          </tr>
          <tr style={{background:'#e8f0fb',borderTop:'2px solid #90b0d8'}}>
            <td className="sticky" colSpan={3} style={{fontWeight:700,color:'#1a2b4a',fontSize:11}}>FORECAST ({cierreFact>=0&&cierreFact<11?MESES[cierreFact+1]:'Jul'}–Dic)</td>
            {MESES.map((_,m)=><td key={m} className="num" style={{color:'#1a2b4a',fontWeight:700,background:m>cierreFact?'#dce8f8':'#f4f6f9'}}>{m>cierreFact?fmt(ingFcstM(m)):'—'}</td>)}
            <td className="num" style={{borderLeft:'2px solid #c0d0e0',background:'#dce8f8',color:'#888'}}>—</td>
            <td className="num" style={{fontWeight:700,borderLeft:'2px solid #1a2b4a',background:'#dce8f8',color:'#1a2b4a'}}>{fmt(totFcst)}</td><td></td>
          </tr>
          <tr className="result-row">
            <td className="sticky" colSpan={3}>PROYECCIÓN CIERRE AÑO</td>
            {MESES.map((_,m)=><td key={m} className="num" style={{fontWeight:700}}>{fmt(ingM(m))}</td>)}
            <td className="num" style={{borderLeft:'2px solid rgba(255,255,255,.2)',fontSize:10,color:'rgba(255,255,255,.6)'}}>YTD: {cierreFact>=0?fmt(totRealYTD):'—'}</td>
            <td className="num" style={{fontWeight:700,fontSize:13}}>{fmt(totRealYTD+totFcst)}</td><td></td>
          </tr>
          </tbody>
        </table>
        </div>
      </div>
    </div>
  );
}

// ── GASTOS REAL ──────────────────────────────────────────────────
function GastoRow({g,gastosReal,gastosFcst,setGR,setGF,setGMeta,delGasto,cierreGastos}){
  const tot=MESES.reduce((_,__,m)=>_+(m<=cierreGastos?gastosReal:gastosFcst).find(x=>x.id===g.id)?.imp[m]||0,0);
  const val=m=>Math.abs((m<=cierreGastos?gastosReal:gastosFcst).find(x=>x.id===g.id)?.imp[m]||0);
  return(
    <tr>
      <td className="sticky" style={{fontWeight:500}}>{g.concepto}</td>
      <td style={{textAlign:'center',padding:'3px 5px',minWidth:58}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:2}}>
          <input type="number" defaultValue={+(g.iva*100).toFixed(0)} onBlur={e=>setGMeta(g.id,'iva',e.target.value)} min={0} max={100} step={1}

        </td>);

      <td style={{padding:'2px 4px'}}><button className="btn btn-sm btn-danger" onClick={()=>delGasto(g.id)}><i className="ti ti-trash"></i></button></td>

}

// ── CLIENTES PENDIENTES DE COBRO ─────────────────────────────────
function TabFacturas({facturas,setFacturas,cobrosRealesM,cobrosPendM,save,cierreFact}){
  const blank={id:'',cliente:'',clienteNm:'',fecha:'',importe:'',diasRetraso:0,mesCobro:Math.min(6,11),estado:'Pendiente',fechaCobro:'',respuestaCliente:''};
  const [form,setForm]=useState(blank);
  const [editId,setEditId]=useState(null);
  const [filtroMes,setFiltroMes]=useState('todos');
  const [filtroEstado,setFiltroEstado]=useState('todos');
  const [importLog,setImportLog]=useState(null);

  const upd=f=>{setFacturas([...f]);save({facturas:[...f]});};
  const guardar=()=>{
    if(!form.id||!form.cliente||!form.importe){alert('Nº Factura, Cliente e Importe son obligatorios.');return;}
    const f={...form,importe:parseFloat(form.importe)||0,mesCobro:parseInt(form.mesCobro)};
    if(editId){upd(facturas.map(x=>x.id===editId?f:x));setEditId(null);}
    else upd([...facturas,f]);
    setForm(blank);
  };
  const cambiarEstado=(id,estado)=>{
    const fc=estado==='Cobrada'?prompt('Fecha de cobro (YYYY-MM-DD):',new Date().toISOString().split('T')[0]):'';
    upd(facturas.map(f=>f.id!==id?f:{...f,estado,fechaCobro:estado==='Cobrada'?(fc||new Date().toISOString().split('T')[0]):f.fechaCobro}));
  };

  const importarXLSX=e=>{
    const file=e.target.files[0];if(!file)return;
    if(!window.XLSX){alert('Librería no cargada.');return;}
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const wb=window.XLSX.read(ev.target.result,{type:'array',cellDates:false,cellText:false,raw:false});
        let pendRows=[],nvRows=[];
        wb.SheetNames.forEach(n=>{
          const u=n.toUpperCase();
          if(u.includes('PENDIENTE')){
            pendRows=window.XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,defval:'',raw:false});
          } else if(u.includes('NO VENCIDA')||u.includes('EMITIDA')){
            nvRows=window.XLSX.utils.sheet_to_json(wb.Sheets[n],{header:1,defval:'',raw:false});
          }
        });

        // Encontrar fila de cabecera (primera fila con datos no vacíos)
        const findHeader=(rows)=>{
          for(let i=0;i<rows.length;i++){
            const noVacias=rows[i].filter(c=>c!==''&&c!==null&&c!==undefined);
            if(noVacias.length>=3)return i;
          }
          return 0;
        };

        // Parsear importe — maneja tanto "54,45" como "54.45" como "1.089,00"
        const parseImporte=(v)=>{
          if(v===''||v===null||v===undefined)return 0;
          if(typeof v==='number')return v;
          let s=String(v).trim().replace(/[€$\s]/g,'');
          // Formato europeo: 1.089,45 → 1089.45
          if(s.indexOf(',')>=0&&s.indexOf('.')>0&&s.lastIndexOf('.')<s.length-4){
            s=s.replace(/\./g,'').replace(',','.');
          } else {
            // Formato anglosajón o mixto: quitar puntos de miles si hay coma decimal
            s=s.replace(',','.');
          }
          return parseFloat(s)||0;
        };

        // Convertir fecha — maneja tanto serial como string
        const toISO=v=>{
          if(!v||v==='')return'';
          const num=typeof v==='number'?v:parseFloat(String(v).trim());
          if(!isNaN(num)&&num>40000&&num<60000){
            const d=new Date(Date.UTC(1899,11,30)+Math.round(num)*86400000);
            return d.toISOString().split('T')[0];
          }
          const s=String(v).trim().split(' ')[0].split('T')[0];
          if(s.length===10&&s[4]==='-'&&s[7]==='-')return s;
          const sep=s.indexOf('/')>=0?'/':s.indexOf('-')>=0?'-':'.';
          const p=s.split(sep);
          if(p.length===3){
            if(p[0].length===4)return p[0]+'-'+p[1].padStart(2,'0')+'-'+p[2].padStart(2,'0');
            const y=p[2].length===2?'20'+p[2]:p[2];
            return y+'-'+p[1].padStart(2,'0')+'-'+p[0].padStart(2,'0');
          }
          return'';
        };

        // Normalizar estado
        const normEstado=s=>{
          const u=String(s||'').trim().toUpperCase();
          if(!u)return'Pendiente';
          if(u.includes('PDT RESOL')||u.includes('RESOLUC'))return'PDT Resolución Jud.';
          if(u.includes('CONTROLAD'))return'Controlado';
          if(u.includes('SIN RESP'))return'Sin Respuesta';
          if(u.includes('NUEVO VENC'))return'Nuevo Vencimiento';
          if(u.includes('COBRAD'))return'Cobrada';
          if(u.includes('INCOBR'))return'Incobrable';
          if(u.includes('CANCEL'))return'Cancelada';
          if(u.includes('DISPUT'))return'En disputa';
          if(u.includes('NO VENCID'))return'No vencida';
          return s.trim();
        };

        // Mes de cobro estimado por días de retraso
        const mesCobro=(fechaISO)=>{
          if(!fechaISO)return 6;
          const num=typeof fechaISO==='number'?fechaISO:parseFloat(String(fechaISO).trim());
          let fecha;
          if(!isNaN(num)&&num>40000&&num<60000){
            fecha=new Date(Date.UTC(1899,11,30)+Math.round(num)*86400000);
          } else {
            fecha=new Date(fechaISO);
          }
          if(isNaN(fecha.getTime()))return 6;
          const cobro=new Date(fecha.getTime()+61*24*60*60*1000);
          const now=new Date();
          if(cobro<now)return Math.min(now.getMonth()+1,11);
          return cobro.getMonth();
        };

        const parseHoja=(rows,defEstado)=>{
          if(!rows||rows.length<2)return[];
          const hRow=findHeader(rows);
          const hdrs=rows[hRow].map(h=>String(h||'').trim().toUpperCase());
          const ci={};
          [
            ['exp',        ['EXP.','EXP']],
            ['cliente',    ['CLIENTE']],
            ['clienteNm',  ['CLIENTE NM','NOMBRE CLIENTE','DEUDOR']],
            ['factura',    ['FACTURA','Nº FACTURA']],
            ['fecha',      ['FECHA FACTURA','FECHA FRA','FECHA']],
            ['importe',    ['IMPORTE FACTURA','IMPORTE','TOTAL']],
            ['dias',       ['DÍAS RETRASO','DIAS RETRASO','DIAS']],
            ['respCliente',['RESPUESTA CLIENTE','OBSERVACIONES']],
            ['estado',     ['ESTADO']],
          ].forEach(([k,als])=>{
            // Para cada alias buscar en headers, pero CLIENTE NM debe ir antes que CLIENTE
            const idx=hdrs.findIndex(h=>als.some(a=>h===a||h.startsWith(a)));
            if(idx>=0&&ci[k]===undefined)ci[k]=idx;
          });

          // CLIENTE NM puede estar en col 2 (índice 2) aunque se detecte después
          // Forzar: si CLIENTE está en col 1, CLIENTE NM suele estar en col 2
          if(ci.cliente===1&&ci.clienteNm===undefined)ci.clienteNm=2;

          if(ci.factura===undefined)return[];

          return rows.slice(hRow+1).map(row=>{
            const g=i=>i!==undefined?String(row[i]??'').trim():'';
            const factura=g(ci.factura);
            if(!factura||factura===''||factura==='undefined')return null;
            if(factura.toUpperCase().startsWith('NM'))return null;
            const importeRaw=parseImporte(ci.importe!==undefined?row[ci.importe]:'');
            if(!importeRaw)return null;
            const fechaISO=toISO(ci.fecha!==undefined?row[ci.fecha]:'');
            const dias=parseInt(g(ci.dias))||0;
            const estado=defEstado==='No vencida'?'No vencida':normEstado(g(ci.estado));
            return{
              id:factura,
              exp:g(ci.exp),
              cliente:g(ci.cliente),
              clienteNm:g(ci.clienteNm),
              fecha:fechaISO,
              importe:importeRaw,
              diasRetraso:dias,
              mesCobro:mesCobro(ci.fecha!==undefined?row[ci.fecha]:fechaISO),
              respuestaCliente:g(ci.respCliente),
              estado,
              fechaCobro:'',
            };
          }).filter(Boolean);
        };

        const delPend=parseHoja(pendRows,'Pendiente');
        const delNV=parseHoja(nvRows,'No vencida');
        const delExcel=[...delPend,...delNV];

        // Reglas de fusión
        const cobradas=facturas.filter(f=>f.estado==='Cobrada');
        const preservar=['En disputa','PDT Resolución Jud.','Incobrable'];
        const conservadas=facturas.filter(f=>preservar.includes(f.estado));
        const cobIds=new Set(cobradas.map(f=>f.id));
        const consIds=new Set(conservadas.map(f=>f.id));
        const exIds=new Set(delExcel.map(f=>f.id));
        const delFinal=delExcel.filter(f=>!cobIds.has(f.id)&&!consIds.has(f.id));
        const conservadasFuera=conservadas.filter(f=>!exIds.has(f.id));
        const merged=[...cobradas,...delFinal,...conservadasFuera];

        upd(merged);
        setImportLog({
          fecha:new Date().toLocaleDateString('es-ES'),
          totalPend:delPend.length,
          totalNV:delNV.length,
          cobradas:cobradas.length,
          conservadas:conservadasFuera.length,
        });
      }catch(err){alert('Error: '+err.message);console.error(err);}
    };
    r.readAsArrayBuffer(file);e.target.value='';
  };


  const filtradas=facturas.filter(f=>filtroMes==='todos'||f.mesCobro===parseInt(filtroMes)).filter(f=>filtroEstado==='todos'||f.estado===filtroEstado).sort((a,b)=>parseInt(b.diasRetraso||0)-parseInt(a.diasRetraso||0));
  const pendTotal=facturas.filter(f=>!['Cobrada','Cancelada','Incobrable'].includes(f.estado)).reduce((s,f)=>s+(parseFloat(f.importe)||0),0);
  const cobTotal=facturas.filter(f=>f.estado==='Cobrada').reduce((s,f)=>s+(parseFloat(f.importe)||0),0);

  return(
    <div>
      <div className="metrics">
        <div className="metric"><div className="metric-label">Pendiente cobro</div><div className="metric-val orange">{fmt(pendTotal)}</div></div>
        <div className="metric"><div className="metric-label">Cobrado YTD</div><div className="metric-val green">{fmt(cobTotal)}</div></div>
        {[0,1,2].map(i=>{const m=Math.min(cierreFact+1,11)+i;return m<=11?<div key={m} className="metric"><div className="metric-label">Previsto {MESES[m]}</div><div className="metric-val blue">{fmt(cobrosPendM(m))}</div></div>:null;})}
      </div>
      <div className="card">
        <div className="card-header"><h2>Importar desde Excel BMG</h2></div>
        <div className="card-body">
          <div style={{display:'flex',gap:16,flexWrap:'wrap',alignItems:'flex-start'}}>
            <label className="upload-area" style={{width:240}}>
              <i className="ti ti-file-spreadsheet" style={{fontSize:22,display:'block',marginBottom:6,color:'#1a7a45'}}></i>
              <strong>Subir Seguimiento_Factura_*.xlsx</strong>
              <span style={{fontSize:10,color:'#aaa',display:'block',marginTop:4}}>Lee "FACTURAS PENDIENTES" y "FACTURAS EMITIDAS NO VENCIDAS"</span>
              <input type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={importarXLSX}/>
            </label>
            <div style={{fontSize:11,color:'#555',lineHeight:1.9}}>🔒 Cobradas — nunca se modifican<br/>🔄 Excel — se actualizan/añaden<br/>⚠️ En disputa/Judicial — se conservan</div>
          </div>
          {importLog&&<div style={{marginTop:10,padding:'8px 12px',borderRadius:6,background:'#e4f4ec',border:'1px solid #a0d4b0',fontSize:11,color:'#1a5c30',lineHeight:1.8}}>
            <i className="ti ti-circle-check" style={{marginRight:5}}></i>
            <strong>Importado el {importLog.fecha}</strong><br/>
            · {importLog.totalPend} facturas pendientes · {importLog.totalNV} no vencidas<br/>
            · {importLog.cobradas} cobradas preservadas · {importLog.conservadas} en disputa/judicial conservadas
          </div>}
        </div>
      </div>
      <div className="card">
        <div className="card-header"><h2>{editId?'Editar factura':'Añadir factura'}</h2>{editId&&<button className="btn btn-sm" onClick={()=>{setEditId(null);setForm(blank);}}>Cancelar</button>}</div>
        <div className="card-body">
          <div style={{display:'flex',gap:8,flexWrap:'wrap',alignItems:'flex-end'}}>
            {[['Nº Factura','id',110,'M00001/26'],['Cliente','cliente',140,''],['Deudor','clienteNm',140,'']].map(([lbl,key,w,ph])=>(
              <div key={key} style={{display:'flex',flexDirection:'column',gap:3}}>
                <label style={{fontSize:10,fontWeight:700,color:'#666',textTransform:'uppercase'}}>{lbl}</label>
                <input value={form[key]} onChange={e=>setForm(p=>({...p,[key]:e.target.value}))} style={{width:w,padding:'5px 8px',border:'1px solid #dde0e6',borderRadius:5,fontSize:12,fontFamily:'Arial,sans-serif'}} placeholder={ph}/>
              </div>
            ))}
            <div style={{display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:10,fontWeight:700,color:'#666',textTransform:'uppercase'}}>Fecha</label><input type="date" value={form.fecha} onChange={e=>setForm(p=>({...p,fecha:e.target.value}))} style={{width:130,padding:'5px 8px',border:'1px solid #dde0e6',borderRadius:5,fontSize:12,fontFamily:'Arial,sans-serif'}}/></div>
            <div style={{display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:10,fontWeight:700,color:'#666',textTransform:'uppercase'}}>Importe €</label><input type="number" value={form.importe} onChange={e=>setForm(p=>({...p,importe:e.target.value}))} style={{width:110,padding:'5px 8px',border:'1px solid #dde0e6',borderRadius:5,fontSize:12,fontFamily:'Arial,sans-serif'}} min={0}/></div>
            <div style={{display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:10,fontWeight:700,color:'#666',textTransform:'uppercase'}}>Días</label><input type="number" value={form.diasRetraso} onChange={e=>setForm(p=>({...p,diasRetraso:e.target.value}))} style={{width:70,padding:'5px 8px',border:'1px solid #dde0e6',borderRadius:5,fontSize:12,fontFamily:'Arial,sans-serif'}} min={0}/></div>
            <div style={{display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:10,fontWeight:700,color:'#666',textTransform:'uppercase'}}>Mes cobro</label>
              <select value={form.mesCobro} onChange={e=>setForm(p=>({...p,mesCobro:parseInt(e.target.value)}))} style={{width:110,padding:'5px 8px',border:'1px solid #dde0e6',borderRadius:5,fontSize:12,fontFamily:'Arial,sans-serif'}}>
                {MESES_FULL.map((m,i)=><option key={i} value={i}>{m}</option>)}
              </select>
            </div>
            <div style={{display:'flex',flexDirection:'column',gap:3}}><label style={{fontSize:10,fontWeight:700,color:'#666',textTransform:'uppercase'}}>Estado</label>
              <select value={form.estado} onChange={e=>setForm(p=>({...p,estado:e.target.value}))} style={{width:145,padding:'5px 8px',border:'1px solid #dde0e6',borderRadius:5,fontSize:12,fontFamily:'Arial,sans-serif'}}>
                {ESTADOS_FAC.map(e=><option key={e}>{e}</option>)}
              </select>
            </div>
            <button className="btn btn-primary" onClick={guardar}>{editId?'Actualizar':'Añadir'}</button>
          </div>
        </div>
      </div>
      <div className="card">
        <div className="card-header">
          <h2>Listado ({filtradas.length})</h2>
          <div style={{display:'flex',gap:6,alignItems:'center'}}>
            <button onClick={()=>{if(!confirm('¿Borrar todas las facturas?'))return;upd([]);}}

  );
}

// ── CAJA REAL ────────────────────────────────────────────────────
// ── FILA GASTO EN CAJA REAL ──────────────────────────────────────
function CajaGastoRowReal({g,cajaPagosReal,cierreGastos,setCajaPagoReal,gastosFcst,movs,cierreExtracto}){
  const imp=cajaPagosReal[g.id]||Array(12).fill(0);
  const neto=v=>v*(1+(g.iva||0)-(g.irpf||0));
  const fcstG=(gastosFcst||[]).find(x=>x.id===g.id);
  const extractoVal=m=>Math.abs((movs||[]).filter(mv=>mv.mes===m&&mv.etiqueta===g.concepto&&mv.importe<0).reduce((s,mv)=>s+mv.importe,0));
  const cajaVal=m=>{
    if(cierreExtracto>=0&&m<=cierreExtracto){const ev=extractoVal(m);return ev>0?ev:neto(imp[m]||0);}
    if(m<=cierreGastos)return neto(imp[m]||0);
    return neto(Math.abs(fcstG?.imp[m]||0));
  };
  const tot=MESES.reduce((s,_,m)=>s+cajaVal(m),0);
  return(
    <tr>
      <td className="sticky" style={{paddingLeft:20,fontSize:12,color:'#444'}}>
        {g.concepto}
        {g.iva>0&&<span style={{fontSize:9,background:'#e8f0fb',color:'#1a2b4a',padding:'0 4px',borderRadius:3,marginLeft:4}}>+{Math.round(g.iva*100)}%IVA</span>}
        {g.irpf>0&&<span style={{fontSize:9,background:'#fff4e0',color:'#7a4000',padding:'0 4px',borderRadius:3,marginLeft:3}}>-{Math.round(g.irpf*100)}%IRPF</span>}
      </td>
      {MESES.map((_,m)=>{
        const esCerrado=m<=cierreGastos;
        return(
          <td key={m} style={{padding:'3px 4px',borderLeft:'1px solid #f0f0f0',background:esCerrado?'#f4fbf6':'#f4f7fd'}}>
            {(cierreExtracto>=0&&m<=cierreExtracto)
              ?<span style={{display:'block',textAlign:'right',fontSize:11,fontFamily:'monospace',color:'#b83232',fontWeight:700,padding:'2px 0'}}>{fmt(cajaVal(m))}<span style={{fontSize:8,color:'#aaa',display:'block'}}>extracto</span></span>
              :esCerrado
              ?<input type="number" className="cell-edit" key={`cpr-${g.id}-${m}`} defaultValue={imp[m]||0} onChange={e=>setCajaPagoReal(g.id,m,e.target.value)} min={0} style={{color:'#1a7a45',borderBottomColor:'#a0d4b0',fontWeight:600}}/>
              :<span style={{display:'block',textAlign:'right',fontSize:11,fontFamily:'monospace',color:'#888',padding:'2px 0'}}>{fmt(cajaVal(m))}</span>
            }
          </td>
        );
      })}
      <td className="num" style={{fontWeight:600,borderLeft:'2px solid #1a2b4a',background:'#fdf8f0',color:'#b83232'}}>{fmt(tot)}</td>
    </tr>
  );
}

function TabCaja({facturas,cobrosRealesM,cobrosPendM,pagosExtM,cobrosExtM,cobrosFcstM,flujoCajaM,cierreFact,cierreGastos,cierreExtracto,saldo0,setSaldo0,gastosReal,gastosFcst,cajaPagosReal,setCajaPagoReal,ingFcstM,ingIVARealM,movs,cajaSeg,setCajaSeg,setCajaSegRow,addCajaSegRow,delCajaSegRow,save}){
  // Pagos de explotación = cajaPagosReal (editable por partida)
  const pagosExplM=m=>{
    if(cierreExtracto>=0&&m<=cierreExtracto){
      return(gastosReal||[]).reduce((s,g)=>{
        const ev=Math.abs((movs||[]).filter(mv=>mv.mes===m&&mv.etiqueta===g.concepto&&mv.importe<0).reduce((a,mv)=>a+mv.importe,0));
        if(ev>0)return s+ev;
        const b=(cajaPagosReal[g.id]||Array(12).fill(0))[m]||0;
        return s+b*(1+(g.iva||0)-(g.irpf||0));
      },0);
    } else if(m<=cierreGastos){
      return(gastosReal||[]).reduce((s,g)=>{const b=(cajaPagosReal[g.id]||Array(12).fill(0))[m]||0;return s+b*(1+(g.iva||0)-(g.irpf||0));},0);
    } else {
      return(gastosFcst||[]).reduce((s,g)=>{const b=Math.abs(g.imp[m]||0);return s+b*(1+(g.iva||0)-(g.irpf||0));},0);
    }
  };
  const cobrosM=m=>m<=cierreFact?(cobrosRealesM(m)+cobrosExtM(m)+cobrosPendM(m)):((cierreExtracto>=0&&m<=cierreExtracto)?(cobrosExtM(m)+cobrosPendM(m)):(cobrosPendM(m)+cobrosFcstM(m)));
  const pagosFiscM=m=>(cajaSeg||[]).filter(r=>r.subtipo==='impuestos').reduce((s,r)=>s+(r.imp[m]||0),0);
  const finEntM=m=>(cajaSeg||[]).filter(r=>r.subtipo==='financiacion'&&r.tipo==='cobro').reduce((s,r)=>{
    const ev=(movs||[]).filter(mv=>mv.mes===m&&mv.etiqueta===r.concepto&&mv.importe>0).reduce((a,mv)=>a+mv.importe,0);
    return s+(cierreExtracto>=0&&m<=cierreExtracto&&ev>0?ev:(r.imp[m]||0));
  },0);
  const finSalM=m=>(cajaSeg||[]).filter(r=>r.subtipo==='financiacion'&&r.tipo==='pago').reduce((s,r)=>{
    const ev=Math.abs((movs||[]).filter(mv=>mv.mes===m&&mv.etiqueta===r.concepto&&mv.importe<0).reduce((a,mv)=>a+mv.importe,0));
    return s+(cierreExtracto>=0&&m<=cierreExtracto&&ev>0?ev:(r.imp[m]||0));
  },0);
  // SALDO EXPLOTACION mes = cobros - pagos explot - pagos fiscales (sin financiacion)
  const saldoExplotM=m=>cobrosM(m)-pagosExplM(m)-pagosFiscM(m);
  // SALDO PERIODO mes = saldo explot + financiacion
  const saldoPeriodoM=m=>saldoExplotM(m)+finEntM(m)-finSalM(m);
  // SALDO ACUMULADO = saldo0 + suma acumulada de SALDO PERIODO
  const saldoM=m=>{let s=saldo0;for(let i=0;i<=m;i++)s+=saldoPeriodoM(i);return s;};
  const TC=cierreFact>=0?MESES.slice(0,cierreFact+1).reduce((_,__,m)=>_+cobrosRealesM(m)+cobrosExtM(m),0):0;
  const TP=cierreGastos>=0?MESES.slice(0,cierreGastos+1).reduce((_,__,m)=>_+pagosExtM(m),0):0;
  const SF=saldoM(Math.max(cierreFact,cierreGastos,0));
  const grupos=['Personal','Colaboradores','Estructura'];

  return(
    <div>
      <div className="alert alert-info"><i className="ti ti-info-circle"></i>
        <span>Las partidas de gasto aparecen automáticamente. Introduce el importe de caja real/previsto para cada una. Los cobros vienen de facturas cobradas. Los meses verdes = cerrados.</span>
      </div>

      <div className="card" style={{marginBottom:14}}>
        <div className="card-header"><h2>Saldo bancario inicial · 1 enero 2026</h2></div>
        <div className="card-body" style={{display:'flex',alignItems:'center',gap:20,flexWrap:'wrap'}}>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            <span style={{fontSize:12,color:'#555'}}>Saldo apertura:</span>
            <input type="number" style={{width:150,padding:'6px 10px',border:'1px solid #dde0e6',borderRadius:5,fontSize:15,fontWeight:700,fontFamily:'monospace',color:'#1a2b4a'}}
              value={saldo0} onChange={e=>setSaldo0(e.target.value)}/>
          </div>
          <div style={{fontSize:11}}>Saldo actual ({MESES[Math.max(cierreFact,cierreGastos,0)]}): <strong style={{color:SF>=0?'#1a7a45':'#b83232',fontSize:14}}>{fmt(SF)}</strong></div>
        </div>
      </div>

      <div className="card">
        <div className="card-header"><h2>Plan de caja real · 2026</h2><span style={{fontSize:10,color:'#888'}}>Verde = cerrado · Azul = forecast/previsto</span></div>
        <div className="overflow-x">
        <table style={{minWidth:1220}}>
          <thead><tr>
            <th className="sticky" style={{minWidth:230}}>Concepto</th>
            {MESES.map((m,i)=>{
              const esCF=i<=cierreFact;const esCG=i<=cierreGastos;
              return(<th key={i} className="mh" style={{minWidth:72,
                background:esCF||esCG?'#e4f4ec':'#e8f0fb',
                color:esCF||esCG?'#1a7a45':'#1a2b4a',
                borderTop:esCF||esCG?'2px solid #a0d4b0':'2px solid #90b0d8'}}>
                {m}<div style={{fontSize:8,fontWeight:400,marginTop:1}}>{esCF||esCG?'real':'fcst'}</div>
              </th>);
            })}
            <th className="mh mh-total" style={{minWidth:82}}>Total</th>
          </tr></thead>
          <tbody>

            {/* COBROS */}
            <tr className="section-row"><td className="sticky" colSpan={14}>Cobros</td></tr>

            {/* 1. COBROS REALES — facturas cobradas, meses cerrados */}
            <tr style={{background:'#f4fbf6'}}>
              <td className="sticky" style={{fontWeight:600,paddingLeft:16,color:'#1a7a45',fontSize:12}}>
                Cobros de facturas
                <div style={{fontSize:9,color:'#888',fontWeight:400}}>facturas marcadas como cobradas · meses cerrados</div>
              </td>
              {MESES.map((_,m)=><td key={m} className="num" style={{color:'#1a7a45',fontWeight:600,background:m>cierreFact?'#fafafa':undefined}}>
                {m<=cierreFact?fmt(cobrosRealesM(m)):'—'}

              <td className="num" style={{fontWeight:700,borderLeft:'2px solid #1a2b4a',color:'#1a7a45'}}>

            {(()=>{
              const TCext=cierreExtracto>=0?MESES.slice(0,cierreExtracto+1).reduce((_,__,m)=>_+cobrosExtM(m),0):0;
              // Always show cobros extracto row when extracto has data
              return(
                <tr style={{background:'#edfaf2'}}>
                  <td className="sticky" style={{fontWeight:600,paddingLeft:16,color:'#1a7a45',fontSize:12}}>
