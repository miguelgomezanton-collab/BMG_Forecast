// EXTRACTO BANCARIO
// ══════════════════════════════════════════════════════════════════
function TabExtracto({movs,setMovs,save,gastosReal,gastosFcst,reglas,setReglas,cajaSeg}){
  const [banco,setBanco]=useState('CAIXABANK');
  const [filtroMes,setFiltroMes]=useState('todos');
  const [filtroBanco,setFiltroBanco]=useState('todos');
  const [filtroEtiqueta,setFiltroEtiqueta]=useState('todas');
  const [bancos]=useState(['CAIXABANK','SABADELL','CAJAMAR','BSCH','BANKINTER','OTRO']);
  const [importLog,setImportLog]=useState(null);

  // Categorías = partidas de gastos + fijas de caja + traspaso
  const gastosUnicos=[...new Map((gastosReal||[]).map(g=>[g.id,g])).values()];
  const cajaCats=(cajaSeg||[]).map(r=>r.concepto).filter(Boolean);
  const CATS_FIJAS=['Traspaso entre cuentas','Cobro de cliente','Sin categorizar'];
  const CATS=[...gastosUnicos.map(g=>g.concepto),...cajaCats,...CATS_FIJAS];

  // Extraer clave normalizada del concepto para matching
  const extractClave=(concepto)=>{
    // Quitar números, referencias, caracteres especiales — dejar palabras clave
    return concepto.toLowerCase()
      .replace(/[0-9*\/\\]+/g,' ')
      .replace(/\s+/g,' ')
      .trim()
      .slice(0,60);
  };

  // Buscar en reglas aprendidas — match exacto o por prefijo largo
  const buscarRegla=(concepto)=>{
    const clave=extractClave(concepto);
    // Exacto
    if(reglas[clave])return reglas[clave];
    // Buscar si alguna clave guardada es sufijo/prefijo del concepto actual
    const claves=Object.keys(reglas);
    for(const k of claves){
      if(k.length>12&&(clave.includes(k)||k.includes(clave.slice(0,Math.min(clave.length,k.length)))))return reglas[k];
    }
    return null;
  };

  // Autocategorización — primero reglas aprendidas, luego keywords
  const autocat=(concepto,imp)=>{
    // 1. Reglas aprendidas (máxima prioridad)
    const aprendida=buscarRegla(concepto);
    if(aprendida)return aprendida;

    const s=concepto.toLowerCase().replace(/\s+/g,' ');
    // 2. Entradas
    if(imp>0){
      if(s.includes('traspas')||s.includes('transfer'))return'Traspaso entre cuentas';
      return'Cobro de cliente';
    }
    // 3. Match en partidas de gasto por nombre
    const gastoMatch=gastosUnicos.find(g=>{
      const cn=g.concepto.toLowerCase();
      const palabras=cn.split(" ").filter(p=>p.length>4);
      return palabras.some(p=>s.includes(p));
    });
    if(gastoMatch)return gastoMatch.concepto;
    // 4. Keywords fijos
    if(s.includes('nomin')||s.includes('salari'))return(gastosUnicos.find(g=>g.id==='nominas')?.concepto||'Sin categorizar');
    if(s.includes('seguridad social')||s.includes('tgss'))return(gastosUnicos.find(g=>g.id==='ss')?.concepto||'Sin categorizar');
    if(s.includes('alquiler'))return(gastosUnicos.find(g=>g.id==='alquiler')?.concepto||'Sin categorizar');
    if(s.includes('netflix')||s.includes('spotify')||s.includes('google')||s.includes('microsoft')||s.includes('mongo')||s.includes('aws')||s.includes('squarespace'))return(gastosUnicos.find(g=>g.id==='it')?.concepto||'Sin categorizar');
    if(s.includes('traspas')||s.includes('transfer entre'))return'Traspaso entre cuentas';
    return'Sin categorizar';
  };

  // Importar XLS/XLSX del banco
  const importarExtracto=e=>{
    const file=e.target.files[0];if(!file)return;
    const ext=file.name.split('.').pop().toLowerCase();
    const r=new FileReader();
    r.onload=ev=>{
      try{
        let wb;
        if(ext==='xls'){
          // XLS: usar SheetJS con type binary
          wb=window.XLSX.read(ev.target.result,{type:'binary',cellDates:true});
        }else{
          wb=window.XLSX.read(ev.target.result,{type:'array',cellDates:true});
        }
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=window.XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        if(rows.length<2){alert('Archivo vacío o sin datos.');return;}

        // Detectar fila de cabecera (buscar "fecha" o "concepto")
        let hRow=0;
        for(let i=0;i<Math.min(5,rows.length);i++){
          const r0=rows[i].map(c=>String(c).toLowerCase().trim());
          if(r0.some(c=>c.includes('fecha'))||r0.some(c=>c.includes('concepto'))){hRow=i;break;}
        }
        const hdrs=rows[hRow].map(c=>String(c).toLowerCase().trim());
        const ci={
          fecha:hdrs.findIndex(h=>h.includes('fecha')||h.includes('date')),
          concepto:hdrs.findIndex(h=>h.includes('concepto')||h.includes('descripci')||h.includes('movim')),
          importe:hdrs.findIndex(h=>h.includes('importe')||h.includes('cargo')||h.includes('amount')),
          saldo:hdrs.findIndex(h=>h.includes('saldo')||h.includes('balance')),
        };
        if(ci.fecha<0)ci.fecha=0;
        if(ci.concepto<0)ci.concepto=1;
        if(ci.importe<0)ci.importe=2;

        const toISO=v=>{
          if(!v||v==='')return'';
          if(v instanceof Date)return v.toISOString().split('T')[0];
          if(typeof v==='number'&&v>40000){const d=new Date(Math.round((v-25569)*86400*1000));return d.toISOString().split('T')[0];}
          const s=String(v).trim().split(' ')[0]; // remove time part
          const p=s.indexOf('/')>=0?s.split('/'):s.indexOf('-')>=0?s.split('-'):s.split('.');
          if(p.length===3)return p[0].length===4?`${p[0]}-${p[1].padStart(2,'0')}-${p[2].padStart(2,'0')}`:`${p[2].length===2?'20'+p[2]:p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;
          return s;
        };

        const existentes=new Set(movs.map(m=>`${m.fechaISO}|${m.concepto.slice(0,40)}|${m.importe}|${m.banco}`));
        const nuevos=[];let añ=0,dup=0,err=0;
        rows.slice(hRow+1).forEach((row,idx)=>{
          if(!row[ci.fecha]&&!row[ci.importe])return;
          const fechaISO=toISO(row[ci.fecha]);
          if(!fechaISO)return;
          const conceptoRaw=String(row[ci.concepto]||'').replace(/\n/g,' ').replace(/\s+/g,' ').trim();
          if(!conceptoRaw)return;
          const imp=parseFloat(String(row[ci.importe]||'').replace(/[^0-9.,\-]/g,'').replace(',','.'))||0;
          if(imp===0){err++;return;}
          const mes=new Date(fechaISO).getMonth();
          if(isNaN(mes))return;
          const k=`${fechaISO}|${conceptoRaw.slice(0,40)}|${imp}|${banco}`;
          if(existentes.has(k)){dup++;return;}
          existentes.add(k);
          nuevos.push({
            id:'e'+Date.now()+'_'+idx,
            fecha:String(row[ci.fecha]).split(' ')[0].split('T')[0]||fechaISO,
            fechaISO,
            concepto:conceptoRaw,
            importe:imp,
            saldo:ci.saldo>=0?parseFloat(String(row[ci.saldo]||'').replace(/[^0-9.,\-]/g,'').replace(',','.'))||null:null,
            mes,
            año:new Date(fechaISO).getFullYear(),
            banco,
            etiqueta:autocat(conceptoRaw,imp),
          });
          añ++;
        });
        const n=[...movs,...nuevos];setMovs(n);save({movs:n});
        setImportLog({banco,fecha:new Date().toLocaleDateString('es-ES'),añadidos:añ,duplicados:dup});
      }catch(err){alert('Error al leer el archivo: '+err.message);console.error(err);}
    };
    ext==='xls'?r.readAsBinaryString(file):r.readAsArrayBuffer(file);
    e.target.value='';
  };

  const updEtiqueta=(id,etiqueta)=>{
    // 1. Guardar regla aprendida
    const mv=movs.find(m=>m.id===id);
    const nuevasReglas={...reglas};
    if(mv){
      const clave=extractClave(mv.concepto);
      nuevasReglas[clave]=etiqueta;
    }
    // 2. Re-aplicar a todos los movimientos con concepto similar que estén sin categorizar
    const n=movs.map(m=>{
      if(m.id===id)return{...m,etiqueta};
      // Re-aplicar solo si está sin categorizar o si el concepto es muy similar (mismo inicio)
      if(mv&&m.etiqueta==='Sin categorizar'){
        const claveMov=extractClave(m.concepto);
        const claveRef=extractClave(mv.concepto);
        // Match si las primeras 20 chars son iguales (mismo tipo de movimiento)
        if(claveMov.slice(0,20)===claveRef.slice(0,20)&&claveMov.length>10)return{...m,etiqueta};
      }
      return m;
    });
    setMovs(n);setReglas(nuevasReglas);save({movs:n,reglas:nuevasReglas});
  };
  const del=(id)=>{const n=movs.filter(m=>m.id!==id);setMovs(n);save({movs:n});};
  const limpiar=()=>{if(!confirm('¿Borrar TODOS los movimientos?'))return;setMovs([]);save({movs:[]});};

  // Filtros
  const filtrados=movs
    .filter(m=>filtroMes==='todos'||m.mes===parseInt(filtroMes))
    .filter(m=>filtroBanco==='todos'||m.banco===filtroBanco)
    .filter(m=>filtroEtiqueta==='todas'||m.etiqueta===filtroEtiqueta)
    .sort((a,b)=>(b.fechaISO||'').localeCompare(a.fechaISO||''));

  const bancosUsados=[...new Set(movs.map(m=>m.banco))].sort();
  const sinCat=movs.filter(m=>m.etiqueta==='Sin categorizar').length;
  const totalFiltrado=filtrados.reduce((s,m)=>s+m.importe,0);
  const EXCLUIR_CAJA=['Traspaso entre cuentas','Cobro de cliente'];
  const entradas=filtrados.filter(m=>m.importe>0&&!EXCLUIR_CAJA.includes(m.etiqueta)).reduce((s,m)=>s+m.importe,0);
  const salidas=filtrados.filter(m=>m.importe<0&&!EXCLUIR_CAJA.includes(m.etiqueta)).reduce((s,m)=>s+m.importe,0);
  const traspasos=filtrados.filter(m=>m.etiqueta==='Traspaso entre cuentas').reduce((s,m)=>s+Math.abs(m.importe),0);
  const cobrosCliente=filtrados.filter(m=>m.etiqueta==='Cobro de cliente').reduce((s,m)=>s+m.importe,0);

  // Resumen por etiqueta para el mes filtrado
  const resumenEtiquetas=CATS.filter(c=>c!=='Sin categorizar'&&c!=='Traspaso entre cuentas').map(cat=>{
    const total=filtrados.filter(m=>m.etiqueta===cat).reduce((s,m)=>s+m.importe,0);
    return{cat,total};
  }).filter(r=>r.total!==0);

  return(
    <div>
      <div className="alert alert-info">
        <i className="ti ti-info-circle"></i>
        <span>Los movimientos etiquetados como <strong>"Traspaso entre cuentas"</strong> no cuentan para caja ni tesorería. El resto va a Tesorería según mes y etiqueta. <strong>Categoriza primero, luego cierra el mes en Caja real.</strong></span>
      </div>

      {/* Importar extracto */}
      <div className="card">
        <div className="card-header"><h2>Importar extracto bancario</h2></div>
        <div className="card-body">
          <div style={{display:'flex',gap:12,alignItems:'flex-end',flexWrap:'wrap',marginBottom:12}}>
            <div style={{display:'flex',flexDirection:'column',gap:4}}>
              <label style={{fontSize:10,fontWeight:700,color:'#666',textTransform:'uppercase'}}>Banco</label>
              <select value={banco} onChange={e=>setBanco(e.target.value)}
                style={{padding:'6px 10px',border:'1px solid #dde0e6',borderRadius:5,fontSize:12,fontFamily:'Arial,sans-serif',minWidth:140}}>
                {bancos.map(b=><option key={b}>{b}</option>)}
              </select>
            </div>
            <label style={{border:'2px dashed #c0cad8',borderRadius:7,padding:'10px 18px',cursor:'pointer',fontSize:11,color:'#888',display:'flex',alignItems:'center',gap:8}}>
              <i className="ti ti-file-spreadsheet" style={{fontSize:20,color:'#1a2b4a'}}></i>
              <div>
                <strong>Subir extracto {banco} (.xls / .xlsx)</strong>
                <div style={{fontSize:10,color:'#aaa',marginTop:2}}>Formato: Fecha · Concepto · Importe · Saldo</div>
              </div>
              <input type="file" accept=".xlsx,.xls" style={{display:'none'}} onChange={importarExtracto}/>
            </label>
          </div>
          {importLog&&<div style={{padding:'8px 12px',borderRadius:6,background:'#e4f4ec',border:'1px solid #a0d4b0',fontSize:11,color:'#1a5c30',display:'inline-flex',gap:8,alignItems:'center'}}>
            <i className="ti ti-circle-check"></i>
            <span><strong>{importLog.banco}</strong> · {importLog.fecha} · <strong>{importLog.añadidos}</strong> movimientos importados{importLog.duplicados>0?` · ${importLog.duplicados} duplicados omitidos`:''}</span>
          </div>}
        </div>
      </div>

      {movs.length>0&&<>
        {/* KPIs */}
        <div className="metrics">
          <div className="metric"><div className="metric-label">Movimientos</div><div className="metric-val blue">{filtrados.length}</div><div className="metric-sub">de {movs.length} totales</div></div>
          <div className="metric"><div className="metric-label">Reglas aprendidas</div><div className="metric-val blue">{Object.keys(reglas).length}</div><div className="metric-sub">conceptos memorizados</div></div>
          <div className="metric"><div className="metric-label">Cobros de clientes</div><div className="metric-val green">{fmt(cobrosCliente)}</div><div className="metric-sub">no van a tesorería (gestionado en pendientes)</div></div>
          <div className="metric"><div className="metric-label">Entradas a tesorería</div><div className="metric-val green">{fmt(entradas)}</div><div className="metric-sub">sin traspasos ni cobros cliente</div></div>
          <div className="metric"><div className="metric-label">Salidas a tesorería</div><div className="metric-val red">{fmt(salidas)}</div></div>
          <div className="metric"><div className="metric-label">Flujo neto</div><div className={`metric-val ${totalFiltrado>=0?'green':'red'}`}>{fmt(totalFiltrado)}</div></div>
          {traspasos>0&&<div className="metric"><div className="metric-label">Traspasos internos</div><div className="metric-val gray">{fmt(traspasos)}</div><div className="metric-sub">no cuentan en caja</div></div>}
          {sinCat>0&&<div className="metric" style={{background:'#fff8e6',border:'1px solid #f0d070'}}><div className="metric-label">Sin categorizar</div><div className="metric-val orange">{sinCat}</div><div className="metric-sub">pendientes de etiquetar</div></div>}
        </div>

        {/* Resumen por etiqueta */}
        {resumenEtiquetas.length>0&&<div className="card" style={{marginBottom:14}}>
          <div className="card-header"><h2>Resumen por categoría</h2><span style={{fontSize:10,color:'#888'}}>{filtroMes==='todos'?'Todos los meses':MESES_FULL[parseInt(filtroMes)]}</span></div>
          <div className="card-body" style={{display:'flex',flexWrap:'wrap',gap:8}}>
            {resumenEtiquetas.map(({cat,total})=>(
              <div key={cat} style={{background:'#f4f6f9',border:'1px solid #e0e4ea',borderRadius:6,padding:'8px 12px',minWidth:180,cursor:'pointer'}} onClick={()=>setFiltroEtiqueta(filtroEtiqueta===cat?'todas':cat)}>
                <div style={{fontSize:10,color:'#888',marginBottom:3,textOverflow:'ellipsis',overflow:'hidden',whiteSpace:'nowrap'}}>{cat}</div>
                <div style={{fontSize:14,fontWeight:700,color:total<0?'#b83232':'#1a7a45',fontFamily:'monospace'}}>{fmt(total)}</div>
              </div>
            ))}
          </div>
        </div>}

        {/* Filtros + tabla */}
        <div className="card">
          <div className="card-header">
            <h2>Movimientos ({filtrados.length}) · {fmt(totalFiltrado)}</h2>
            <div style={{display:'flex',gap:6,flexWrap:'wrap',alignItems:'center'}}>
              <select value={filtroMes} onChange={e=>setFiltroMes(e.target.value)}
                style={{fontSize:11,padding:'3px 7px',border:'1px solid #dde0e6',borderRadius:4,fontFamily:'Arial,sans-serif'}}>
                <option value="todos">Todos los meses</option>
                {MESES_FULL.map((m,i)=><option key={i} value={i}>{m}</option>)}
              </select>
              {bancosUsados.length>1&&<select value={filtroBanco} onChange={e=>setFiltroBanco(e.target.value)}
                style={{fontSize:11,padding:'3px 7px',border:'1px solid #dde0e6',borderRadius:4,fontFamily:'Arial,sans-serif'}}>
                <option value="todos">Todos los bancos</option>
                {bancosUsados.map(b=><option key={b}>{b}</option>)}
              </select>}
              <select value={filtroEtiqueta} onChange={e=>setFiltroEtiqueta(e.target.value)}
                style={{fontSize:11,padding:'3px 7px',border:'1px solid #dde0e6',borderRadius:4,fontFamily:'Arial,sans-serif',maxWidth:200}}>
                <option value="todas">Todas las categorías</option>
                {CATS.map(c=><option key={c}>{c}</option>)}
              </select>
              <button onClick={limpiar}
                style={{padding:'3px 8px',borderRadius:4,border:'1px solid #e4c0c0',background:'transparent',color:'#b83232',cursor:'pointer',fontSize:11,fontFamily:'Arial,sans-serif'}}>
                <i className="ti ti-trash"></i> Limpiar todo
              </button>
            </div>
          </div>
          <div className="overflow-x">
          <table>
            <thead><tr>
              <th style={{minWidth:90,whiteSpace:'nowrap'}}>Fecha</th>
              <th style={{minWidth:280}}>Concepto</th>
              <th style={{minWidth:80}}>Banco</th>
              <th className="num" style={{minWidth:90}}>Importe</th>
              <th style={{minWidth:200}}>Categoría</th>
              <th style={{width:30}}></th>
            </tr></thead>
            <tbody>
            {filtrados.map(mv=>{
              const esTraspaso=mv.etiqueta==='Traspaso entre cuentas';
              const esSinCat=mv.etiqueta==='Sin categorizar';
              return(
                <tr key={mv.id} style={{background:esTraspaso?'#f4f4f4':esSinCat&&mv.importe<0?'#fffbe6':undefined,opacity:esTraspaso?0.6:1}}>
                  <td style={{fontSize:11,whiteSpace:'nowrap',color:'#555'}}>{mv.fechaISO||mv.fecha}</td>
                  <td style={{fontSize:11,maxWidth:280,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={mv.concepto}>{mv.concepto}</td>
                  <td style={{fontSize:10,color:'#888'}}>{mv.banco}</td>
                  <td className={`num ${mv.importe>0?'green':mv.importe<0?'red':'gray'}`} style={{fontWeight:600}}>{fmt(mv.importe)}</td>
                  <td>
                    <select value={mv.etiqueta||'Sin categorizar'} onChange={e=>updEtiqueta(mv.id,e.target.value)}
                      style={{fontSize:10,padding:'2px 4px',border:'1px solid #ddd',borderRadius:4,width:'100%',fontFamily:'Arial,sans-serif',
                        background:esTraspaso?'#f4f4f4':esSinCat&&mv.importe<0?'#fffbe6':'#fff',
                        color:esTraspaso?'#888':'#1a1a1a'}}>
                      {CATS.map(c=><option key={c}>{c}</option>)}
                    </select>
                  </td>
                  <td><button onClick={()=>del(mv.id)}
                    style={{padding:'1px 5px',borderRadius:3,border:'1px solid #e4c0c0',background:'transparent',color:'#b83232',cursor:'pointer',fontSize:10,fontFamily:'Arial,sans-serif'}}>
                    <i className="ti ti-x"></i>
                  </button></td>
                </tr>
              );
            })}
            {filtrados.length===0&&<tr><td colSpan={6} style={{textAlign:'center',padding:20,color:'#aaa'}}>Sin movimientos</td></tr>}
            </tbody>
          </table>
          </div>
        </div>
      </>}
    </div>
  );
}


ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
